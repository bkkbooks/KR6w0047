body:
  text: 天親菩名義集云婆藪盤豆西域記云伐蘇畔度唐言世親曰婆藪盤豆譯曰天親訛謬言天親者菩乃是毗紐天親故云天親於說一切有部出家受業本自北印度至於此也無著命其門人令往迎𠋫至此伽藍遇而會見無著第子止戶牖外夜分之後誦十地經世親聞已感悟追悔甚𭰹妙法昔所未聞毀謗之𠍴源發於舌舌為罪本今宜斷除即執銛刀將自斷舌乃見無著住立告曰夫大乗教者至真之理也諸佛所眾聖攸宗言欲誨汝爾今自悟悟其時矣何善如之諸佛聖教斷舌非悔昔以舌毀大乗今以舌大乗補過自斷猶為善矣杜口絕言其利安在作是語已忽復不見世親承命不斷舌且詣無著諮受大乗於是研精𫟛思製大乗論几百餘部並盛行已上天親傳云北天竺丈夫國有國師婆羅門姓憍尸迦有子同名婆藪盤頭譯云天親第三子出家得羅漢別名北憐特長子是菩又出家㣪離欲得大乗空名阿僧伽譯為無著兄第既有別名故法師但稱婆藪盤頭乃至天竺及餘𨕙土學大小乗人悉以法師天親所造為學本異部及外道論師聞法師名莫不畏伏於阿緰闍國捨命年終八十雖迹居凡地理實難思議也已上註記一云婆藪盤頭者造論師或云婆修盤駄或云和須槃豆此云天親新云笩修豆此云世親光云菩學通內外愽達古今名振五天聲流四主已上始學有部次習經部㣪歸大乗此論專申大乗淨土大士製𫐠最可尊信因人重法益此謂耳又云問光記一云笩名世槃豆名親乃至譯為天此翻謬矣𠰥言天應號提婆也已上新相違云何和會答新兩譯相違非一限此何會問何故號此菩為世親耶答光記一云印土有天俗號世親世人親近供養故以名焉菩父從所乞處為名也已上善人詠云天親北天竺人也多造論有唯識金剛般𠰥等雖昇𫥢內院親近彌勒然著無量壽論有求生淨土偈及五門修法𠰥人依此力行遂往生極樂有何疑乎已上出世時代者註記一云問此菩出世佛滅㣪九百年猶在正法何云像法答依摩耶等正法五百年故此菩像法時出也唯識疏一云慧愷法師俱舎序云佛滅已㣪千一百年天親菩出生造論依今所傳諸部說異今依大乗九百年間天親菩出世造此頌本已上天親之事如處處記管見出四十餘處云云天親菩造論說歸命㝵光如來六要鈔云天親中初之二句標造論事𫐠歸命意已上造論者所造論多應化錄云造大乗論百法論五蘊論二十唯識論三十唯識論等乃至斷二十七疑造論已上俱舎論一云製論於千部已上今造論者往生論也歸命等者論歸命盡十𭤧無㝵光如來文論註云歸命即是礼拜門盡十𭤧無㝵光如來即是嘆門何以知歸命是禮拜龍樹菩造阿彌陀如來中或言稽首禮或言我歸命或言歸命禮此論長行中亦言修五念門五念門中禮拜是一天親菩既願往生豈容不禮故知歸命即是禮拜然禮拜但是敬不必歸命歸命必是禮拜若以此推歸命為重偈申己心宜言歸命論解偈義𪵬談禮拜彼此相成於義彌顯何以知盡十𭤧無㝵光如來是嘆門下長行中言云何嘆門謂稱如來名如彼如來光明智相如彼名義欲如實修行相應故乃至此句是嘆門已上釋歸命中申己心者論主結偈不待解義自知其行故云申己心是在意業以歸命故云歸命也長行為他分別偈義令他行故意業歸命說云禮拜今六要鈔云𫐠歸命意者此意也註記云歸命即是禮拜門等者問歸命兩字則是能禮盡等八字猶當所禮何以八字屬嘆門答此有二義一云偈頌簡略且舉能禮顯於所禮或歸能禮命則所礼言歸命者順佛教命故八字偏是歎門也二云盡等八字義兼兩向若就所禮義邊者猶是禮拜摂若約無㝵光名義則歎義邊者亦屬歎對前歸命一向禮故自下八字且屬歎乃至歸命意業礼拜身業意有歸命身行礼拜也矣於二義中初義尤同當流之意行卷云命眉病反使也教也道也信也計也召也已上起信疏云歸是敬順義命謂諸佛教命此明論主敬奉如來教命傳法利生故云歸命已上又云問歸命與稽首何別答智論云如小乗經中毘沙門王歸命釋迦稽首念佛論主將為初重後輕以小乗人偏賀釋迦之恩故有斯也又釋通論皆三業別分稽首屬身歸命是意三業之中意業為主矣問天親願生西域記五云二三賢哲私云無著世親師子覺之三人每相謂曰凢修行業願覲慈𫞕若先捨壽得遂宿心當相報悟以知所至其㣪師子覺先捨壽命三年不報世親菩亦捨壽乃至其㣪無著菩於夜初分為門人教授定法燈光忽翳空中大明有一天仙乗虚下降即進階庭敬禮無著無著曰爾來何暮今名何謂對曰私云是世親也從此捨壽命往都史多天慈𫞕內眾蓮𬜻中生蓮開慈𫞕曰善來廣慧善來廣慧旋繞周即來報命已上然今論云生安樂國相違如何答世親十廽向滿位菩生死自在二土各通機緣例如天台西𭤧二所往生妙樂會云順緣設化不可一准或云自行生化他願生西𭤧又一義云此論意依五念修行速得成就阿耨菩提也論主為成菩提願生西方况菩生極樂有自𤏅他本緣三義其中自𤏅速得菩提故也𤏅他為引機也本緣菩於陀宿緣𭰹厚故也三義中自𤏅尚本意也彼都往生且對彼天有緣機且示得生相何况都西方相對重勝劣有之其義如要集就中西𭤧往生自作論文也都往生他作傳記也於他作難為治定證故付此論西𭤧往生無其疑也要記八云問案淨土論及攝論偈世親願生安養淨土然何言生都史多天答菩死生皆順物機為利益故示現異也如大法皷經上云佛記離車童子言佛𣵀槃㣪正法欲滅餘八十年作比丘持佛名揚此經不𮨇身命百年壽終生安樂國得大神力住第八地一身住天一身住安樂國已上亦如天台往生二途弘决判云當知䡄物隨機順緣設化不可一准已上要記依修多羅顯真實光闡撗超大誓願廣由本願力廽向為度群生彰一心六要鈔云依修以下二行四句是明所依真實之義又顯撗超他力之益論中雖撗超之言三經一論所說法門法躰同故依彼經中或云超絕或云撗截今云撗超又大師釋有此名目故云撗超大誓願也彰一心者指我一心論主一心行者一心其心可同是故釋云為度群生已上私云依修多羅顯真實者偈云我依修多羅真實㓛德相說願偈惣持與佛教相應已上依者所依六要鈔云所依真實之義是也論註云何所依何故依云何依何所依者依修多羅何故依者以如來即真實㓛德相故云何依者修五念門相應故已上修多羅者論註云修多羅是佛經名已上又云修多羅者十二部經中直說者名修多羅謂四阿含三藏等三藏外大乗諸經亦名修多羅此中言修多羅者是三藏外大乗修多羅非阿含等經已上六要鈔云如大論修多羅名有通別通則十二部皆云修多羅別乃十二部中第一是今云直說即第一也已上註記云智論三十三云諸經中直說者名修多羅所謂四阿含諸摩訶衍經及二百五十戒經出三藏外亦有諸經皆名修多羅已上玄義六云諸經中直說者謂四阿含及二百五十戒出三藏外諸摩訶直說者皆名修多羅慧影疏云十二部中修多羅者但交諸經中非是因緣本事等部但有直說者則屬修多羅已上私云修多羅此云契上契理下契拫修多羅又云素怚𫬠或蘇怚囉者𬜻言線蓋取貫穿摂持義也尺釈𫞕要覽意也又名義集云修多羅此云契經有通有別通則修多羅聖教之都名別則妙玄云直說法相者是別修多羅如說四諦等也所言別者雜集論云謂長行綴葺略說所應說義已上修多羅名義其釋多如玄義六真實㓛德相者論註云有二種㓛德一者從有漏心生不順法性所謂凡夫人天諸善人天果報𠰥因𠰥果皆是顛倒皆是虚偽是故名不實㓛德二者從菩智恵清淨業起莊嚴佛事依法性入清淨相是法不顛倒不虚偽名為真實㓛德已上私云莊嚴等者問法性為性淨穢法皆是法性何限淨土答淨穢法皆以法性而雖為性有漏法遠於法性背於法本漏順法性不背法本故莊嚴佛事云依法性問法當躰押見法性可違順答穢土迷故背於法性淨土悟故隨順法性問迷悟事相今義依法性自理見則法皆是一一如如更別法何以迷悟隔平等乎答論莊嚴佛事迷悟分明上所立莊嚴者為別入迷情何以如理忘失迷悟乎問淨土莊嚴佛事彌陀願力所成何依法性答實談意修性不二願力根本性德顯故修德全是性德義也說願偈等者註云持名不散不失惣名以少攝多偈言五言句数願名欲樂往生說謂說諸偈論𢝰而言之說所願生偈𢝰持佛教與佛教相應相應者譬如蓋相稱也已上爰以論主依修多羅佛教相應明彌陀真實義依之今云依修多羅顯真實也光闡撗超大誓願者光闡者光廣也闡暢也撗超者就之有二雙四重之釋義信卷云然就菩提心有二種一者竪二者撗又就竪復有二種一者竪超二者竪出竪超竪出明㩲實顯蜜大小之教歴刼迃廻之菩提心自力金剛心菩大心也亦就撗復有二種一者撗超二者撗出撗出者正雜定散他力中之自力菩提心也撗超者斯乃願力廻向之信樂是曰願作佛心願作佛心即是撗大菩提心是名撗超金剛心也撗竪菩提心其言一而其心雖異入真為正要真心為根本邪𮦀為錯疑情為失也已上六要鈔二本釋此又云然就等者此有二雙四重之釈所謂竪出竪超撗出撗超是也所立𭅒異在文可見又第六卷及愚禿鈔委有此事可見彼文問今之名目出何典乎答樂邦文類第四桐江擇瑛法師辨撗竪二出文云竪出者聲聞修四諦緣覺修十二因緣菩修六度𭤧行此渉地位譬如及第須自有才學又如歴任轉官須有㓛𫥿撗出者念佛求生淨土譬如䕃敘㓛由祖父他力不問學業有又如恩普轉㓛由國王不論歴任淺𭰹於撗出中有定散二善故善導和尚立專𮦀二修𮦀修者散漫修諸善業廻向莊嚴也專修者身須專礼阿陀佛不𮦀餘礼口須專稱阿彌陀佛不稱餘號不誦餘經咒意須專想阿彌陀佛不修餘觀若專修者十即十生百即百生若𮦀修者百中或得一兩人生千中或得三五人生今見世人有一日礼阿彌陀佛三千拜者日稱阿彌陀佛十聲者有晝夜習㘴專想阿彌陀佛者並有感應斯可驗也已上本依此釋又加私義問如今釋者唯有二出不載二超故竪出中不分權實普摂諸教撗出之中不辨淺𭰹𢝰糿淨教是則定散專𮦀等也何加二超而違彼說答於聖道門有三乗家有一乗家三乗教意不分權實一乗教意專存權實今依一乗可有𭅒別仍立竪超別為速成佛一門又聖道意雖立淨教不及㝎散弘願分別又正助二門𭅒降依宗家意既分其𭅒隨而釋中有撗超言依之擇瑛撗出之言與高祖祖師撗超之言挍合彼此撗一門中出名權教迃廽之教超象實教速之道又對撗超竪中可有超義之故有此分別乍守本說而開義門巧叶兩師所立名義尤可依已上六要愚禿鈔云二超者一竪超即身是佛即身成佛等之證果也二撗超選擇本願真實報土即得往生也二出者一竪出聖道歴刧修行之證也二撗出淨土胎生邊地懈慢之往生也已上愚禿鈔也廣由本願力廽向者標第五門義論註曰言本願力者示大菩於法身中常在三昧而現種種身種種神通種說法皆以本願力起譬如阿修羅琴雖皷者而音曲自然是名教化地第五㓛德相已上六要鈔二末云本願力者問是指如來本願力歟將指行者本願力歟答顯說先指行者願力雖然自利他偏依如來本願力故推㓛歸本唯是佛力下文所判他利利他分別解釋可思釋之以之言之說可言佛本願力如此義趣第一卷解二種廽向委料簡畢下解釋云𠰥因𠰥果有一事不能利他而利他言佛㓛德故所言之本願力者其㓛偏為佛本願力是以本文雖為行者願力其本意佛本願力第十八願之成就之至心廽向料簡等皆此意也今家解尺大得此意宜信也已上六要為度等者彰一心者論我一心也論註云我一心者天親菩自督之詞言念㝵光如來願生安樂心相續他想間𮦀已上問今一心者為安心為起行答註記云通二也今文指我一心之文釋起行一心之義故云相續無他想間𮦀下文釋安心之相故云三信等也問心心相續其相云何答散中止亂專注一心也又或云凡於一心有起行安心𭅒心懸所行不散不失名起行一心心中思定出離要道心係所求所歸名安心一心論我一心𨿽通二今舉起行云心相續等故取起行一心也下釋安心邊云是故論主䢖立我一心此舉安心一心故上下釋邊也矣今私云依當流意可云安心信卷本云問如來本願已發至心信樂欲生誓何以故論主言一心也答愚䤜眾生解了為令易陀如來𨿽發三心𣵀槃真因唯以信心是故論主合三為一歟乃至信樂即是一心也一心即是真實信心是故論主建言一心也應知已上六要鈔五云我一心者一心奉念㝵光佛願生安樂心心相續無他想也已上文類聚鈔云論主布廣大㝵淨信普徧開化𮦀染堪忍群生已上廣大㝵淨信者則是今我一心也𨿽然信行不離故彼先行㣪信此先信㣪行耳但當流意是一心者名他力廽向信文類云廣大㝵淨信是意也故六要鈔云論主一心行者一心其心可同是故釋云為度群生也歸入㓛德大寶海必獲入大會眾𢾗得至蓮𬜻藏世界即證真如法性身遊煩𢙉林現神通入生死薗示應化六要鈔云歸入已下三行六句論五門中第二第三第五門意也已上又云必獲等者第二門益得至等者第三門益遊煩等者第五門益今除第一第四兩門已上又云問五門之中舉此三門有何意耶答第二門者是嘆門其嘆者隨順名義稱如來名是要故第三門者其益蓮𬜻藏世故就為勝益今故出之入四門中以為㝡要舉此二門第五門者是出㓛德還相廽向利益眾生之至極故依是等義出此三門已上六要問於五念門中一門闕是非成就論註云菩入四種門自利行成就已上此義如何答第一第四非是實除只是略除問第二第三為㝡要者於四門中何論淺𭰹答名義具足是其樞紐得入𬜻藏其勝益故今就㝡要舉第二第三耳歸入㓛德大寶海者指所歸德六要鈔二本云㓛德寶海者今嘆名號㓛德甚𭰹殊勝稱宝廣大喻海論云能令速滿足㓛德大寶海已上註云使我成佛時值遇我者皆速滿足上大寶已上智光疏云佛身所有不共㓛德数過塵沙不可測量故喻如海已上六要於此文中鈔主之言偏名號論及註意通名號與淨土智光比佛身德或名號或淨土或佛身共以陀㓛德故通是云寶海海德者三界義云𬜻嚴經云大海有四熾燃光明大寶其性極𤍠常能飲縮百川所流無量大水是故大海無有增减何等為四一名日藏二名離潤三名火熖四名盡無餘若大海中無此四寶者從四天下乃至有頂其中所有悉被漂沒此日藏大寶光明照觸海水悉變為乳離潤大寶光明照觸其乳悉變為酪火𦦨大寶光明照觸其酪悉變為盡無餘大寶光明照觸其悉變成醍醐已上若依心地觀經等者大海有馬口或處名大馬口海悉流入滅盡無餘云云由此二因緣川雖入大海而無增减也已上三界義𬜻嚴二十九十地品云譬如大海以十相故名為大海無有能壞何等為十一漸次𭰹二不受死屍三餘水失本名四一味五多寶六極𭰹難入七廣大無量八多大身眾生九潮不失時十能受一切大雨無有盈溢菩地亦如是𣵀槃三十三云譬如大海有八不思議何等為八一者漸轉𭰹二者𭰹難得底三者同鹹味四者潮不過限五者有種寶藏六者大身眾生在中居住亡者不宿死屍八者一切流投至不增不减已上大藏一覽六云五分律云佛告阿難海有八未曽有大海漸𭰹潮不過限不宿死尸百川來會無復異稱萬流悉歸而無增减出真珠等寶大身眾生皆住其中同一鹹味是為八我此正法亦復如是漸制漸教漸學我諸弟子於所制戒終不敢越有犯必黜不宿容之雜類出家皆捨本姓稱釋子沙門諸善男子出家多得無餘𣵀槃而無增减有種法寶所謂四念處乃至八聖道分有諸大人四果等眾住正法中若有入者同一解脫味已上名義集三云大集云如𨵻浮提一切眾生身及與外色大海中皆有印象故名海印菩亦尒得大海印三昧已能分別一切眾生心行於一切法門皆得慧明𬜻嚴云海有奇特殊勝法能為一切平等印眾生寶物及川流普能包容無所拒無盡禪定解脫者為平等印亦如是福德智慧諸妙行一切並修無厭足已上如是𨿽海有多義依物取義不同今用一味云必獲等故必獲入大會眾数者論云弟二門者以嘆阿陀佛随順名義稱如來名依如來光明智相修行故得入大會眾数是名入第二門註云依如來名義嘆是第二㓛德相已上入大會眾數者諸上善人俱會一處意也又云聖眾俱會樂是意也得至蓮𬜻藏世界者論云入第三門者以一心專念作願生彼修奢摩他寂靜三昧行故得入蓮𬜻藏世界是名入第三門註云為修𡧘靜止故一心願生彼國是弟三㓛德相已上蓮𬜻藏世界者六要鈔云問蓮𬜻藏世界者是何土哉答智光疏云如云盧舎那佛坐蓮𬜻藏世界今言蓮𬜻藏世界者量壽佛所居住處准此世界随義為名即是修行安心之宅已上如此文者極樂𬜻藏是一土也問𬜻藏世界𥾑菩居極樂國土五乗通入何一土哉答分為兩土且隨機見達其𭰹𮌈非各別土随則極樂大乗善根清淨土故實二乗三乗之異依之智論判云一乗清淨量壽世界今論說云蓮𬜻藏界名異義同其理應知已上六要同第四云問得入蓮𬜻藏世界者是何土乎答指極樂也秘藏記云𬜻藏極樂名異處一取意問初近門中或云初至淨土或云得生安樂是極樂也次入大會眾門之㣪今得入之蓮𬜻藏界何同處乎答智光疏云量壽佛所居住處准此世界随義為名已上極樂𬜻藏雖是同處其淺𭰹換其名欤當卷中明真實證故薄地底下初生凡夫由佛願力即登地上速進八地已上之位皆得寂滅平等之法此義真實甚𭰹之故此義邊故云得入蓮𬜻藏界是則蓮𬜻藏世界者盧舎那佛所居之處報身土故為顯真證故標此名但至亍云近門宅門有其𭅒者不動極樂淨土之名即復可有𬜻藏界號如天台云豈離伽耶別求常寂非𡧘光外別有娑婆已上准彼解尺𭰹可思之已上六要五教下云以法𬜻中亦顯一乗故其處随教即染歸淨故說法𬜻處即為實也如菩提樹下說𬜻嚴處即為蓮𬜻藏十佛境界已上𬜻藏界事如大藏一覽六宗鏡錄二十八統紀卅二五教等恐繁不出良忠記云秘藏記云華藏極樂名異處一取意問如華藏界純菩居極樂世界凡聖通入彼此相異那言同也答華藏極樂土躰𨿽同而機不同者自他二力入門異故無相違失天親論主豈迷土躰更致謬解智論云一乗清淨無量壽世界二教論引經云他受用身於他受用土說顯一乗既云一乗故知極樂則𬜻藏界他受用土也問佛地論說𬜻王世界有天龍八部八部之中多是鬼畜豈言淨土論云此化非實已上即證真如法性身者六要鈔云即證等者𡧘靜三昧所入之土故得真如法性證已上同四云真如等者大乗止觀云問曰云何名此心為真如答曰一切諸法依此心有以心為躰望於諸法法悉虚妄有即非有對此虚偽法故因為真又復諸法𨿽實非有但以虚妄因緣而有生滅之相然彼虚法生時此心不生諸法滅時此心不滅不生故不增不减故不滅以不生不滅不增不减故名之為真三世諸佛及以眾生同以此一淨心為躰凡聖諸法自在𭅒別異相而真心無異無相故名為如已上又天台云法是真如由不變故真如是法由随緣故已上就言真如諸法正躰可有二意一諸法皆是虚妄之相真如一法唯是真實其真如者是心一法𠰥依此義言諸法中唯此一真是正躰也上所舉之大乗止觀叶此意欤二真如躰相不限一心森羅像三千諸法莫非真如就其相望雖有随緣不變之異色心諸法莫非真如𠰥依此義諸法悉是真如正躰是故尺云諸法正躰天台正意可合此義已上六要同二本云真如等者唯識論云真謂真實顯非虚妄如謂如常表變易已上起信論云所謂心性不生不滅一切諸法唯依妄念而有差別若離心念即一切境界之相是故一切法從本已來離言說相離名字相離心緣相畢竟平等有變移不可破壞唯是一心故名真如已上真如法性弟一義諦𣵀槃元生皆是一法之異名也已上起信論云真如自體相者一切凢夫聲聞緣覺菩諸佛無有增减非前際生非㣪際滅畢竟常恒從本已來性自滿足一切㓛德已上探要記一云問何故真如名為真如又清淨法界是何義耶對法論二云何故真如說名真如由彼自性無變異故謂一切時無我實性無改轉故說無變異當知此則是無我性離二我故唯識論云真謂真實顯非虚妄如謂如常表無變易謂此真實於一切位常如其性故曰真如即是湛然不虚妄義同論二云理非妄倒故名真如清淨法界者理性無染名為清淨作聖法因故曰法界中𨕙論云由聖法因義說為法界以一切聖法緣此生故此中界者即是因義已上要具如處尺法性者良忠玄義記二云法性者真如異名菩處胎經云法性如大海不說有是非凡夫賢聖人平等無高下唯在心垢滅取證如返掌已上大乗止觀云法者一切法以斯淨心能與諸法作躰也又性者躰實不改義諸法之相自有生滅故名虚妄此心真實不改不滅故名法性也已上弘决五云法性本淨我無始迷故迷成自望情為他自非內薰何能生悟故知生悟力在真如已上糅鈔五云正陳論清辨云法性真如亦名真如不思議真如照而常寂為法性寂而常照是法身義𨿽有二名寂照亦非二已上宗鏡八十二云法性義若真若應皆此性故若是法性凡聖皆同已上法性與真如是一法異名證卷云常樂即是畢竟寂滅寂滅即是無上𣵀槃無上𣵀槃即是無為法身無為法身即是實相實相即是法性法性即是真如真如即是一如已上真佛土卷引𣵀槃云云何一名說無量名猶如𣵀槃亦名𣵀槃亦名無生亦名無出亦名無作亦名無為亦名解脫亦名寂靜亦名無相亦名無二已上畧出要記一云凢真理名其数益多唯識中依般𠰥等立十四名謂法界法性不虚妄不變異性平等性離生性法定法住法位真際虚空界無我勝義不思議界自餘眾名不遑具述已上大乗止觀云此心即是自性清淨心又名真如亦名佛性復名法身又稱如來藏亦號法界復名法性如是等名無量無邊已上遊煩𢙉林現神通入生死薗示應化此二句者第五門益論云出弟五門者以大慈悲觀察一切苦𢙉眾生示應化身迴入生死園煩𢙉林中遊神通至教化地以本願力迴向故是名出第五門註云示應化身者如法𬜻經普門示現之類也遊有二義一者自在義菩度眾生譬如師子搏鹿所為不難如似遊二者度無所度義菩觀眾生畢竟無所有雖度無量眾生實無一眾生得滅度者示度眾生如似遊言本願力者示大菩於法身中常在三昧而現種種身種種神通種種說法皆以本願力起譬如阿羅笒𨿽無皷者而音曲自然是名教化地第五㓛德相已上六要鈔四云如法𬜻者是指觀音随類示現應機化度之利生也是則現身舉三十三為說法者標十九種此菩者極樂上首蓮𬜻部首利益廣大慈悲超倫是故出之為應化身本㨿耳已上良忠記云摩訶衍云所言應者随順根機而不相違随時随處随趣出現已上獅子等者六要鈔云獅子猛獸鹿小獸獅子之㝡易故譬菩濟度眾生得其自在神通力也玉篇云補洛切手擊也廣同之譬如阿脩羅等者彼琴自然發音之德同天寶幢准彼宜知觀經云又有樂器懸處虚空如天寶幢不皷自鳴已上疏定善義尺此文云樓外莊嚴寳樂飛空聲流法音晝夜六時如天寶幢無思成自事也已上六要遊有二義者初義事易化故㣪義理躰無故凢神通遊者大論九十四云菩亦如是以神通力故觀眾生本末應度因緣國土時節知其信等諸根猛利諸因緣具足而為說法則不空也是故說菩離神通不能饒益眾生如鳥無翅餘神力如佛自說以天眼見十𭤧眾生生死亦知眾生心随意說法乃至善修神通力而為眾生受身不為苦樂所汙是菩於眾生中或為父或為子或為師或為弟子或為主或為奴或為象馬或為乗象馬者或時富貴力勢或時貧賤於此諸事亦不為染汙譬如佛所化人作一切事不染苦樂一切事者如先作種種阿僧祇身度眾生苦樂不染者樂中不生愛心苦中不生瞋心不如生死眾生随處起煩𢚰菩應如是遊戲神通成就眾生淨佛國土問曰菩神通力有所作何以名遊戲曰戲名如幻師種種現變菩神通種種現化名之為戲復次佛法中三三昧空名為上行何以故似如𣵀槃無所著無所得故諸餘行法皆名為下下如小兒是故說神通力名為遊戲已上論文或云菩為成佛果證首楞嚴定是為自行得此定已分身散影布遍十𭤧遊戲神通利益眾生是為化他成就自行化他㓛德已竟等覺一轉入千妙覺之尅登金剛座之上垂成正覺之時名曰灌頂大法王子也或說言轉輪聖王之王子號曰灌頂大王子於五欲之薗娛樂之林遊戲自在無恐無憚無上覺王之佛子號曰灌頂大法王子於生死之薗煩𢚰之林遊戲神通自在也云云曇鸞和尚續高僧傳六云義解篇未詳其氏鴈門人家近五臺山神迹霊怪逸于民聽時未志學便往焉備覿遺𮜀心神歡恱便即出家內外經藉具陶文理而於四論佛性所窮研讀大集經因而注解文言過半便感氣用行醫療本草諸經具明正治心願所指修習長年神仙𭤧崇佛法為羕江南陶隱居大通中達梁朝帝請講佛性義帝極歎明且引入大極殿降階礼接乃至致書通問陶曰去月耳聞音聲茲辰眼受文字將由頂礼歲積故使真應來儀乃山所接對欣然便以仙𭤧十卷用酬遠意即辞還魏境逢中國三蔵菩提支唘曰佛法中頗有長生不死法勝此土仙經者乎支唾地曰是何言歟非相比也此𭤧何處有長生法縦得長年小時不死終更輪廻三有耳即以觀經授之曰此大仙𭤧也依之修行當得解脫生死鸞頂受所賷仙𭤧並火燒之自行化他流靡弘廣魏主重之號為神鸞焉下令住并洲大巖寺晚移住汾洲北山石壁玄忠寺時往介山之隂聚徒𣴎今號鸞公巖是也魏興和四年因卒于遙山寺春秋六十有七終日幡𬜻幢蓋高映院宇以事上聞乃葬于汾西𥘿陵之谷建立碑對病識緣名滿魏都又撰淨土十二偈續龍樹偈㣪又撰安樂集兩卷等已上迦戈淨土論云沙門曇鸞法師者并洲汶水人也乃至法師撰集無量壽經奉七言偈百九十五行并問一卷流行於世勸道俗等决定往生得見諸佛恒請龍樹菩臨終開悟誠如所願此𭤧報盡半霄之內現聖僧像忽逨入屋云我是龍樹便為說曰已落之不可更附枝也未束之粟不可倉中求也白馰過隙不可暫時也已去叵及未來未可追現在今何在白馰難可逥法師妙達言㫖知是告終即半夜內發遣使者遍告諸村白衣第子及寺內出家第子可三百餘人一時雲集法師沐浴著新淨衣手執香爐正面西坐教誡門徒索西方業日初出時大眾齊聲念陀佛便即壽終寺西五里之外有比丘尼寺並是門徒明相出㣪集堂食粥舉眾皆聞空內有微妙音樂矣新修往生傳佛祖統紀優曇寳鑑樂邦文類瑞應𠜂傳善人詠又如淨土記見聞之類時代者佛滅㣪一千四百二十五年生六十有七而卒五月廾六日如年代記及徹選口傳本師曇鸞梁天子常向鸞處菩礼六要鈔云鸞師尺中初之二句明朝崇重示其行德迦才淨土論云沙門曇鸞法師者并洲汶水之人也魏末高齊之初猶在神智高遠三國知聞洞曉眾經獨步人外梁國天子蕭王恒向北礼鸞菩註解往生論裁成兩卷私云前迦戈論中乃至者此文也三藏流支授淨教焚燒仙經歸樂邦六要鈔云三藏已下一行二句先明今師歸法行狀新修往生傳云初鸞好為術學聞陶隱居得長生法千里就之陶以仙經十卷授鸞躍然自得以為神仙之術其必然也㣪還洛下遇菩提支意頗得之問支曰佛道有得長生乎具能却老為不死乎支笑而對曰長生不死吾佛道也旋以觀量壽經授之曰汝可誦此則三界復生六道所往乃至此吾金仙氏之長生也乃至鸞羕其語驟起𭰹信遂焚所學仙經而專觀經已上三藏流支者具云菩提流支三藏名義集云菩提流支此名覺希北度人遍通三藏妙入惣持志在弘法廣流視聽魏宣武帝洛陽飜譯已上內典録四云梁武帝代北天竺三藏法師菩提流支魏言道希従魏永平二年至天平年其間凡歴二十餘歲在洛及鄙譯李廓錄云稱於三藏法師坊內經論本可有萬英所飜經論筆受草本滿一屋間已上如來滅㣪一千四百五十八年㣪魏弟七主世祖宣武帝治十永平三己丑三藏來朝當日本継體三年也矣天親菩論註解報土因果顯誓願往還廽向由他力正定之因唯信心惑染凡夫信心發證知生死即𣵀槃必至量光明土諸有眾生皆普化六要鈔云天親已下四行八句依論註意粗述其意論註解者見上所引迦才師釋已上報土因果顯誓願者如論所說二十九種報土因果皆是顯依法藏誓願論註下云彼安樂淨土為阿陀如來本願力之所住持受樂間又云凢生彼淨土及彼菩所起諸行皆緣阿陀如來本願力故文類聚鈔云如來本願顯稱名序分義云願皆發增上勝因依因起於勝行依行感於勝果依果感成勝報依報感成極樂依樂顯通悲化依於悲化顯開智恵之門礼云四十八願莊嚴起超諸佛利最為精已上此等意也問宗鏡四十二依𬜻嚴論明諸佛因果有其三種中二従行積修行滿多刧𭤧成果者即權教之說従行修成三僧祇刧行滿所成佛果是也矣然者法藏發願修行成佛可云權教乎答三祇修行者通於一切起信論云一切菩皆經三祇矣法藏菩永刧修行是為化他𠰥自行速覺滿法藏菩初地發心縦𨿽經刧非權教摂今𬜻嚴論意偏明權教則所難次下文云此以不了明十二有支本是法身智恵猒而以空觀折伏現行煩𢚰忻別淨門矣既以法藏證二空理通達法性上發願也猶是淨土成佛菩何煩論之問玄義五云普賢觀云大乗因者諸法實相大乗果者亦諸法實相已上宗鏡二十四引此文次引釋論云初觀實相名因觀竟名果已上如此文者因果淺𭰹法藏因果可有淺𭰹如何答經云其心寂靜志所著又云通達諸法性一切空我界求淨佛土必成如是剎已上發願當躰全無生故因果共甚𭰹彼此意惟同問縦生位𨿽發願以因望果位在菩上忻佛果淺𭰹明了如何答強論淺𭰹實相因果非無淺𭰹釋籤云大乗因果者雖俱實相因果灼然𠰥有因果即有淺𭰹如止觀中及此下文圎漸漸圎四句料簡則圎家之漸冷然可知已上法藏發願生發心是云甚𭰹也往還廽向由他力者論云云何廽向不捨一切苦𢚰眾生心常作願廽向為首得成就大悲心故已上註云廽向有二種相一者往相二者還相往相者以己㓛德廽施一切眾生作願共往生彼阿陀如來安樂淨土還相者生彼國已得奢摩他毗婆舎那𭤧便力成就廽入生死稠林教化一切眾生共向佛道𠰥往𠰥還皆為眾生渡生死海是故言廽向為首成就大悲心故已上六要鈔一云問所言廽向是為眾生所修廽向將為如來所作廽向答五念門行本是眾生所修行也而其本偏以佛力為增上緣所成就故以實而論諸佛菩皆以五余得菩提故陀正覺即修五念速得成就然五門中此廽向行往生之㣪為出㓛德成就大悲度生死海佛本願力為其本故推㓛於佛所尅唯為佛廽向也問所立之義有其證耶答同解義分第十利行滿足云復有五種門漸次成就五種㓛德乃至出弟五門者以大慈悲觀察一切苦𢚰眾生示應化身廽入生死薗煩𢚰林中遊戲神通至教化地以本願力廽向故是名出弟五門乃至菩如是修五門行自利他速得成就阿耨多羅三藐三菩提故已上註云問曰有何因緣言速得成就阿耨多羅三藐三菩提曰論言修五門行以自利利他成就故然竅求其本阿陀如來為增上緣他利之與利他談有㔫右𠰥自佛而言宜言利他自眾生而言宜言他利今將談佛力是故以利他言之當知此意也凢是生彼淨土及彼菩人天所起諸行皆緣阿陀如來本願力故也何以言非佛力四十八願便是徒設已上今家特立如來他力廽向之義專依此文已上六要猶具論註引三願用明他力義問論既云以己㓛德何云他力乎𨿽似行者行推㓛於本則所尅是為佛廽向也六要鈔二末羕憬興意云佛所行外眾生行如來廽向成就義也已上行卷云選擇本願念佛集源空集云南無阿陀佛往生之業念佛為本又云夫速欲離生死二種勝法中且閣聖道門選入淨土門欲入淨土門正𮦀二行中且拋諸𮦀行選應歸正行欲修於正行正𦔳二業中猶傍於助業選應專正定正定之業者即是稱佛名稱名必得生依佛本願故已上明知是非凢聖自力之行故名不廽向之行也已上信卷六要鈔二末云是非凢聖自力等者經云令諸眾生㓛德成就尺云言阿陀佛者即是其行念佛唯是陀㓛德更非凢夫有漏行故不借機㓛得往生益偏是自然不可思議此集本意此𭰹肯也已上同三云三心皆是如來廽向成就之利益也更非凢夫自力之心凢惑染凢夫縦發信心爭得其證随而今教不明無相離念之義煩𢚰菩提不二之悟何以閞之答非云凢夫直證此理而今名號德所歸佛果㓛德能信信心又起他力更非凢夫自力行是故發信稱其名號𨿽為不断煩𢚰𢙣機依法㓛能蜜此理已上例如六要鈔尺經其有至心願生安樂國者可得智惠明達㓛德殊勝之文云其德先指生㣪之益但亦可有通現生義𠰥其義非謂念佛之人可必獲得智惠㓛德謂其頓断生死之㓛義當得智得㓛德也問生死即𣵀槃之言有何處乎註下尺上正遍道云道者㝵道也經言十𭤧㝵人一道出生死一道者一㝵道也無㝵者謂知生死即是𣵀槃如是等入不二法門㝵相也已上此文意也言菩修五念行得早作佛知生死即𣵀槃入不二門也問何故生死即𣵀槃乎答大乗玄𣵀槃云他宗生死在此𣵀槃在彼眾生在生死佛在𣵀槃今明生死即𣵀槃故中論云𠰥求如來性即是眾生性求𣵀槃性即是世間性或經云明無明愚者謂二智者了達其性無二𠰥捨生死別取𣵀槃為愚人不離生死若知生死與𣵀槃無有差別𭤧得𣵀槃已上仁王疏中卷云菩未成佛時以菩提為煩𢚰菩成佛時以煩𢚰為菩提者譬如結巾為解者見巾妄者見亦如病者食𭥹為苦病差以向苦為𭥹更無別𣵀槃法妄故見不生死為生死耳煩𢚰亦尒迷故菩提即是煩𢚰悟故煩𢚰即是菩提已上玄義九云生死之法本即𣵀槃理𣵀槃也解知生死即𣵀槃名字𣵀槃也懃𮗚生死即𣵀槃觀行𣵀槃也善根㓛德生即相似𣵀槃也真實慧起即分真𣵀槃也盡生死底即究竟𣵀槃也觀煩𢚰即菩提亦如是已上宗鏡二十四云肇法師云道遠乎哉觸事而真可謂心境俱宗乃至是以生死如暗大道如明不去暗而即明不動生死而是道故已上牛頭要纂云生死二法一心妙用心本周遍無有去來亦無生死無相湛然一切諸佛不離生死而離生死不取𣵀槃已上具案立上引諸文又金剛宝戒又恵心草紙等在知此理名生死即𣵀槃聖道門以機情解會證悟是理而得者少故云未有一人得者淨土門意信佛願力法德蜜此理故得者甚多故云唯有淨土一門可通入路依之云惑染等也必至量等者六要鈔云必至等者生彼土已廣利眾生得自在也已上量光明土之名目出平等覺經其文云至量光明土供養於数佛已上真佛土卷云謹按真佛土者佛者則是不可思議光如來土者亦是量光明土也已上諸有眾生等者出弟五門如神通遊戲義云云道綽禪師續高僧傳六習禪篇釋道綽姓衛并州汶水人十四出家崇師遺語大𣵀槃部偏所弘傳講二十四遍脕事瓚禪師修渉空理乃至曾以貞觀三年四月八日綽知命將盡遍告事相聞而趣者滿千山寺感見鸞師在七寳舩上告綽云淨土業成但餘報未盡耳乃至年登七十忽然齕齒新生如本全無歴異加以報力体健容色盛發談述淨業理味奔流詞吐包薀乃至口誦佛名日以七萬為限乃至今年八十有四而神氣明宗紹存焉已上迦戈淨土論云沙門道綽法師者是亦并洲晉陽人也乃是前高德大鸞法師三世已下懸孫弟子講𣵀槃經一部每常嘆詠鸞師智德高遠自云相去千里懸殊尚捨講說修淨土業已見往生况我小子所知所解何即為多將此為德従大業五年已來即捨講修淨土行一向專念阿陀佛礼拜供養相續無間貞觀已來為開悟有緣時時敷演量壽經一卷示誨并州晉陽大原汶水三𮚇道俗七歲已上普解念陀佛上精進者用小豆為𢾗念陀佛得八十石或九十石中精進者念五十石下精進者念二十五石教諸有緣不向西𭤧涕唾便利不背西方㘴卧撰安樂集兩卷見行於世去貞觀十九年歲次乙巳四月二十四日悉與道俗取別三縣內門徒就別前㣪不断難可記数至二十七日於玄忠寺壽終時有白雲従西𭤧來變為三道白光於自房中徹照通過終訖乃滅㣪燒墳陵時復有五色光三道於空中現映遶日輪繞訖乃止復有紫雲三度於墳上現遺終弟子同見斯瑞已上瑞應傳云唐朝道綽禪師并州人也玄忠寺講觀經二百遍三縣七歲並解念佛自穿槵珠𭄿人念佛語常含笑不曽面背西語善導曰道綽恐不往生願師入定為佛得否善導入定見佛百餘尺問曰道綽現修念佛三昧不知捨此報身得往生否又問何年月得生曰伐樹速下斧無緣莫共語還家莫辞苦又令綽懺悔一者安居經像於淺處自居安隱房中對佛懺悔二者作㓛德使出家人對十𭤧僧懺悔三者因修建傷含生對眾生懺悔又問終時有何瑞相令人見聞曰亡日我放白毫照東𭤧此光現時來生我國果至亡日三道光白毫照於房內又見曇鸞法師七寶池中語曰淨土已成餘報未盡紫雲墳上三度現已上佛祖統紀二十八云道綽入壁谷玄忠寺曇鸞之居也專志念佛日以七偏為度勸并汾人念佛或以豆記所度者及萬斛四月八日集道俗為如來生朝慶會俄見鸞空中乗七寳船謂綽曰汝淨土堂宇已成眾復見化佛菩飄飄在空皆忻歎異同志道撫者每相見必指淨土為會綽亡三日撫聞之曰吾常期先行今乃在㣪吾加一息之㓛見佛可追矣即於像前叩頭陳露退就其座而化已上具如諸傳時代者自佛入滅當一千五百十一年師誕生日本當欽明治天二十三年云云道綽决聖道難證唯明淨土可通入六要鈔云次綽公依安樂集演其義趣道綽等者彼集上卷弟三大門有五番中弟五文引月藏經證聖道門末法修行得道難成結云唯有淨土一門可通入路已上六要集云其聖道一種今時難證一由去大聖遙遠二由理𭰹解微是故大集月藏經云我末法時中億億眾生起行修道未有一人得者當今末法是五濁𢙣世唯有淨土一門可通入路已上六要鈔弟六末云大集等者大集一部三十卷外有日藏分及月藏分各一十卷故云大集月藏分也我末法者是明滅㣪三時之中於末法時聖道修行難得證也問本經之中未勘此文如何取意文也此集上卷大文弟一明教興由時機下所載文也謂彼經中具顯五箇五百年間法住及以隱沒之相明說初三五百年中如次戒定及恵堅固第四五百造寺堅固第五五百闘諍堅固白法隠沒之文意也此正文言當卷之奥重引此集有此文也問起行修道簡別言可淨土何限聖道聖道修行在戒定恵是䇿自力淨土得道歸㓛他力故綽公意𭰹達聖道修入𭤧䡄設此釋也問聖道之教末法之中修行得果非其證何云未有一人等答今尺意少是屬多分歟不末法少分又有諸教證也當今等者綽公尺也問依綽公傳大宗貞觀一十九年乙巳入滅年八十四佛滅時代雖有異且㨿一說佛滅已來至彼乙巳一千五百九十三年然者正像各千年像法半也何云末法答今所問者是依正像各千歲說此是一義今存正法五百年說如此尺也問如前答者不聖道少有修證云云而今尺云唯有一門唯言餘何鉾楯乎答聖道修行少分得道淨土修行全分獲益皆蒙佛加不一而虚故云唯也已上六要又如决疑鈔等萬善自力貶勤修圎滿德號勸專稱六要鈔云萬善等者同尺之中或云一切眾生都不自量或云然持得者甚希是貶自力修行義也已上具文云又復一切眾生都不自量若㨿大乗真如實相第一義空曽未措心𠰥論小乗修入見諦修道乃至那含羅漢断五下除五上無問道俗未有其分縦有人天果報皆為五戒十善能招此報然持得者甚希若論起𢙣造罪生稱名憶念而明猶在不滿所願者何意答曰由不如實修行與名義不相應故也所以者何謂不知如來是實相身是為物身六要鈔尺論註文云謂不等者此有二意一謂以不知二種之身判為名義不相應義二謂違三種不相應義稱為如實修行相應問實相為物二種之身其義如何此有二義一義云實相身者此是理佛即云法性法身是也為物身者此是事佛即云𭤧便法身是也一義云實相為物二種法身共是事佛二種法身是自利利他之德即名與義實相義即是光明摂法身故為物是名即是名摂眾生故問且就㣪義既云實相何為事佛所言實相非無相義是虚實義即生佛謂佛為實眾生為虚以悟為實以迷為虚問二義之中以何為正二義共存用捨可在學者之意但名義猶親文歟已上註記云問今愚行者何知佛二身愚癡行者若知陀有威力則知實相身若知大悲摂物知為物身也又云問如實何義唯識章云無倒名如無謬名實於所緣境稱實知故名如實知云云復有三種不相應一者信心不淳𠰥存𠰥亡故二者信心不一謂决定故三者信心不相續謂餘念間故迭相𠬧摂𠰥能相續則是一心但能一心即是淳心具此三心𠰥不生者有是處已上安樂集六要鈔云第一不信是心弱故或時有行時或時不行又窺字䚯淳玉篇云之純是偏二切淑也廣云常倫切清也朴也依此等訓可通不善不淨不直等之義欤弟二不信既云不一由不一故行不一准云不相續𮦀餘行故念陀心念間断尺云餘念間故是也云云像末等者問陀教門於三時何除正法答今師出世在像法半故不謂正問此義何文意乎集上云大聖加慈勸歸極樂𠰥欲於斯進趣勝果難階唯有淨土一門可以情悕趣入𠰥欲披眾典勸處多遂以採集真言助修往益何者欲使前生者導㣪㣪去者昉前連續無窮願不休止為盡無邊生死海故已上依此文歟又依𢝰集意也一生造𢙣值弘誓至安養界證妙果六要鈔云一生等者上云唯有淨土等之同云縦令一生造𢙣但能繫意專精常能念佛一切諸鄣自然消除定得往生已上此文意也已上問一切凡夫唯知作𢙣云何常能專精繫意六要鈔三末尺念念不捨者之文云但就念念不捨者句有其二義一義云此尺行者用心意樂速拋眾事一心可勵稱名義也一義云凢夫行者此義難得一食之間猶有其間一期念爭獲相續既歸佛願機法一体能所不二自有不行而行之理故言不捨非機䇿勵是法德也依當流意㣪義為本已上今專精繫意同此意也
