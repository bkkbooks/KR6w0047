body:
  text: 善導大師新修往生傳中舉三十三今善導中弟二十五篇所載此師也大師續高僧傳山僧瑞應傳禪師西𭤧略傳和尚淨土往生傳高僧念佛鏡律師又闍利統紀法師大師者長房録十二云又大師者顯要記云善導大師於禮中尺此三心已上今依之也新修往生傳云唐京師釋善導不悉何許人周遊寰宇求訪道律唐貞觀中見西河綽禪師行𭤧等懺及淨土九品道場講𮗚經大喜曰此真入佛道之律要修餘行業迃僻難成唯此𮗚門速超生死吾得之矣於是篤勒苦𠰥救頭燃續至京師激發四部弟子問貴賤彼屠沽輩亦激悟焉導入堂則合掌䠒跪一心念佛非力竭不休乃至寒冷亦須流汗以此相狀表於誠說淨土法㐶諸道俗令發道心修淨土行有暫時不為利益三十年別寢處不暫睡眠除洗浴外曽不脫衣般舟行道禮佛𭤧等以為己住護持戒品纖毫不犯曽不舉目視女人乃至或曽不見聞披教義展轉授淨法門京花諸列僧尼士女或投身高嶺委命𭰹泉或自墮高枝焚身供養者略聞四邊向百餘人諸修梵行捨妻子者誦阿𢏏陀經十至三十遍者及得念佛三昧往生淨土者不可知數乃至導乃自念阿𢏏陀佛如是一聲則有一道光明從其口出十聲至千聲光亦如是導謂人曰此身可猒諸苦逼迫情僞變易暫休息乃登所居寺前柳樹西向願曰佛威神聚以攝我𮗚音㔟至亦來助我令我此心不失正念不起驚怖不於𢏏陀法中以生退墮願畢於其樹上投身自絶時京師士大夫傾誠歸信咸𠬧其骨以葬高宗皇帝知其念佛口出光明又知捨報之時精至如此賜寺額為光明焉已上瑞應傳云唐朝善導禪師姓朱泗州人也少出家時見西𭤧變相嘆曰何當詫質蓮臺棲神淨土及受具戒妙開律師共看𮗚經悲喜交嘆乃曰修餘行業迃僻難成唯此𮗚門定超生死遂至綽禪師所問曰念佛實得往生否師答曰各𭮧一蓮𬜻行道七日不萎者即得往生又東都英法師講𬜻嚴經四十遍入綽禪師道場遊三昧而歎曰自恨多年空文疏勞自心耳何期念佛不思議禪師云經有誠言佛豈妄語禪師平生常樂乞食每自責曰釋迦尚乃分衛善導何人端居索供養乃至沙𢏏並不受禮𭂁𢏏陀經十卷𦘕淨土變相三百補所見廟無不修葺佛法東行未有禪師之盛已上佛祖統紀二十八云善導臨淄人入大藏信手卷得𮗚無量壽佛經乃專修十六妙𮗚及往廬山𮗚公遺躅豁然增思後遁跡終南修般舟三昧數載覩寶閣瑤池𭓩然在目復往晉陽從綽禪師授無量壽經入定七日綽請𮗚所生處導報曰師當懺悔三罪𭤧可往生乃至導行化京師歸者如市忽微即掩室怡然而逝異香天樂向西而隱已上念佛鏡云善導闍梨在西京寺內與金剛法師挍量念佛勝劣高座遂發願言准諸經中世尊念佛一法得生淨土一日七日一念十念阿𢏏陀佛定生淨土此是真實不誑衆生者即遣此堂中二像釋迦𢏏陀皆放光𠰥此念佛法不生淨土誑惑衆生即遣善導於此高座上即墮大地獄長時受苦永不出期遂將如意杖指一堂中像又皆放光已上散善義奧書云某今欲出此𮗚經要義揩定古今若稱三世諸佛釋迦𢏏陀等大悲願意者願於夢中得見如上所願一切境界相於佛像前結願已曰別誦阿𢏏陀經三遍念阿𢏏陀佛三遍至心發願即於當夜見西𭤧空中如上諸相境界悉皆顯現𮦀色寶山百重千重種種光明下照於地地如金色中有諸佛菩或㘴或立或語或默或動身手或住不動者既見此相合掌立𮗚量久乃覺覺已不勝欣喜於即條録義門自此已㣪每夜夢中常有一僧而來指授玄義科文既了更不復見後時脫本竟已復更至心要期七日日別誦阿𢏏陀經十遍念阿𢏏陀佛三遍初夜㣪夜𮗚想彼佛國土莊嚴等相誠心歸命一如上法當夜即見三具磑輪道邊獨轉忽有一人乘白駱馳來前見勸師當努力決定往生莫作退轉此界穢𢙣多若不勞貪樂言大蒙賢者好心視誨某畢命為期不敢生於懈慢之心云云弟二夜見阿𢏏陀佛身真金色在七寶樹下金蓮𬜻上㘴十僧圍繞亦各㘴一寶樹下佛樹上乃有天衣桂繞正面向西合掌㘴𮗚弟三夜見兩幢極大高顯幡懸五色道路縱橫人𮗚無礙既得此相已即便休止不至七日上來所有靈相者本心為物不為己身已上具如諸傳恐繁略之出世時代自佛入滅至善導滅一千六百三十一年也壽七十歲唐弟三主高宗治三十二年永淳元壬午年日本人王四十天氏治世十一年白鳳十一年也往生之日微往生時三月草七日柳樹捨身時十四日也黑谷上人義云𫞐者入滅隨機不同云云善導獨明佛正意六要鈔云善導等者選擇集意諸師雖多獨依今師蓋請佛證揩定古今明顯別意弘願正㫖故也依之或云𢏏陀化身或勘經文直云教主釋尊再誕更不可准餘師者也已上問經云唯佛獨明了疏云佛蜜意弘𭰹教門難曉三賢十聖弗測所我信外輕毛敢知㫖趣何云明佛意約餘師如難今師既是𢏏陀化身疏云此義每夜夢中靈義已請證定竟一句一字不可加减欲寫者一如經法已上選擇集云此疏是𢏏陀傳說已上但至信外輕毛之文此謙下詞也𭈆定散與逆𢙣六要鈔云𭈆等者明所被機普兼善𢙣言定散者唯是簡機非其受法故對造逆造𢙣衆生舉定與散以為善機已上此中唯是等者定散之言簡別機義所受持非定散之法唯定機逆𢙣之機共𭈆也言自力心令歸他力即疏云上來雖說定散兩門之益望佛本願意在衆生一向專稱𢏏陀佛名是文意也隨緣𮦀善恐難生機令歸佛願是𭈆也定散者玄義云定即息慮以凝心散即廢𢙣以修善已上初從日想至𮦀想𮗚是名為定三福九品是名曰散定中有假實散中有善𢙣機云云問逆𢙣者散中所說下三品云五逆十𢙣歟下三品外有逆𢙣機乎答是惣別異謂下三品是其𢙣機三福六品是其善機共在散中不論善𢙣惣云散善今逆𢙣者下三品外雖𢙣機別顯𢙣機例如經云憍慢㢢懈怠云云光明名號顯因緣開入本願大智海六要鈔云光明等者上所引之禮前序釋意也已上其文云問曰一切諸佛三身同證悲智果圎亦應二隨方禮念課稱一佛亦應得生何故偏歎西方𭄿專禮念等有何義也六要二新本云問曰一切諸佛等者相對文殊般𠰥𮗚經致此問也所謂已云佛齊證形二別縱使念一見多乖何大道理也是述文殊般𠰥之意而問意者如𮗚經者偏歎西𭤧簡餘九域是故上𮗚面西方然者何以相違之說成一義耶是問意趣答曰諸佛所證平等是一若以願行來𭣣非因緣然𢏏陀世尊本發𭰹重誓願以光明名號攝化十方但使信心求念上盡一形下至十聲一聲等以佛願力易得往生是故釋迦及以諸佛𭄿向西方為別異耳六要云就詞中問既以佛平等之義判云平等是一何云𠰥以願行等耶果平等故雖勝劣因別故即云本發𭰹重誓願是以大乘止𮗚下云𠰥離我執證得心躰平等之時實十𭤧三世之異但本在因地未離我執時各別發願各修淨土各化衆生如是等業𭅒別不同薰於淨心心性依別薰之力故現此十三世諸佛依正二報相別非謂真如之躰有此別之相以此義故一切諸佛常同常別古今法爾已上言以光明名等者六八願中十二十三兩願意也大集經說諸佛出世有種益光明名神通說法但於其中此土教主神通說法其利殊親淨土𢏏陀光明名其益猶勝但使等者十八願意言信心者至心信樂上盡等者乃至十念佛願力者𠰥不生者誓願之意易得往生即是願力成就故也已上六要行卷云良知無德號慈父能生因闕無光明悲母生緣乖能所因緣雖可和合非信心業識無到光明土真實信業識斯則為內因光明名號父母斯則為外緣內外因緣和合得證報土真身已上開入本願大智海者論云㓛德大寶海也上如歸入㓛德之句大智者是大經佛智經云如來智惠海乃至唯佛獨明了已上海者行卷釋一乘海云言海者從久已來轉凡聖所修𮦀修𮦀善川水轉逆謗闡提沙無明海水成本願大悲智惠真實沙万德大寶海水喻之如海也良知如經說言煩𢚰氷解成㓛德水已上願海者不宿二乘𮦀善中下尸骸何宿人天虗假邪僞善業𮦀毒𮦀心尸骸乎已上行卷海義者明歸入㓛德句中竟行者正受金剛心慶喜一念相應㣪與韋提等獲三忍即證法性之常樂六要鈔云行者等者非菩等覺㣪心唯明一心念佛行者一念慶喜金剛信心已上正受者妙宗鈔云離邪倒想領納所緣故名正受已上玄義言正受者想心都息緣慮並亡三昧相應名為正受已上圎覺經注云三昧正受𬜻梵雙彰不墮邪思故名正受已上六要鈔三本釋玄義正受金剛心文云問所謂正受金剛心者金剛喻定是入妙覺之㝵道相應等者依大品意即以一念相應之惠斷餘殘習云正受等云相應等皆是指彼等覺㣪心而今何證薄地凡夫所發信心類此等金剛心乎答如載難㔟等妙二覺佛僧二寶說相皆然但今所出更非混亂等覺菩斷除四十一品明證悟四十一分法性住金剛心相應一念入其妙覺極果之位凡聖雖異淺𭰹雖異論其㓛用共為金剛心之勝利仍今引之宜得其意已上信卷末云真知𢏏勒大士窮等覺金剛心故龍𬜻三會之曉當極上覺位念佛衆生窮撗超金剛心故臨終一念之夕超證大般𣵀槃故曰便同也已上當流門人宜得是意金剛心者他力信心借喻金剛六要鈔一云言金剛者他力信樂堅固不動假喻金剛是不壞義問於金剛躰有幾德耶答梁攝論云有四義故以金剛三摩提一能破煩𢚰山二能引無餘㓛德三堅實不可破壞四用利能令智惠通逹一切法無礙已上今依此文言除疑者能破煩𢚰用利通逹無礙德也言獲證者能引㓛德堅實義也金剛頂經疏云金剛者是堅固利用二義即喻名也堅固以𨐫實相不思議祕密之理常在不壞也利用以喻如來智用摧破惑障顯證極已上由堅固故獲得如來真實㓛德由利用故除却疑所覆迷也又云世間金剛有三種義一不可壞二寶中之寶三戰具中勝已上又梵網古迹上云金中精牢名曰金剛已上以此等文應知金剛堅固之義問所出諸文皆以佛果㓛德𨐫彼金剛今𨐫凡夫淺位信樂何輒比之雖似凡夫所發信心此心發起如來選擇願心是故全非凡夫淺位自力信故或云清淨或云真實故玄義云共發金剛志撗超斷四流已上散善義云此心𭰹信由𠰥金剛已上師釋既爾今釋無失已上六要今釋者教卷云難信金剛信樂等文以此等意應知今句與韋提等獲三忍者韋提得忍者經云以佛力故當得見彼清淨國土如執明鏡自見面像見彼國土極妙樂事心歡喜故應時即得無生法忍已上序分義云言心歡喜故得忍者此明阿𢏏陀佛國清淨光明忽現眼前何勝踊躍因茲喜故即得生之忍亦名喜忍亦名悟忍亦名信忍六要三末云言心等者約𮗚成相但雖外標𮗚門之益內顯念佛所得之益所以知者云清淨業先約懺悔雖釋清淨㣪就念佛滅罪之義釋清淨義則彼文云依下𮗚門專心念佛住想西念罪除清淨也已上其機又云煩𢚰賊害失此法戝是顯念佛所被之故知所得生之益是又可在念佛之益故云踊躍云因此喜云得喜忍是顯信心歡喜得益言悟忍者悟佛智故言信忍者即是信心成就相也上人當卷被引此文更不被𬾨𮗚門之益是依念佛得益之邊所被引也已上此乃玄談六要云此乃等者玄先正說舉其利益令人悕之故云玄談未標得處欲令夫人等悕心此益六要云未標等者雖言得忍未明分齊故云未標勇猛專精心想見時𭤧應悟忍六要云勇猛等者且就𮗚法修行相㒵𭄿其䇿勵智度論云禪定智惠非精進者不成已上蓋此義也已上此多是十信中忍非解行已上忍也六要云此多等者雖為薄地信外凡夫今依他力超絶強緣成就信根故就得忍謂之十信是故上人正信偈云與韋提等獲三忍即證法性之常樂下文亦云獲金剛心者則與韋提等即可獲得喜悟信之忍已上當流意者以六要鈔可為指南𭰹可思之信卷云加之獲金剛心者則與韋提等即可獲得喜悟信之忍是則往相廽向之真心徹到故籍不可思議之本誓故也已上即證等者六要鈔云即證等者往生禮前序釋云捨此穢身即證等意已上此釋不是文玄義序題門釋也筆者誤歟玄義云唯可勤心奉法畢命為期捨此穢身即證彼法性之常樂已上六要四云唯可等者勤心安心奉法起行畢命為期四修之中舉長時修攝餘三修捨身者明往生益即證等者即顯證理言法性者是則真如亦是實相言常樂者常者即是無量壽躰樂者即是安樂之義即又法性聖道淨土二門雖殊得脫之道共證此理而聖道門於此土中即身悟之淨土之教依佛願力生彼土後得此證也已上六要證卷云常樂即是畢竟寂滅寂滅即是上涅槃上涅槃即是為法身無為法身即是實相實相即是法性法性即是真如真如即是一如已上大乘止𮗚云法者一切法以斯淨心能與諸法作躰也又性者躰實不改義諸法之相自有生滅故名虗妄此心真實不改不故名法性也已上大般若立十二法謂真如法界法性不虛妄性不變異性平等性離生性法定法住實際虛空界不思議界出玄記一起信論云如來藏皆是法性異名也源信和尚法𬜻驗記云源信僧都本是大和國葛木下郡人也父卜部正親誠雖道心性甚質直也清原氏有極道心生一男四女為求子祈參詣郡內靈驗高尾寺夢有住僧以一玉與之云云即有懷妊生男子即修年三齊戒之間於高尾寺夢見堂中有藏其中有種種鏡或大或小或明或暗爰有一僧取一暗鏡與之小兒陳云於此小暗鏡何用之乎欲得彼大明鏡僧答云彼非汝分汝分是也持至撗川可加磨瑩云云夢覺之㣪不知撗川何處㣪有事緣登於山大僧正慈慧大師待請為弟子矣僧都天性聰慧而又正直習學法門道心堅固讀誦法𬜻經了𭰹義文文句句開通無㝵也五種法師㓛德具足四種三昧行法成就自宗他宗共極源底顯教密教𭰹得其意佛法棟梁善根洪基也迄壯年時背利養名聞山門𭰹閇跡串戒律玉為身上莊嚴瑩𮗚慧鏡見心性三千靜誦法𬜻敢無知人𭰹望極樂誰量所期矣製一乘要决顯一切衆生皆成佛之圎意𭤟定性無性不成佛之偏執當此時而夢馬鳴龍樹摩頂隨喜傳教大師合掌而言我山佛法永付屬聖人撰往生要集示極樂之指南施菩提之資糧其時夢告云𮗚世音微笑授與金蓮𬜻毗沙門捧蓋㘴立侍利生巧智弘法便難思議也造於八和遐𨒛都鄙貴賤上下乃至無間非法邪見放逸之暗聾幼童普令暗誦一代聖教𢏏陀迎接之相顯莊嚴之儀世間云迎誦集其庭者緇素老少乃至放蕩邪見之輩皆流不覺之結往生之業五躰投地種菩提之因修頭陀之行交人間時善神相副隨逐守護𭰹夜獨㘴思惟法門欲見要文忽於燈臺有自然火雖有如是等希有之事更𭰹匿藏不語他人造經論疏抄顯蜜教文其數雖多不遑注記天台宗佛法臨此時誠盛乃至大唐皇帝降宣㫖建立廟安置影像及往生要集授大師號諡圎通大師度度聞唐人之傳敬禮拜本朝稱其住處及諱瞻仰羕仕矣僧都實取重病其間極久雖然念佛讀經不退𮗚念行法不怠時有宿老僧夢云金色沙門從空下向僧都與語僧都乍卧病席合掌含笑向僧談語若是諸佛說法歟又或夢示之僧都卧蓮𬜻上近邊生千蓮𬜻傍人問云是何蓮𬜻天有音告云此是妙音菩所現蓮𬜻指西應行云云定知此所𢚰即生死流轉業苦今生受盡也轉重輕受蓋謂之歟乃至遷化已前兼兩三日所𢚰皆悉平愈無一分苦痛起居輕利身心安樂氣色作法如壯年時臨最㣪時集院內名德學徒而告云今生面謁只此時計也若法門中有疑難者論說可决其疑大衆或問法門要義散心雲霧或惜此界別離從眼流僧都氣色忩似入滅近大衆皆還畢慶祐阿闍梨密示云年來之間以一乘善根事理㓛德廽向西願往生極樂上品下生今有二天童而來下云我兜率天𢏏勒菩使者也聖人偏持法𭰹解一乘理以此㓛德當生兜率是故我等為迎聖人今來斯處有數天可迎接我等且示告耳僧都語天童言生兜率天奉見慈尊雖極善根弟子頂年𭰹有所願捨身他世往生極樂面見𢏏陀聽聞妙法慈尊加力送我極樂界當并𢏏勒天童早還以此誓言當啓慈尊云云又近來頻𮗚音來見是故無疑必生極樂慶祐阿闍梨聞畢流隨喜僧都迄春秋七十六以寬仁元年丁巳六月十日寅時永遷化矣當於此時天奏妙音樂或人聞樂音從西指東來或輩聞樂音從東指西往又香風頻吹奇妙香氣滿虛空草木枝似萎𮕱形向西傾𫢏涕嗚咽聲滿於山林悲泣戀慕遍院內矣又續往生傳云黃門侍郎江匡房作𫞐少僧都源信者大和國葛木上郡當麻鄉人也童兒之時登延曆寺師事慈慧大僧正自少年時才智輩問决疑之庭莫不令屈辱其人常云俱舍因明者於穢土極之唯識期淨土宗義待佛果所作之書往生要集三卷渡於宋朝彼國之人向其影像自宋朝求生前寫真影延圎阿闍梨書之稱楞嚴院源信如來又因明注釋三卷并疏一卷對俱舍抄十五卷要法門二卷一乘要决三卷并大小義式等𢝰而計之及百餘卷皆為一宗之鑑末學之耳目已上或𫝊云有人於楞嚴院講往生要集時夢中見一人神僧形貌端正也問誰人乎我是源信僧都今於極樂名新聚菩是也講讀此集尤隨喜故來告而已云云有云早世㣪乘白雲上告云我是極樂久住菩化緣已盡歸本土云云是告三井慶祐大阿闍梨室之言也已上出抄元亨釋書同法𬜻驗記時代者寬仁元年人王六十八㣪一條院即位之年也從佛滅當一千九百六十六年也源信廣開一代教偏歸安養𭄿一切六要鈔云楞嚴中初二句者標諸教中選歸安養偏𭄿西已上往生要集依諸經論立十門中九門是專念佛要義弟一門是為九門為其由致也標其意即序文云依念佛一門聊集經論要文已上𭄿一切者或云道俗貴賤誰不歸者或云只是男女貴賤不簡行住㘴卧不論時處諸緣修之不難問師是台宗法𬜻讀誦何云偏歸為血脉師答名雖台宗心在念佛志期淨土故云偏歸為相羕師古德𫝊云源空聖人云即往生要集為先逹入淨土云云問空師𫝊意依八軸書即入淨土稱故法然是其證也何依要集答前依要集㣪依八軸何一偏問縱雖念佛既練磨師豈非𮦀行答如龍樹等縱雖兼學所期極樂故為祖師今師是專𭄿淨土具見要集云云專𮦀執心判淺𭰹報化二土正辨立極重𢙣人唯稱佛我亦在彼攝取中煩𢚰鄣眼雖不見大悲倦常照我六要鈔云專𮦀以下三行六句別依要集辨其義趣專𮦀等者彼集下末引群疑論問答之中明𮦀修人執心不生懈國專行之人執心穿固生極樂國是判專𮦀二修得失又所辨立報化二土得失文也已上其文云要集下末問菩處胎經第二說西𭤧去此𨵻浮提十二億那由他有懈慢界國土快樂作倡伎樂衣被服飾香𬜻莊嚴七寶轉開床舉目東視寶床隨轉北視西視南視亦如是轉前後發意衆生欲生阿𢏏陀佛國者皆𭰹著懈慢國土不能前進生阿𢏏陀國億千衆時有一人能生阿𢏏陀佛國已上以此經准難可得生答群疑論引善導和尚前文而釋此難又自助成云此經下文言何以故皆由懈慢執心不固是知𮦀修之者為執心不之人故生懈慢國也若不𮦀修專行斯業此即執心固定生極樂國乃至又報淨土生者極少化淨土中生者不少故經別說實不相違也已上此文之中群疑論引善導和尚前文者問要集中今問答前引𠰥能如上念念相續畢命為期者十即十生百即百生𠰥欲捨專修𮦀業者百時得一二千時得五三文是云前文然群疑論云善導禪師𭄿諸四衆專修西方淨土業者四修靡墜三業𮦀廢餘一切諸願諸行唯願唯行西一行𮦀修之者不一生專修之人千一失何要集以𠰥能等文合此文云前文乎答群疑論文是取意也判淺𭰹者𮦀行為淺專修為𭰹化土為淺報土為𭰹報化二土者報是一種不可思議實報土也化者邊地胎生問邊地胎生同異如何答六要六本云問胎生邊地同異如何答是同處也鸞師所造略論釋曰安樂國土謂之邊地亦曰胎生邊地者言其五百歲中不見聞三寶義同邊地之難乃至邊言其難胎言其暗已上六要問定善義云𭇥未出或生邊界或墮宮胎已上愚鈔云就𢏏陀化土有二種一疑城胎宮二懈慢邊地已上爾者如何答法門名目有一種名有二義有二種名有一義今示一種名有二義六要六釋定善義文云言邊界者是顯化土非其報土言宮胎者是顯處宮處胎之失唯是𦂶言示得失也言其得者是得往生言其失者非報土耳已上聖戝論云疑惑佛智而求往生者不信本願多𮦀諸善雖生彼國處彼𬜻胎比之宮殿或名邊土已上問愚鈔云二懈慢邊地已上此意者懈慢邊地是同處乎彼邊地者在極樂內懈慢國者極樂外也胎經云西去此𨵻浮提十二億那由他有懈慢界十因云又非唯有胎生邊地亦於道中且有化城為懈慢國已上爾者如何答雖難知且解有二義一義云要集記良忠云但平等覺經於極樂內說懈慢國同名異躰云云如是義者云同云異各依一義一義云二懈慢邊地者不分同異就化土難顯其名也凡當流意邊地懈慢疑城胎宮及九品相束謂化土其報土者弟一義諦妙境界相也六要六本云問所言𮗚經所說土者十三定善所𮗚淨土并九品土共化土歟惣標𮗚經分別言是故可云共化土也問共以有疑先就定善所𮗚淨土其土教主已是真身其真實身所居之土即應真土何化土乎次就九品極樂世界是𢏏陀佛本願所成之淨土也言九品者於其淨土所建立也𢏏陀淨土為報土者何言九品非報土乎九品外有何淨土得報名哉𢏏陀本願所成之土判為報土一家定判不及異論但九品土報化分別高祖大師解釋未决諸流面異義皆在末學料簡是則諸師異解區故各任意樂又就本習依彼用此而集主意以𮗚經土判為化土九品之土是為其攝凡真報土唯是一種不可思議真妙土也但亦就言九品是化聊有通局言𢝰意別所以然者於九品中上品上生之一品者是真土也是則名號所入之土三心具足得生土也真化諸土皆悉攝在九品中故𢝰云九品下之八品假立土也故𭘧九品名言邊者是化土離其名目只是一種退謂所標之一種者當彼上品上生土也可分別之凡九品中上六品者約大小乘修善之別下三品者約輕次重造罪之異加之𬜻開遲𭅒降𬜻開已㣪得益不同皆是善𢙣因果配立自力修入之說相也斯乃餘行非佛本願劣行故不生報土今九品相皆是邊地化土相也稱名念佛必生報土此是如來本願故也𢏏陀如來酬因願身極樂淨土酬因報土念佛三昧宿願之行必生本願所成報土其報土者本論所說二十九句莊嚴㓛德弟一義諦妙境界相是其土也平等覺經名土言無量光明土淨土論說土名言蓮𬜻藏世界同論又說土相言究竟如虗空是真實報土之相唯稱佛名所入土也問上六品者依受法異分其階位且化土其義可然下三品者共行念佛隨而十𢙣破戒五逆造罪之機只依一聲聞名十念臨終遇善得生淨土以之為奇依之餘人皆言報土何言化乎答彼下三品既說多劫𭇥𬜻之相此非正覺𬜻化生相是假立也約此義意雖修念佛是為自力起行往生故下上云聞三寶名即得往生已上釋云法僧通念亦得去也已上𠰥約報土往生之義多劫胎生是可假立則云十劫須不覺盡等蓋其意也多劫𬜻開縱非實義假立相者是化土也是故約𭘧九品名言之義邊者可化也已上六要又云問今此邊地報土攝歟答集主之意判為化土報土外也𠰥報土者當卷之中不可明也問自餘諸家皆言邊地在報土中是則大師定判唯報非化故也何背彼義云化土耶答諸家所立匪所是非大師定判誰不依慿但今唯報非化之義自他領解其意相異今所言之唯報非化諸師所判或云報身或云化身或又云通報化二身異義万不一决故不依彼等蘭菊異義今正為顯揩定實義偏所定判報身義也是則指彼名號所入之土釋云則是酬因之身乃此意也謂之唯報謂之非化言然非謂於𢏏陀佛無應化身有化身者可有化土三經所標既說彼佛有其化佛何無化土一切諸佛皆具三身𢏏陀一佛豈無隨類應現身土問九品邊地共化土者是同處歟答集主之意共雖化未判同異諸師之意或以邊地攝三輩內或以胎宮為九品外依為異解同異輒以難定故耳問大師釋中解此事耶答宗家釋中同異不明於宗家釋中學者各存異義者也問諸師之中何師令立何義趣耶答鸞師所立存各別義故略論云又有一種往生安樂不入三輩謂以疑惑心修諸㓛德已上元曉同之謂彼釋云生邊地者即是一類非九品攝已上法位又同家存同義彼義記云受胎生者在何品中依兩本皆說在於中下品中乃至雖起疑惑然不誹謗𭘧疑惑心修㓛德故雖生彼國而生在邊地於五百歲不能見佛聞法修行如在胎中無所見聞是故說名受胎生也已上興師又同舉諸師釋各破其義遂成自義彼疏釋云有說更有往生而非三輩謂下文中疑五智人疑惑心中修諸㓛德亦信罪福少修善本願生彼土以信不定故非前六少修福故亦非㣪三由此不入九品所攝此亦不然帛謙皆云中輩之人狐疑不信雖生彼土在其城中於五百年不見佛不聞經不見聖必不可言疑智凡夫不在九品乃至今即疑佛五智中下下下二生所攝由此帛謙㣪之二輩皆言在城於五百年不得見佛聞法見聖故𠰥三輩𠰥九品皆無寬狹攝往生盡已上同師又釋經說胎宮云百由旬五百由旬之義意云百由旬者即下輩疑佛所生之宮五百由旬者則中輩疑智所止之宮已上此師之意三輩之內攝胎生也已上六要問懈慢邊地疑城胎宮其得名何答要集記云智首抄云以毀責故名懈慢約人得名已上問有佛來乎答群疑論六云佛𠰥來即是西淨土業成豈容佛而生懈慢國也已上問有能化佛乎答要記八云能化有無暗以難測只是現土且接𮦀修非別佛有如彼邊地故經論中不說有佛又可有能化經文不說是略而已邊地即在極樂界中故不可有別能化佛懈慢異彼國在別處莊嚴亦殊不可例同彼界邊地云云邊地得名如前略論疑城胎宮者六要鈔云問疑城胎宮是同處歟是別處歟又此得名其意如何答是同處也疑惑行者所止城故謂之疑城簡彼化生謂之胎生則此胎生處宮殿故言之胎宮則邊地也大經下云汝等冝各精進求心所願得疑惑中悔自為過生彼邊地七寶宮殿五百歲中受諸厄也已上六要極重𢙣人等者六要鈔云極重等者同集本大門弟八念佛證據門中出十文內四依𮗚經所出釋之極重𢙣人他已下四言四句要文意也已上其文云𮗚經云極重𢙣人他便唯稱念佛得生極樂已上他便者不堪餘行選擇集云下品下生是五逆重罪之人也而能除滅逆罪所不堪餘行唯有念佛之力能堪滅於重罪故為極𢙣最下之人而說極善最上之法已上問極重𢙣人文經之如何答取意文也𭰹符經㫖有記要集記引之云㣪一條御𡧃出離疑往生指掌肝要明文可擇進之由山門之處諸衆同心而進此文誠有所以哉云云我亦在彼等三句者六要鈔云我亦等者同集上末大門弟四正修念佛假之中有五門內中末弟四明𮗚察門於中有三一別相𮗚二惣相𮗚三𮦀略𮗚其𮦀略𮗚引彼𮗚經一一光明遍照等文其下所釋我亦在彼攝取以下四言六句二十四字文意也已上六要其文云又彼一一光明遍照十世界念佛衆生攝取不捨我亦在彼攝取之中煩𢚰障眼雖不能見大悲倦常照我身已上源空聖人拾遺古德傳云黑谷源空上人美作國久米南修稻𦊆莊人也父湈間時國𥘿氏也九歲當國菩提寺𮗚學德業為弟子其㣪十五歲登山西北谷入法地坊源光室源光見此兒器量云我是愚䤜淺才也不堪此奇童提撕須業於受碩學究圎宗奧義而㣪付㓛德院阿闍梨皇圎習法門其㣪十八歲黑谷隱居付慈眼坊空請指南此住披覽一切經五遍然㣪承安四年依光明寺𮗚經疏立淨土宗仍出黑谷住吉水已上元亨釋書述諸傳意云釋源空姓漆氏作州稻岡人也父時國𥘿氏父子祈佛神夢吞剃刀覺語千夫夫曰汝有身乎恐稚染之人矣因而孕不茄葷腥長承二年四月七日生頭而稜眼黃而光宗異之至四五歲舉止動向西九歲父被寇害一家噪逃空自屏處偵之以小弓矢射寇中其眉間寇者源長明寬治帝之衛曹也為其額瘡可證發遂隱而終身時呼空為小矢兒郡之菩提寺𮗚學聞之為弟子性善習學學嘆曰此器兒何可居草澤乎送與延曆寺源光光曰此童駿驥也非吾朽索之所羇也即投㓛德院皇圎剃落受戒時年十五三㫷之間通受台教又從黑谷睿空密乘及大乘律凡大藏經律論他宗疏靡不撿閲矣又云八宗之外涉佛心宗於九教相粗得幽致晚見信師往生要集乃棄所業倡淨土專念之宗承安四年出黑谷居洛東吉水盛說專修及圎頓菩大戒緇白靡然向風嘉應帝召入宮受戒藤相國兼實延問淨土之事空述選擇集呈之專修之徒取為祕要矣又云元久三年正月四日𢏏陀𮗚自在大㔟至三像現室中五日三像又見建二年春二月竄州居五稔空曰吾不因謫爭布專修之道於海𮖭乎亦我一化之幸也建曆元年詔追赴都城二年正月居大谷染其徒安𢏏陀像於床頭且為臨終助標空曰此像外汝等有所見乎諸弟子曰無空曰我十餘年來荐視極樂界相及佛菩真身今又佛來也二十五日朝高唱佛號諸徒助和久而皆聲嗄空獨不𮕱而至午時其㣪著持之慈覺僧伽梨頭北面西誦光明遍照偈而寂年八十臘六十六空亡之前二三日紫雲降坊上已上略出聖覺記云上人昔崇德院御𡧃長承二年癸丑誕生久安三年志學攀登睿峯同年登壇同六年二九隱居黑谷承安五年乙未歸善導疏入專修門四十三謂為出離生死雖學一切教而當我機失得度門㣪入報恩藏周覽積年披一切經已及五遍和尚八軸之書亦覽五遍文幽義未得其㫖然㣪別開八卷亦看三遍前㣪補攝𥨱窺八遍至一心專念𢏏陀名號之文正解素意偏行念佛云云本師源空明佛教憐愍善𢙣凡夫人六要鈔云次黑谷初之二句𢝰稱智解悲心二德已上初句智解㣪句悲心如次是當自行化他佛教者問經與教何答論注云持佛經與佛教相應已上有云佛經中廣說教理行果四故經舉說教別舉能詮教意歟云云真宗教證興片州選擇本願弘𢙣世六要鈔云次之二句別嘆片州弘通巨益已上文中真宗者有重重今是淨土真宗也六要一云言真宗者即淨土宗也散善義云真宗叵遇已上五會云念佛成佛是真宗已上問五會中依大般𠰥經作離六根云色性本來鄣㝵來去是真宗已上聲性香性味性觸性法性皆同是以般𠰥名真宗歟又𦒿闍法師立六宗時一以毗曇名因緣宗二以成實名假名宗三以大品及同大論名誑相宗四以𣵀槃并𬜻嚴經名常住宗五以法𬜻名曰真宗六以大集名曰圎宗如此義者真宗之名正在法𬜻何限淨教獨名真宗答離六根雖依般𠰥既是淨土五會文是則淨土法性常樂畢竟生甚𭰹之理契般𠰥相空理故真宗名不必般𠰥是被淨土次至𦒿闍法師立名法𬜻𢏏陀內證同躰彼為聖教此為凡教所被之機聖凡雖殊所說之法共是一乘真宗之稱彼此蜜通此是今家不共別意而言之廣於佛教立真宗名又非所圭峯盂蘭盆經疏云良由真宗未至周孔且使繫心已上靈芝同新記釋之真宗即佛教已上依此義邊五會六宗所立之名又所限通別兩意並可存之但真宗名於念佛門殊有其理大經說為真實之利小經亦云說誠實言一代教中實為凡夫出離要道真實宗㫖其義應知已上六要問就此文其義不明般𠰥空理合淨土德法𬜻內證與陀同爾者勝劣乎答理同躰共一乘也雖然還機修行之時非勝劣機情為劣佛智為勝問㣪文而言之等者對儒教假佛教為真此義不可然彼新記云周公孔子皆是大𫞐矣清淨法行經云我遣三聖化彼震旦已上然者儒教即佛教何答佛遣三聖是入佛教由致便故新記云四時祭祀非本聖意問𮗚經說三福云三世諸佛淨業正因已上爾者仁義世善諸佛正因是義如何答雖世善根廽入佛法則為正因非世善獨云淨業因問散善義釋世福云弟一福即是世俗善根曽來未聞佛法但自行孝養仁義禮智信故名世俗善也已上爾者雖不廽入可為正因如何答是文但釋世善躰為正因時必可廽入故次下文釋世善為正因義云或有一人單行世福廽亦得生已上故云真宗有通別義通者即是以佛教名曰真宗疏云由真宗未至記云真宗即佛教是通義也言以儒教為假以佛教名之真宗此時念佛一度得真宗名別者分又為四一對小乘大名真宗此時念佛二度得真宗名二大有𫞐實對𫞐大乘以實大乘為真宗也此時念佛三度得真宗名三於實大中分別二門以淨土門名真宗也此時念佛四度得真宗名淨土門中就行二種即以正行選名真宗其正行者口稱念佛此時念佛五度得真宗名是故名曰淨土真宗教證者具教行證為調七言不言行也選擇本願者如選擇集𢏏陀本願末世應故云弘𢙣世片州者具粟散片州一國餘名曰大國國已下四千已上乃為中國三千已下七百已上為之小國六百已下三百已上小不為國震旦一千九百餘國日本𦆵是六十餘國故不為國但百濟國日羅上人來拜上宮云敬禮救世𮗚世音傳燈東粟散王從於西來誕生演說妙法度衆生云云不名國者不可言王要記八云案仁王經世間帝王有其五種四輪王外皆名粟散拪復鈔云小王是粟散王粟者喻散者多也小王數多猶如散粟已上弘明集云䄅皇漢武𨵻浮提內唯王震旦五種王中粟散王劫初一畨王也如日羅禮和國帝王亦粟散攝已上還來生死輪轉家决以疑情為所止速入寂靜為樂必以信心為能入六要鈔云還來已下二行四句就選擇集舉釋義要所謂當知生死以下二十言意也已上其文云當知生死之家以疑為所止涅槃之城以信為能入已上集云涅槃偈云寂靜為共是一法異名大經云無為自然法事云極樂為禮云三昧無為即涅槃𮗚經疏云西寂靜為樂畢竟逍遙離有無定善義記一良忠云彼土躰是一法句故無動轉故為寂靜造作故名為為離有為苦故名為樂依正莊嚴快樂窮名為畢竟逍遙云云名義集引涅槃論云無為者取其虛無寂寞妙絶於有為已上名義集問頓悟要門云有因無立無因有顯本不立有無從何生若論真無為者即不取有為亦不取無為是真無為法也何以故經云若取法相即著我人若取非法相即著我人是故不應取法不應取非法即是取真法也已上今何堅執云無為樂答既云畢竟逍遙離有何執著有不起念想願哉問為者作為義然淨土是願力修起何云為答一法句者清淨句者真實智惠為法身始本合性相一如湛然常住全水全波具糅鈔及事見聞所所可見次生死輪轉者生死者名義集云梵云闍提闍五蘊初起名之為生勝鬘云生者新諸根生死者故諸根滅已上生死二種一者分假二者變易分假者身有形假壽有分限三界六道死此生彼又云有漏生死又云有為生死此依身者分分假假故名之曰分假生死大乘義云分假生死者六道果報三世分異名分假分假法始起名生終謝稱死已上變易者於四聖因果論生死漏業為因明為緣又云無為生死有云不思議變易生死謂所知障為助緣發漏大願大悲業所感得細妙殊勝異熟依身也變者轉變易者改易也謂由漏悲願力改轉分分假假麁劣身得細妙無限身故名變易所助漏定願力妙用難測故名不思議也云云又七種生死者一者分假其義如前二者流來迷真始也三者反出離癡始也未得涅槃四者𭤧便入滅二乘所得生死五者因緣初地已上所得生死六者有㣪十地所得七者㣪金剛心位所得生死前三即是凡夫生死可攝分假㣪四即是聖者生死共攝變易今還來生死偏是分假還來者安樂集云從始劫來在此輪廽窮受身數如智度論云在於人中或張家死王家生王家死李家生如是盡𨵻浮提界已上又云如涅槃經說取三千大千世界草木截為四寸籌以數一劫之中所受身父頭數猶自不澌已上十因記云心地𮗚經三唐般若三藏譯云有情輪廽生六道猶如車輪始終已上大經二十七曇纖譯云善男子如蠶作繭自生自死一切衆生亦復如是不見佛性故自造結業流轉生死猶如拍毱已上論注云見三界是虛僞相是輪轉相是無窮相如蚇尺音蠸屈申蠶一郭反循環如蝅才含反蟲衣公殄反自縛已上愚迷發心集云夫無始輪廽以降死此生彼之間乃至先生又先生都不知生生前來世猶來世全無辨世世終已上故上云還來下云輪轉𠔏迷久也輪轉者止𮗚一云善𢙣輪環已上弘決云善通非想𢙣極間升而復沉故名為輪始際喻之如環已上或云久流生死或云循環去來或云六道周居皆是輪轉窮義也如是輪轉疑為所止問輪廽生死不應限疑宗鏡七十三云生死流轉所依事有三經云有三種流轉一是處流轉於三世處由我分別二是事流轉由外六處由我取執三如是而轉諸業異熟相續流轉已上圎覺經云一切衆生從無始際由有種種恩愛貪欲故有輪廽又云當知輪廽愛為根本已上或云諸苦所因貪欲為本或云依癡何今限云疑情所止答流轉業因不限一種實如所問今言疑情對信言也下句以云信能入故散善義云𠰥起疑謗者縱使千佛繞身無由可救也已上又云行者雖覩靈儀疑心恐不得往生已上是對信以誡疑情也必以等者佛法大海以信能入意也具如題下云云弘經大士宗師等濟邊極濁𢙣道俗時衆共同心唯可信斯高僧說六要鈔云弘經已下二行四句結諸祖濟之德𭄿所依信彼等說耳已上弘經等者四依弘經有其重重先於四依人四依法四依行四依今人四依就人四依𠰥依小乘涅槃經六云善男子是大涅槃微妙經中有四種人能護正法建立正法憶念正法能多利益憐愍世間為世間依安樂人天何等為四有人出世具煩𢚰性是名第一須陀洹人斯陀含人是名第二阿那含人是名第三阿羅漢人是名第四是四種人出現於世能多利益憐愍世間為世間依安樂人天已上𠰥依大乘玄義五云五品六根為初依十住為二依十行十廽向為三依十地等覺為四依已上又涅槃論云歡喜地為初依六地為二依八地為三依法雲地為四依已上依此等說弘經大士者指龍樹天親宗師等者指下五祖又依一義𣵀槃經六云善男子若有衆生於連河沙等諸佛所發菩提心乃能於是𢙣世受持如是經典不生誹善男子若有能於一恆河沙等諸佛世尊發菩提心然㣪乃能於𢙣世中不是法愛樂是典不能為人分別廣說善男子若有衆生於二恆河沙等佛所發菩提心然㣪乃能於𢙣世中不是法正解信樂受持讀誦亦不能為他人廣說若有衆生於三恆河沙等佛所發菩提心然㣪乃能於𢙣世中不是法受持讀誦書寫經卷雖為他說未解𭰹義若有衆生於四恆河沙等佛所發菩提心然㣪乃能於𢙣世中不是法受持讀誦書寫經卷為他廣說十六分中一分之義雖復演說亦不具足若有衆生於五恆河沙等佛所發菩提心然㣪乃能於𢙣世中不是法受持讀誦書寫經卷廣為人說十六分中八分之義若有衆生於六恆河沙等佛所發菩提心然㣪乃能於𢙣世中不是法受持讀誦書寫經卷為他廣說十六分中十二分義若有衆生於七恆河沙等佛所發菩提心然㣪乃能於𢙣世中不是法受持讀誦書寫經卷為他廣說十六分中十四分義若有衆生於八恆河沙等佛所發菩提心然㣪乃能於𢙣世中不是法受持讀誦書寫經卷亦𭄿他人令得書寫自能聽受復勸他人令得聽受讀誦通利擁護堅持憐愍世間諸衆生故供養是經亦勸他人令其供養恭敬尊重讀誦禮拜亦復如是具足能解盡其義味乃至是故汝今不應不知未來世中護法之人何以故是發心者於未來世必能護持無上正法已上略頌云凞連受持不誹一愛樂二讀誦三淺義並初依四一五八弟二依六七十二四三依八恆十六弟四依已上依是義者七祖皆是弘經大士也道俗者出家五衆名道在家二衆名俗即指道俗謂之時衆近指集主在世云遐代二衆出家五衆者一比丘受持二百五十戒也二比丘尼受持五百戒但毗尼討要依戒本云三百四十八戒三沙𢏏十戒四沙𢏏尼如前五式又摩尼正學六法言二衆者一優婆塞五戒二優婆夷同前問末法戒何以分別道俗二衆釋云五戒十善持得甚爾者如何答末法就形分別二衆具如豫未來記破誤當流門人其義應知云云夫高高而不盡其量者本法𭰹𭰹而不窮其限者一心語默不能通智識不能詣絶於生佛泯於自他爰忽然三科風起六曲波激是故如來轉法祖師垂訓然則念佛入道之真門出離之要路仍集主捨聖歸淨行成化溢偈即祖師領解已證蓋以為文類一部之樞紐即詣西之指南文簡義博諷易㓛多頑魯非所知短解非所窺雖然今也附六要大鳳尾叨作蚊虻小量注㓛成繕寫分為五卷名曰私見聞偏賴匠石斤斫不愧乏郢人質唯是為報恩述愚意耳慶安三庚寅曆仲秋民江妙延釋空誓謹書改𮗚寺弟六世信曉木利兵衛開板
