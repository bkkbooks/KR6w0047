body:
  text: 試窺偈文來意釋名依文解釋如常初來意者集主自行化他之上顯報恩志即偈次上文云是以為知恩報德披宗師釋言夫菩歸佛如孝子之歸父忠臣之歸君后動靜非己出沒必由知恩報德理宜先啓又所願不輕𠰥如來不加威神將何以達加神力所以仰告已上尒者歸大聖真言閱大祖解釈信知佛恩𭰹遠作正信念佛偈曰已上問以此偈置於行卷有何意乎答既云念佛偈行卷者即以名號為躰故問尒者何云正信答六要鈔云就所行法舉能信名已上弘决一云信為行本已上次釋名者六要鈔云問正信偈者是何義乎答正者對傍對邪對𮦀信者對疑今是對行就所行法舉能信名已上私字訓正韻會之盛切說文正是也从一从止徐曰守一以止也廣韻云正當也定也長也平也君也增韻云又歲之首月曰正月已上小補韻會云詩終風箋云正猶止也禮記禮運以正君臣以篤父子註疏云君臣義合故曰正又直也矣字彚云又與政同矣字訓雖多當用對傍對邪義也又守一以止訓并應用餘是可依執見次信說文誠也徐曰於文人言為信言而不信非為人也廣韻又驗也極也用也重也增韻慤實不疑不差也伊川程氏曰以實之謂信矣夫信者於善𢙣業果忍許云信今正信是能歸信於所歸念佛有大利益忍許光云信謂令心澄淨理亦能令餘心所淨從強說心由此信珠在心皆得澄淨故入阿毘達摩解信云是能除遣心濁穢法如水精珠置於池中令濁穢水皆澄淨如是信珠在心池內心諸濁穢皆即除遣已上唯識論六云云何為信於實德能𭰹忍樂欲心淨為性對治不信樂善為業已上百法論疏義忠云云何為信於實德能𭰹忍樂欲心淨為性能治不信樂善為業謂於一切世出世善𭰹信有力能得能成起希望故由斯對治彼不信心愛樂證修世出世善忍謂勝解此即信因樂欲謂欲即是信果已上釋摩訶衍論云信十種義云何為十一者澄淨義能令心性清淨明白故二者决定義能令心性淳至堅固故三者歡喜義能令断除諸憂𢚰故四者無厭義能令断除懈怠心故五者隨喜義於他勝行發起同心故六者尊重義於諸有德不輕賤故七者隨順義隨所見聞不逆違故八者嘆義隨彼勝行至心嘆故九者不壞義專在一心不忘失故十者愛樂義能令成就慈悲心故已上信卷引𣵀槃經云或說阿耨多羅三𦴭三菩提信心為因是菩提因雖復無量𠰥說信心則已攝盡已上又言信復有二種一從聞生二從思生是人信心從聞而生不從思生是故名為信不具足復有二種一信有道二信得者是人信心唯信有道都不信有得道之人是名為信不具足已上六要鈔三本云㣪所引文此有二重共明信不具足之義此可知信心具足故案文意上就聞思所生解信具不之義信心𠰥從思生可名信心具足下文意者就所得道與能得人解具不義應言信心具足已上又信卷引華嚴經言聞此法歡喜信心無疑者速成上道與諸如來等又言如來能永断一切眾生疑隨其心所樂普皆令滿足又言信為道元㓛德長養一切諸善法断除疑網出愛流開示𣵀槃上道信垢濁心清淨滅除憍慢敬本亦為法藏第一戝為清淨手受眾行信能恵施心信能歡喜入佛法信能增長智㓛德信能必到如來地信令諸根淨明利信力堅固能壞信能永滅煩𢚰本信能專向佛㓛德信於境界所著遠離諸難得難信能超出眾魔路示現上解脫道信為㓛德不壞種信能生長菩提樹信能增益最勝智信能示現一切佛是故依行說次弟信樂最勝甚難得乃至廣說論註曰經始稱如是彰信為能入已上念佛鏡云凡欲念佛要起信心若當無信空無所獲是故經言如是者信相也夫信為入道之初宗智為究竟之玄術初稱如是信也後曰奉行智也故阿𢏏陀經云𠰥有信者應當發願生彼國土此是本師釋迦牟𡰱𭄿信之處彼經又言汝等當信是稱不可思議㓛德此是六方諸佛𭄿信處又經言隨順此經以信得入此是法華經𭄿信處又云𠰥人種善根疑則華不開信心清淨者華開即見佛此是往生論𭄿信處又人無信而不立車無輗䡄不行此是外書𭄿信處又信則所言之理順順則師資之道成經無量刧非信不傳此是肇法師𭄿信處大行和上念佛法門不問道俗不論男女貴賤唯要有信此是大行和上𭄿信處乃至又喻信心猶如𭰹栽果樹樹根𭰹故風吹不動後著果實濟人饑渴念佛之人亦復如是要由𭰹信得到西方成等正覺廣濟危難𠰥當無信空無所獲已上念佛鏡又上所引信為道元等者華嚴經𭄿信彼宗信果海信全果談是十信位果海沒同信心當位䛷妙覺位此時三賢十地階位教行權說也彼經云初發心中便成正覺已上是信全果海義也又大信心者即是佛性佛性即是如來涅槃經𭄿信也又本願三信觀經三心玄忠西河三信玄義勤心奉法空師以信為能入又大論一云佛法大海信為能入智為能度如是者即是信也若人心中有信清淨是人能入佛法若無信是人不能入佛法乃至經中說信為手如人有手入寶山中自在能取若無手不能有所取有信人亦如是已上又云諸利根本信為大力已上又云若人有信是人能入我大法海中能得沙門果不空剃頭染衣若無信是人不能入我法海中如柘樹不生華實不得沙門果雖剃頭染衣讀種經能難能於佛法中空無所得以是故如是義在佛法初善信相故已上釋氏要覽上云出家以信為首起信論云信心有四種一信根本所謂樂念真如法故二信佛有無量㓛德常念親近供養敬發起善根願求一切智故三信法有大利益常念修行諸波羅蜜故四信僧能正修行自利利他常樂親近諸菩眾求學真如行故唯識論云信有三別一信實有謂於諸法實事理中𭰹信忍故二信有德謂於三寶真實德中𭰹信樂故三信有能謂於一切世出世善𭰹法中洣信有力能得能成起希望故毗婆沙論云有信如手能取善法故已上要覽蓮宗寶鑑云王龍舒云佛為大醫王能救一切病不能救命盡者佛能度一切人不能度不信者盖信者一念之真誠也乃至四料揀云從是西方過迢迢十萬程資粮若具足何愁去不成是也所以道信為萬善之首信為百行之宗華嚴以十信為成佛之始法華以正信為入道之門五根以信根為先五力以信力為最是故三世諸佛諸大菩歴代祖師修諸㓛行具大願力入佛境界成就菩提未有不從這箇信字而入也已上止觀四云佛法如海唯信能入法華云諸聲聞等非己智分以信故入我之盲復不信受更何所歸長淪𣱵溺不知出要和伽利云云優婆岌多教弟子上樹云云若心信法法則染心猶豫狐疑事同覆器已上弘决云佛法如海唯信能入者孔丘之言尚信為首况佛法𭰹理無信寧入故云兵食尚可去信不可去華嚴信為道元㓛德等如諸聲聞得羅漢已四智究竟二當滿豈更進求大乗之道故自述云不復進求阿耨多羅三藐三菩提言以信得入者若不於方等被彈而生信心安能至法華得授記莂和伽利者第一本云有老年者初始出家未有所識在僧伽藍為小沙𢏏戲曰與汝初果令其坐已即以毛毱著其頭上語言此是初果以信心故即獲初果即語沙𢏏我已得初果沙𢏏復哢之曰如是依前四度為之至第四果毱多教弟子上樹者付法藏傳云南天竺有族姓子出家學道愛著自身洗浴塗香好美飲食身躰肥壯不能得道往毱多所求受勝法尊者觀知以著身故不得盡漏語言若能受者當授汝法答言受教即化作大樹令其上之四邊為𭰹坑千刃令放右手如言即放如是次弟乃至都放分捨身命至地不見𭰹坈及樹為說法要得第四果已上猶豫等者至下可尺太子憲法曰信是裁本每事有信其善𢙣成敗要在千信群臣信何事不成群臣無信萬事悉敗已上弘决一云信為行本如法句第三云舎衛江東其水𭰹廣五百餘家剛強欺誑佛知可度往至樹下有來禮者有問訊者佛化為一人從水上來水纔至踝眾人恠問曽見有人水上行不有何道術化人答言我是江南愚直人耳聞佛在此樂欲見之問化人言水𭰹淺耶化人答我水但至踝信言而過無別術也佛言執信便度生死之渕度數里河何足為奇村人聞之悉從佛化已上酒反河中箭穿石裏皆是信力論語云與朋友交而不信乎又云道千乗之國敬事而信又云與朋友交言而有信雖曰未學吾必謂之學矣世間猶尒况佛法乎問今題信者信何義乎答既云正信念佛信念佛信如念佛鏡云問云既言道信未知信何等法答曰信意者信依經中說念佛足生淨土信念佛定滅諸罪信念佛定得佛證信念佛定得佛護信念佛臨命終時佛自來𨒦信念佛不問眾生同信之人皆得往生信念佛生淨土定得三十二相信念佛生淨土定得住不退地乃至廣說今念佛者念佛信知佛恩𭰹遠即當卷始粗有其意問諸教信與淨教信有淺𭰹乎答云一代諸教信等云云文類序云夫以獲得信樂發起自如來選擇願心已上又云然常沒凡愚流轉群生上妙果不難成真實信樂實難獲何以故乃由如來加威力故愽因大悲廣慧力故已上然者以自力為淺以他力為𭰹問聖道請佛加何以加威力論淺𭰹乎又雖自力觀解甚𭰹不可為淺既云理𭰹解微縦雖他力願生欣求何還為𭰹答雖請佛加機情強請加弱念佛機信罪𢙣生死凡夫法信乗彼願力往生偏蒙加威力故以佛智為甚𭰹也又觀解雖甚𭰹自力機情是云因分有相欣求雖似淺近他力佛智此云果分是自然悟道蜜意也問尒者前所引華嚴等文何載信卷明信心相乎答六要鈔三本云問引此經文有何要乎答今經文意粗會歡喜信樂之說又順疑慮之信是故為𦔳歡喜信樂𭰹信之義被引之歟但雖彰灼不說𢏏陀淨土利生其意潜通天台云初㣪佛慧圓頓義齊已上華嚴之意又不可違隨而普賢十願之意所𭄿專在安養往詣依此等意法華華嚴以下諸經皆隱顯彼𢏏陀利生上人𭰹解一代諸教皆顯𢏏陀大悲利益得此等意可見諸文已上六要義疏云一乗極唱終歸咸指於樂万行圎修最勝獨推於果號已上止觀二云若唱𢏏𨹔即是唱十方佛㓛德等但專以𢏏𨹔為法門主已上故諸教皆𢏏𨹔利益次念佛者是非諸師所立之義本願義上加選擇義以為題號選擇集題目即是𢏏𨹔本願念佛今念佛即與彼義同問然者今偈題可順選擇集題何無簡別之言答既當卷題云淨土真實行簡別之言在本題故重不舉之問往生要集明常念相大分為四今念佛者四種中何答今念佛非四種攝四種有相相定㪚觀念行故問四種之中㪚業念佛可今念佛故次下文云散即一切眾生若行若㘴一切時處皆得念佛不妨諸務乃至命終亦成其行已上尒者如何答行相雖不難不分別二行不細判正助諸師所立義𠰥散機上捨𮦀歸正分別正助本願念佛問本願念佛通觀稱乎答不通既云念佛三昧㓛能超實非𮦀善得為比類唯局稱名問所言文釋流通念佛於一經中弟九念佛可通觀稱流通念佛何局稱名答弟九念佛雖正宗不通觀稱也流通念佛隨自意行即云上來雖說等是二共不通也偈者文句三云龍樹毗婆娑云一者隨其國土天竺有散華貫華之說二者隨其樂欲不同有樂㪚說有樂句者三者隨其生解不同或㪚說得解或於句得解四者隨其利鈍不同利者一聞即悟鈍者再說始明又表佛慇懃重說故又為眾集前㣪故具茲多義故有偈也已上玄賛云頌梵云伽陀此為頌頌者美也歌也頌中文句極美麗故歌頌之故訛略云偈已上或云度之法或大人則用偈梵調八轉聲方成其偈頌名之為偈經音義云伽陀此方當頌矣慈恩傳云曰偈梵文畧乃至今従正音宜云伽陀伽陀唐云頌已上名義集云伽陀此云孤起妙玄云不重頌者名孤起亦曰諷頌西域記云曰偈梵本略也或曰偈他梵音訛也今從正音宜云伽陀唐言頌已上相傳云積字為句長句短句發句傍句等也積句為偈又積偈及長行為篇與賦類同章積之為卷積卷為部矣今念佛七言句数百二十重故名正信念佛偈云云㣪入文解釋者是有二一大綱二細釋其大綱者六要鈔云次正信偈百二十句行数六十是依三朝高祖解釋粗述一宗大𮈣要義自偈初句至過斯四十四句二十二行是大經意度以下四句二行𢝰標三朝祖師同顯淨土教意釋迦以下一十二句六行之文是龍樹其初四句依楞伽經次之八句是依十住毘婆娑論次十二句六行之文是天親依淨土論次十二句六行之文是鸞師依論註意次之八句四行之文是綽公依安樂集次之八句四行之文是大師次之八句四行之文是恵心依要集意次之八句四行之文空聖人依選擇集次之四句是𢝰結也已上以是文為其大𮈣為指南細釋者入文解釋一一料簡也問於此偈可分三叚乎答有云可分一初二句是序分二法藏下至為能入是正宗分三弘經已下是流通分也云云今私云此義難意得既六要鈔云自偈初句至無過斯大經意又此偈者行卷偈頌𠰥有三叚就行卷可立何於偈分又初二句宗㫖䏏要是則聖人領解已證何為序分六要鈔無其文義學者思擇云云歸命無量壽如來南不可思議光六要鈔云大經意中歸命已下一行二句先舉壽命光明尊號為歸命躰已上問不可思議光如來者此名大經無之如何答六要鈔五云問不可思議光如來者此名出在何經釋乎答文言雖隱義在大經所謂十二光佛勝德皆是不可思議故也明顯其名出寶積經因茲鸞師𢏏陀偈載此尊號如來會文并鸞師釋如下所引已上如下所引者真佛土卷云量壽如來會言阿難以是義故量壽佛復有異名謂量光邊光著光㝵光照王端嚴光愛光喜光可觀光不可思議光等不可稱量光暎𮑇日光暎𮑇月光𢲅𡙸日月光彼之光明清淨廣大普令眾生身心恱樂已上𢏏陀偈者一卷之文於中云南不可思議光一心歸命稽首礼問發端二句歎壽光德說壽光德獨非大經亦說此二德何云大經意答大經意中者唯不可限發端二句從文之初至過斯四十四句是大經意以是義云大經意中又小經中雖說二德不如大經大經既是有壽光願有成就文有十二光所以以具云大經中問發端兩句並舉意如何答定有𭰹意今以愚推以示五三𭰹恐素意一者為顯報身常住義歟以何得知文類五光明壽命以兩願顯報身報土之義六要鈔五云當卷大意以此光明壽命量成真報身常住義也光明量正撗義兼亘竪義此以眾生邊之故光明邊攝化邊諸有情類是撗義也又兼竪者遠亘三世有断絕利益盡壽命量是竪邊且依因願雖為十刧成覺之身諸佛壽命平等果海有闕减唯是本覺𢏏陀壽也此義邊酬因感果是始覺智為凝然是本覺理理智不二始本是一也至始覺必本覺又釋迦佛久遠實壽即阿𢏏陀名義也故法華云慧光照量壽命数刧已上量光者佛智𮗚照之妙用也量壽者法身常住妙理也躰用不離理智合釋尊㓛德又以道同是故今依光明壽命量㓛德立真報身其義可也已上六要然者壽光量三世常住量為破化身化土之誤引此兩願顯報身義六要鈔五云問今量者有量量量量之中何乎答依以𢏏陀判應身之諸師義有量量依以𢏏陀為報身之大師義者量量隨而集主當卷意判真佛土真佛土者即是報也可存量量義也此是一得𣱵不失也此是上涅槃常住壽也已上二者為顯𢏏陀𭰹重大悲故並舉歟以何得知和云超世上等云云𠰥有光照不至處者攝取不捨利益不普𠰥又壽命有限量者未來眾生可漏利益故撗放量光攝取十方又竪依量壽遠化未來光明壽命為大悲本䚺並舉之問礼云𢏏陀世尊本發𭰹重誓願以光明名號攝化十方已上黑谷三經講釋云光明之緣名號之因因緣和合而蒙攝取不捨之益已上當偈云光明名號顯因緣已上行卷云良知德號慈父能生因闕光明悲母所生緣乖能所因緣雖可和合非信心業識到光明土已上六要鈔二本云大集經說諸佛出世有種種益光明名號神通說法但於其中此土教主神通說法其利殊親淨土𢏏陀光明名號其益猶勝已上已上五文皆云光明名號何云光明壽命誓願為大悲本乎答名目依時不定廣論四十八願皆為大悲光明壽命顯撗竪益壽命名號言異意同六要鈔二本釋以光明名號之文云言以光明名號等者六八願中十二十三兩願意也已上以此釋推得其意謂玄義云阿者是無𢏏者是量陀者是壽已上尒者名號即是無量壽故云十三願故名號光明光明壽命其意惟同小經言以光明無量壽命量故名阿𢏏陀此意也問光明攝化十方得益如何答經云其有眾生遇斯光者乃至皆蒙解脫已上又云光明遍照乃至不捨已上又三十三願也具如真佛土卷問壽命得益如何答經云彼佛壽命及其人民乃至阿僧祇刧又十五願云云云三者為顯梵漢相對之故並舉之歟玄義云言南者即是歸命亦是發願廽向之義乃至往生已上此有正又有義歸命正故云即是廽向發願是其義故云之義凡歸命者法華科註一未云南無者即歸命之義或云救我度我等矣名義集云南無或那謨或南摩此歸命要律儀敬善見論歸命覺或信從法華疏云南無大有義或言度我可施眾生若佛答諸佛度我義不便五戒經稱驚怖驚怖正可施佛也生死險難實可驚怖乃至廣說又䟽四云度我可施眾生者若論度我應在物機施謂施設今釋迦因聞十方諸佛慰喻乃稱南謨各於諸佛故知釋迦不請諸佛度也已上九品義云或歸命或云歸身或云救濟或云度我雖有異譯又歸一途謂歸身命於佛陁境救護於我罪生善已上釋氏要覽云悲華經云佛言南無者此決定諸佛世尊名號音聲唯識鈔云梵語南無此為名即是歸趣之義也或云那摩或曩謨皆梵音訛也已上歸命和語訓時和礼於太寸計太摩恵是即救護救濟度我皆其意也又有訓点歸命以能知於加恵寸此時還源是也宗鏡二十六云夫歸者還原義眾生六根從一心起决自原馳散六塵今舉命根𢝰攝六情還其本一心之原故曰歸命已上還源者本覺妙理忽然念起三科風六曲浪騷其流轉命止𮗚成就還於本覺是云歸命又歸命者捨命義也止𮗚二云慚愧懺悔以命自歸已上弘决云盡命悔故云以命自歸已上量義經註云有心眾生以命為寶命寶弟一今八万眾歸實相佛故云歸命已上九品義云歸身命於佛陀境已上香象起信疏云歸者是趣向義命謂己身性命生靈所重莫此為前此明論主得不壞信盡已所尊重之命歸向三寶請加製故云歸命已上宗密起信疏云歸者依投趣向義命者御諸根一身之要人之所重莫不為先舉此無二之命以奉無上之尊已上已上皆是他流之意非今所用當流之意歸命者於保世尒幾寸訓歸者順意行卷云尒者南之言歸命歸言至也又歸也字恱音又歸也字稅音恱稅二音告也述也宣述人意也命言業也拓引也使也教也道也信也計也召也是以歸命者本願招喚之命也已上又香象前文次一義文云二歸是敬順義命謂諸佛教命此明論主敬奉如來教命傳法利生故云歸命已上大日經開題云命名量壽歸者能依人已上性理字義云命猶令也如尊命台命之類天無言做如何命只是大化流行氣到這物便生這物氣到那物便生那物便似分付命令他一般又云𠰥就造化上論則天命大目只是元亨利貞已上彼天命此佛教命隨義轉用義全同然者度南中華歸命梵漢相對其義如此令知此義故並舉之歟四者正為顯往生為正因義故並舉之歟歸命三心也三心者請佛救濟既云度我非三心何有請救義一心不偽是至誠心𠗦佛不疑即是𭰹心欲生即是廽向心也故先德法語云歸命云者即助給云意也矣問南全三心每唱名號可謂得安心乎凡當流意得於安心一世一度以㣪念佛即是行依之云尒下品十念有十願行以之思今唯是唯行非願行此義如何答獲得安心唯一度者始聞言南者即是歸命乃至必得往生之文意一念發起往生决定思定位云一度安心以㣪稱名即是自然逮多念時此稱名行正自信心歡喜心起是信起行如火煙信火催心行煙顯聲是故釋云真實信心必具名號又决定信上或是自他稱名之聲入我耳時信心歡喜是行起信信行不離如旋火輪礼云五門相續助三因矣故以㣪念佛不可離信何云唯行問六字中既云願行然者心三心口唱名號亦是可云願行足答不可然心安心者唯行故釋云名號必不具願力信心也矣六要鈔云問所發信心縦為真實何必其中具名號又六字中言南無者即是歸命即是安心何云名號不具願力信心答言信心者是能歸心對所歸法所發信也故發信心必名號是則經云發三種心即便往生是其義也𠰥不具行既同唯願何得往生既往生因方知發心必具名號是故今云真實信心必名號縦唱名𠰥無信心難得往生經云至心信樂欲生依信可生其理灼然稱名之人未必悉具真實信心已上五者歸敬礼文以何言之𢏏陀偈云南無不可思議光一心歸命首礼論歸命盡十方礼一切三寶等也已上五義唯愚推耳如來者名義集云多陀阿伽陀亦云恒闥阿竭㣪𥘿為如來金剛經云無所從來亦無所去故名如來此以法身釋轉法輪論云弟一義諦名如正覺名來此以報身釋成實論云乗如實道來成正覺故名如來此應身釋已上文句九云三如來者大論云如法相解如法相說故名如來如者法如如境非因非果有佛無佛性相常然遍一切處而無有異為如不動而至為來指此為法身如來法如如智乗於如如真實之道來成妙覺智稱如理従理名如從智名來即報身如來故論云如法相解故名如來也以如如境智合故即能處處示成正覺水銀和真金能塗諸也像㓛德和法身處處應現往八相成道轉妙法輪即應身如來故論云如法相說故名如來也已上論誰下云如來者如法相解如法相說如諸佛安穩道來此佛亦如是來更不去㣪有中故名如來已上是釋𢏏陀報身也首經疏云如來者如謂本覺來謂始覺始本合故名為如來已上金剛經云如來者即諸法如義已上註云佛言諸法如義者諸法即是色聲香味觸法於此六塵中善能分別而本體湛然不染不著曽無變異如空不動圎通徹歴刧常存是名諸法如義已上宗鏡三十一云夫如來者即一心真如自性中來故云如來又如者不變不異不失自性故名為如來者即真如不守自性隨緣顯現故名為來斯乃是不來之來以真如性徧一切處實無去來從心所感無出沒故已上已上四處之文就心性立如來義非今所用今如來者取報身義亦非不通問報有二身𢏏陀何身答自他受用不二𢏏陀所以者何證卷中舉壽光量明真佛土六要尺云且依因願雖為十刧成覺之身諸佛壽命平等果海無有闕减唯是本覺𢏏陀壽也此義邊酬因感果是始覺智無為凝然是本覺理理智不二始本是一也又去無量壽者法身常住妙理也無量光者佛智𮗚照之妙用也躰用不離理智合已上名義集引唯識論釋二身結云合此二身名曰報身已上又有三身如來點有云乗如實道等者付云如來有三身如來點一如來是法身如來也二如來是報身如來也三如來是應身如來也今則報身意釋顯三如來如謂真如實謂實相所云乗者即是能乗如實所乗所乗法身能乗報身來成正覺義通應身耶云云法藏菩因位時在世自在王佛所覩見諸佛淨土因國土人天之善𢙣建立上殊勝願超發有大弘誓五刧思惟之攝受六要鈔云法藏以下三行半者是明法藏發心見土思惟等相經云棄國捐王行作沙門號曰法藏高戈勇哲與世超異詣世自在王如來所乃至於是世自在王佛即為廣說二百一十億諸佛剎土天人之善𢙣國土之麁妙應其志願悉現與之時彼比丘聞佛所說嚴淨國土皆悉覩見超發上殊勝之願其心寂靜志無所著一切世間能及者具足五刧思惟攝取莊嚴佛國清淨之行已上私云此下具如選擇集時有國王者其名覺經云世饒王作沙門云曇摩加以有王字佛名為王名異譯誤玄一云法藏者此出家名所聞法教護持不失故名法藏俗名龍珍王此王入山修道時忠臣之二女隨入學道一名祿波那二名洗澤河法蔵山南二女山北然修行彼時國王成今𢏏陀彼祿那今是觀世音是洗澤河今是大㔟至是也已上問悲華經中佛名寶藏王名諍念王與今為同異耶答佛王俱別時分異故故玄一釋二佛別云一佛名即別故二所化名別謂彼時諍此時法藏故三在家出家別謂彼時在家此時出家故四思惟淨土行別時別謂彼時七歲此時五刧故五男女別謂彼時𮗚音大㔟至曽作輪王之子此時作臣之女故已上問若尒何故大經釋黑谷云時有國王離垢淨王歟諍念王歟所詮一躰異名也已上答不分今昔同是𢏏陀因位名故云一躰歟是猶預釋不可定量就之長樂寺佛與王異云經論異故立一躰故於發願二重也白旗悲華寶藏佛時發心及與今經所說饒王佛時發心別故立重發願先所云云不分今昔者重發願意凡於發願有重重義有云問寶藏佛與自在王佛前㣪如何答寶藏前也如玄一云未見誠文以義准者寶藏是先自在為後瑜伽等說發大心已逕三僧祇成等正覺然寶藏佛記云過一恒沙僧祇刧等今此經中不言逕刧故寶藏先自在王㣪已上是重發願又有云問㨿法華經𢏏陀亦值大通發心與今發心前㣪如何答論久近今發心近寶藏少遠如向已尺大通最遠所以者何寶藏授記云恒沙刧大通往事三千塵點沙刧極少塵刧極多前㣪可知矣是又重發願也又問𮗚佛經云過去空王佛眉間白毫相𢏏陀尊礼敬滅罪令得佛取意大通空王前㣪如何答異義不同今存一義空王為前淨行經云釋迦昔於空王佛所受六重戒㣪值大通為其王子出家具持三百戒行已上尒者空王遠大通近是亦重發願也玄義七云若十六王子在大通佛時弘經結緣皆是中間所作非本因也已上小經疏三云若考阿𢏏陀佛成佛以前因地不但法藏一因有多種因如諸經中說已上同鈔云法藏因者大本云定光佛前五十三佛名世自在王法藏時為國王捨位出家發四十八願今阿𢏏陀佛是法藏所成之佛也多種因者一法華經大通智勝如來時十六王子出家淨修梵行求無上菩提佛滅度㣪常樂說是妙法華經㣪悉成佛第九王子於西方成佛彼王子者今阿𢏏陀佛是二悲華經云無量刧前有轉輪王名無諍念供養法藏如來時王發願願成佛時國中種種清淨莊嚴佛與授記過恒沙刧西方世界作佛國名安樂彼國王者今阿𢏏陀佛是三大乗方等總持經云無垢㷔稱起王如來時有淨命比丘總持諸經十四億部隨眾生願樂廣為說法彼比丘者今阿𢏏陀佛是四賢刧經云雲雷吼如來時有王子名淨楅報眾音供養彼佛彼王子者今阿𢏏陀佛是五彼經又云金龍决光佛時有法師名無限量寶音行力弘經法彼法師者今阿𢏏陀佛是六𮗚佛三昧第九經云空王佛時有四比丘煩𢚰覆心空中教令𮗚佛遂得念佛三昧彼第三比丘今阿𢏏陀佛是七如幻三摩地無量印法門經云獅子遊戲金光如來時有國王名勝威尊重供養彼佛修禪定行彼國王者今阿𢏏陀佛是八一向出生菩經云阿𢏏陀佛昔為太子聞此㣲妙法門奉持精進七千歲中脅不至席不念愛欲財寶不問他事常獨處止意不傾動復教化八千億萬那由佗人得不退轉彼太子者今阿𢏏陀佛是以上略舉數端若其多刧多因亦應無量已上思此等意重發願也因分別法藏發心位者經發無上正真道意文淨影判云地前世間大菩提心義寂云今以理准寶藏佛時所發心者是信發心於世饒王佛所發㣪二種發心五刧思惟以前發解發心五刧思惟以㣪發證發心矣雖有此尺未知三賢之中何位證發心是初地也玄一云瑜伽顯揚等皆云發心有二一世俗發心謂地前發心二得法性發心謂地上發心也若依佛性論有三發心一信成就發心謂十信十解二解行發心謂十行十廽向三證發心謂初地以上此云發心者二中是初三中第二是也又云是故遠云此中有二初明世間之行二乃至明出世行地前所行名為世間地上所行名出世間下明出世行中乃至既經五刧能入地上是故明知是十廽向之末已上憬興亦十廽向滿位已上望西此故發上等地前世間發心佛告阿難法藏比丘說此已下地上出世發心立是故云二重發心依當流意准鸞師釋地上發心證卷引性㓛德明證發心其性㓛德者亦言性者是聖種性序法藏菩於世自在王佛所悟生法忍尒時位名聖種性於是性中發四十八大願修起此土即曰安樂淨土是彼因所得果中說因故名為性已上鸞師釋中有四𠔏地上位至文可見又有解悲華經說初住發心此經但明初地發心看經文㔟發心外重發故世超異文可初地故是故鸞師判聖種性感師釋十地聖人恐此意歟然偈頌中即有身土攝生之願亦發國土弟一等願容是別願之預動起次下長行請淨土行四十八願本意將遂如來不許云汝自當知是則初地自分願故法藏重請云非我境界等超世之本願選擇不輙故如來答請時悉聞見經五刧思惟攝取超世願故云超發上殊勝之願等也淨影等師未作此解今述異解恐慮甚多云云法藏菩者名義集云曇摩迦此法藏比丘乃量壽行因時名已上選擇集曇摩迦此云法藏今云法藏比丘比丘是名外也菩者名義集云肇曰正音云菩提埵菩提佛道名也埵𥘿言大心眾生有大心入佛道名菩提埵正名譯也乃至今依大論釋菩提名佛道埵名成眾生天台解云用諸佛道成就眾生故名菩提埵又菩提是自行埵是化他也自修佛道又化他故賢首云菩提此謂之覺埵此曰眾生以智上求菩提用悲下救眾生已上釋𫞕要覽云具足應云菩提埵唐言覺有情覺者所求果也有情者所度境也言摩訶者此云大有情即能求能度人也地持論云埵是勇猛義精進義求大菩提故名摩訶已上要集上云如大般若經云為利有情求大菩提故名菩而不依著故名摩訶已上大論四云問曰齊何來名菩提埵答曰有大誓願心不可動精進不退以是三事名為菩提埵復次有人言初發心作願我當作佛度一切眾生從是已來名菩提埵已上文句二云菩提此言道埵此言心摩訶此言大此諸人等皆求廣大道又成就眾生故道心大道心之氣類也已上起信疏云菩提埵此云覺有情亦有三釋一約境所求所度二約心有覺悟之智除情慮之識三約能所所求能求三皆如次覺及有情已上世自在王佛者名義集云樓夷亘羅清淨平等覺經世饒王無量壽經世自在王已上玄一云世間利益自在故言世自在又云世饒即自在義為王憬興云饒者即釋自在之言已上又云於一切法得自在故已上超發希有等者義寂云超發無上殊勝願者正發願也此時會云彼佛因中立弘誓聞名念我迎來不簡貧窮將𠖐貴不簡下智與高戈不簡多聞持淨戒不簡破戒罪根𭰹但使廽心多念佛能令瓦礫變成金已上五刧思惟等者經具足五刧思惟攝取又莊嚴經云作法苾蒭聞佛所說八十四千俱那由佗佛剎㓛德莊嚴之事明了通逹如一佛剎即時會中頭面礼足礼佛而退往一靜處獨㘴思惟修習㓛德嚴淨佛剎發大誓願經於五刧詣如來言如是佛剎㓛德莊嚴所行之願已上五刧雖有修行思惟二義順經唯是思惟時義寂云經具足五刧思惟攝取至其佛壽命四十二刧述曰此即思惟成就其願又云經時法藏比丘至我已攝取莊嚴佛土清淨之行述曰此下弟四如所思惟對佛宣願已上五刧之間攝取諸佛淨土行已白佛所行佛即𭄿說尒時法藏說已所願四十八願故以發願名清淨之行也問思惟者何義答天台釋𮗚經思惟正受云思惟正受三種淨業散心思量名曰思惟十六正𮗚說為正受已上知禮云初教我思惟若不思惟不成願樂有願之思乃成業因唯願世尊教我修於淨土願思令成業因此請事善助道之業也已上元照疏上云𮗚前方便故曰思惟正𮗚成就故名正受已上此等文意言思惟者即是思想又是思量思量眾生往生之行問宗鏡八十三云大法炬陀羅尼經云凡有思惟皆是邪思惟若無思惟即是正思惟已上此義如何答通達諸法性一切空我上思惟是無思惟思惟其心寂靜志所著何有著相思惟乎問聖種性智不可思議於一念頃辨一切事何送五刧答本願𭰹重豈容易耶𥼶尊尚有三七思惟况初地耶問經云思惟攝取今偈云思惟攝受取與受如何答取者是受會云取此生切廣𢪛也增取也領也大師釋四十八願攝受眾生已上選擇集云此中選擇者即是取捨義也謂於二百一十億諸佛淨土中捨人天之𢙣取人天之善捨國土之醜取國土之好也大阿𢏏陀經選擇義如是雙卷經意亦有選擇義謂云攝取二百一十億諸佛妙土清淨之行是也選擇與攝取其言雖異其意是同乃至廣說重誓名聲聞十方六要鈔云重誓名聲之一句者三誓偈中弟三行意即云我至成佛等一行即是弟十七願成就意也已上文云我至成佛道名聲超十方究竟靡所聞誓不成正覺已上六要鈔三本云六八願上重有此誓是故此偈云重誓偈乃至十一行中初一行𢝰望六八願决定滿足次二行別如次望欲濟眾生苦名聞十方義寂云望三種果一望滿願果二望大施果三望名聞果已上依此三誓此偈又名云三誓偈已上六要有云問佳譽為超十方諸佛答淨影云我成佛時名聞十方有人究竟於我名字無所聞者不取正覺已上依此釋者超遠聞義或如所問有何失耶所謂佳名超諸佛故一切眾生究竟聞之問此三行頌大意如何答四十八願必定滿足初行頌意以此本願濟眾生苦弟二行意此本願名超聞十方弟三行意如此三事若不成者誓不成佛問上本願中一一各有不取誓約今何重說答夫再言者志之鄭重發願事重要契豈輕云云普放量邊光㝵對光炎王清淨歡喜智恵光不断難思稱光超日月光照塵剎一切群生蒙光照六要鈔云普放以下三行六句具舉寸二光佛之名嘆其利益已上問普者局撗之義歟答光普且三世有断絕利益盡是竪義也故亘撗竪量光者𢏏陀偈云智恵光明不可量故佛又號量光有量諸相蒙光曉是故稽首真實明已上憬興云佛光非等數故量已上邊光者偈云解脫光輪限際故佛又號邊光蒙光觸者離有無是故稽首平等覺已上淨影云邊廣也興云緣不照故邊已上佛光普於有緣眾生不施益故云邊離有者六要五云離有者有即是断常二見依此二故不出生死而諸凡夫雖不離之今此名號中道實相清淨生之𭰹法故稱此名號依佛願力必蒙光觸蒙光觸者自然遠離有迷妄此是光明照觸力也已上礙光者偈云光雲礙如虚空故佛又號㝵光一切有㝵蒙光澤是故頂礼難思議已上淨影云㝵自在已上興云有人法而能障㝵故㝵已上論註云問曰若言㝵光如來光明量照十方國土所㝵者此間眾生何以不蒙光照光有所不照豈非有㝵耶答曰㝵屬眾生非光㝵也如日光周四天下而者不見非日光不周也亦如蜜雲洪霔灌之句反而頑石不潤非雨不洽霑下拾反也已上對光者偈云清淨光明有對故佛又號對光遇斯光者業繫除是故稽首畢竟依已上興云非菩之所及故對已上對謂歒對有餘光齊等此光經云諸佛光明所不能及已上炎王光者偈云佛光照曜㝡弟一故佛又號光炎王三塗黑闇蒙光啓是故頂礼大應供已上玄一云㝡上自在故興云光明自在更為上故㷔王已上炎者光明王自在義光明自在故云炎王問對炎王其異如何答對舉歒對顯光照炎王就光躰云自在問就此文和黑闇開矣然經閇塞諸𢙣道又𢙣趣自然閇尒者如何答若在三塗見斯光明時云啓攝取不捨時云閇各依一義並相違清淨光者偈云道光明朗色超絕故佛又號清淨光一蒙光照罪垢除皆得解脫故頂礼已上玄一存二義一義是光離垢色淨故一義遇光者滅三垢故興云従佛貪善根而現故亦除眾生貪濁之心也無貪濁之心故云清淨已上歡喜光者偈云慈光遐柀施安樂故佛又號歡喜光光所至得法喜故稽首頂礼大安慰興云從瞋善根而生故能除眾生瞋恚盛心故已上觸光柔輭願此謂也或云一念嗔恚燒百千法門故菩修嗔善根時𢙣人來加罵詈即喜不加杖木若加杖木亦喜不加刀劒𠰥加刀劒更有所喜𠰥此𢙣人何滿我菩行今捨五隂毒虵身得金剛不壞躰今正是時其時心大歡喜無有一念報答之心乗此善根感得慈悲光佛以此光照念佛眾生時除行者瞋恚與感心令生彼極樂國故云歡喜光也云云今云不起欲想嗔想等文此義也智恵光者佛光能破明闇故佛又號智恵光一切諸佛三乗眾咸共嘆譽故稽首已上淨影云於法能照故興云從癡善根心起復除眾生明品心故已上或云明諸有本今眾生處虚偽生死受大苦𢚰有出期故菩修癡善根時正躰智力即住心源㣪得智力淨用窮一切諸法中法門有邊成就一切智入於𭰹法海佛得此智慧以除始癡闇得加如來智慧光還以此光以除念佛眾生癡闇造罪令生彼世界故名智恵光矣不断光者偈云光明一切時普照故佛又號不断光聞光力故心不断皆得往生故頂礼已上光明相續常不断故立此名也興云佛之常光恒為照益故已上六要五云聞光等者由聞攝照夜照三州不照一州月照夜不照晝亦光有𧇊盈亦日月照色法不照心法只益草木不除心垢彼佛光明超此日月數億倍故名超日月光也矣一切群生一句者十二光佛利益結文也
