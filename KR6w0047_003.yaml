body:
  text: 能發一念喜愛心不斷煩𢚰得𣵀槃凡聖逆謗齊廽入如衆水入海一味六要鈔云能發以下二行四句是明煩𢚰罪障凡夫唯以一念真實信心得其證益能發等者明信心相喜謂歡喜愛謂愛樂是則信樂不斷等者論注下云莊嚴清淨㓛德成就者偈云觀彼世界相勝過三界道故此云何不思議有凡夫煩𢚰成就亦得生彼淨土三界繫業畢竟不牽則是不斷煩𢚰得𣵀槃分焉可思議已上問今注尺云得𣵀槃分今不云分如何答分初生𠰥究竟宜略分字或又為調七言字數除之無失凡聖等者是顯善𢙣諸機雖異齊乘佛願同生報土無其差別論注上解莊嚴性㓛德成就尺性字云又言性是必然義不改義如海性一味衆流入者必為一味海水不隨彼改也已上六要問大乘善根界勝過三𤰪淨土何煩𢚰具足凡夫得生既云撗超斷四流云撗截五𢙣趣何云不斷答斷者捨離義安樂集云𠰥依此方修治斷除先斷見惑離三塗因滅三塗果㣪斷修惑離人天因絶人天果此皆漸次斷除不名撗截𠰥得往生陀淨國娑婆五道一時頓捨故名撗截已上凡於斷其義多止觀所明於不斷煩𢚰有三十六句又宗鏡録七十六有二種三種恐繁略之問斷捨離義者百法抄出四種斷謂自性斷離斷不生斷相應斷讀文可知大乘義復有四種文云一自性斷二所離斷三緣斷四伏斷斷煩𢚰因即自性斷離三界果是所離斷不簡因果斷煩𢚰一切有漏法能離繫是緣斷已上爾者今捨離義則所離斷如何答撗超斷斷所離云斷非所離斷故云一時頓捨正理論云豈非聖道亦所離斷耶如契經云應知聖道猶如船笩法尚應斷何非法此非見修二道所斷入無餘𣵀槃界已捨故名斷已上問撗超斷斷所離云斷其意如何答欣淨猒穢教故所離云斷問何不言斷答正斷伏斷用智惠故於念佛門斷惑惠黑谷尺云聖道門意窮智惠離生死淨土門意還愚癡遂往生是意也問欣淨猒穢即是智惠如何答對猒欣似簡擇惠猒苦欣樂唯是凡夫捨劣得勝分齊非修生見得惠問利劒即是陀號一聲稱念罪皆除正自性斷答名號利劒顯所離德捨此往彼云利劒德問乍有能障所障理何顯實定可斷答𠰥有斷義何以乃是凡入報土煩𢚰凡夫得入報土證得不退入三賢十地願行自然彰也問信卷尼經云於生死迷惑流轉住不正道故名凡夫梵云婆羅隋言毛道謂行心不定猶如輕毛隨風東西故又有二種一嬰兒凡夫謂智惠二愚暗凡夫頑䤜不可教故已上名義集云應法師云梵言婆羅必利他伽闍那此云小兒別生以癡如小兒不同聖生也已上弘决一云凡者常也亦非一也品多故已上大論失卷云愛妻愛子名為凡惜身惜命名為夫已上宗鏡録九十二云凡夫有二種想一者世流布想二者著想一切聖人唯有世流布想無有著想一切凡夫𢙣覺觀故於世流布生於著想一切聖人善覺觀故於世流布不生著想是故凡夫名為倒想已上一乘要决中云金剛經云毛道生今云愚夫生梵云婆去聲羅此云愚夫本錯云羅乃云毛道已上夫親論云又須菩提毛道凡夫生者如來說名非生者不生聖法故言非生已上要决百法抄云異生性千字文注云中人之性隨習則改逢善為善逢𢙣為𢙣以心不定逐物意移莊子云凡夫之人將有限之身𣱵無限之物意常不定也已上注記云勒所問經論第一云偈云遠離聖人法染著身見等住五欲資生故名凡夫人已上次聖者弘决一云聖者風俗通云聖者聲也以其聞聲知情通天地暢萬物故也易曰聖者與天地合德與日月合明與四時合節與鬼神合其吉凶今出世聖不聞其聲知九界情通諦理暢衆機與法界合德與二智合明與四機合節與衆聖合其顯已上名義集云阿離野此聖者亦云出苦者孔氏傳云於事無不通謂之聖孔子對魯哀公云所謂聖人者智通大道應變不窮惻物之情性者也商太宰嚭問孔子曰夫子聖者歟曰丘識強記非聖人也三王聖者歟曰三王善用智勇聖非丘所知五帝聖者歟曰五帝善用仁信聖非丘所知三皇聖者歟曰三皇善用時政聖非丘所知太宰大駭曰然則孰為聖人乎夫子有間動容而對曰西方有聖者已上宗鏡録六十五云還原集云聖人有二種用心一不見一切物皆空唯見於空不見一切物二見一切物即空了了見一切有不住於有了了見一切空不住於空雙照有無分別𭓩然而無念動猶如明鏡覩其色像一切皆於中現用心亦爾得其妙性起照照見一切了了知無所知了了見無能見無能見不廢常見見性既常無間斷分明徹照十方淨無瑕穢內外圎明周法界已上歸元直指云張無盡問大慧禪師曰堯舜禹湯皆聖人也佛竟不言之何耶師曰堯舜禹湯比梵王帝釋有優劣否無盡曰堯舜禹湯豈可比梵王帝釋遠則遠矣師曰佛以梵釋為凡夫也餘可知矣四教義云聖以正為義即練道懸鏡也苦忍真明捨凡夫性得入聖人性真智見理故名聖人已上俱舍論二十二云聖謂聖正已上今偈所言除佛餘聖人次逆者此有大小信卷末云言五逆者𠰥依淄州五逆有二一者三乘五逆謂一者故思殺父二者故思殺三者故思殺羅漢四者倒見破和合僧五者惡心出佛身血以背恩田違福田故名之為逆執此逆者身壞命終必定墮無間地獄一大劫中受無間苦名無間業又俱舍論中有五無間同類業彼頌云污無學尼殺罪同類殺住定菩殺父罪同類及有學無學殺羅漢同類僧和合緣破僧罪同類破壞都婆出佛身血二者大乘五逆如尼乾子經說一者破壞焚燒經藏及以盜用三寶戝物二者謗三乘法言非聖教鄣破難隱𮑇䨱藏三者一切出家人𠰥戒無戒破戒打罵呵責說過禁閇還俗驅使債調斷命四者殺父𡧱出佛身血破和合僧殺阿羅漢五者謗無因果長夜常行十不善業已上彼經云一起不善心殺𡧱獨覺是殺生二淫羅漢尼是云邪行也三侵所施三寶物是不與取四倒見破和合僧衆是虛誑語也略出此注在六要鈔三末可見謗者謗正法也論注上云𠰥言佛法菩菩法如是等見𠰥心自解𠰥從他受其心决定皆名謗正法問曰如是等計但是己事於衆生有何苦𢚰踰於五逆重罪乎答曰𠰥無諸佛菩說世間出世間善道教化衆生者豈知有仁義禮智信耶如是世間一切善法皆斷出世間一切賢聖皆滅汝但知五逆罪為重而不知五逆罪從無正法生是故謗正法人其罪𭰹重已上天台梵疏下云略有四種一上邪見二中三下四𮦀上邪見者一切都無因果如闡提中邪見者不言都無因果但謂三寶不及外道乃至下品邪見不言三寶不及外道但於中棄大取小心中謂二乘勝大乘乃至𮦀邪見有四種一偏執二𮦀信三繫念小乘四思議僻謬偏執有二一執大謗小二偏謗一部執大謗小計云唯有大乘都無小乘非佛所說此謗聲聞藏犯輕偏謗一部者於方等中偏言一部非佛說乃至二𮦀信者謂心中不背因果及三寶大乘但言外道鬼神有威力遂奏解神或勸他悉犯輕垢三暫信小乘知大乘高勝且欲斷煩𢚰取小果㣪更修大乃至四思議僻謬如則今人義淺三五家釋此應非罪是我智力不及非作意強撥也乃至復有知他為是強欲立異皆邪𦘕之流已上香象起信論別記第三十五四謗云一者增益謗二者减謗三者相違謗四戲論謗已上智論十八云邪見有三種一者破罪福報不破罪福破因緣果報不破因緣破後世不破今世二者破罪福報亦破罪福破因緣報亦破因緣破㣪世亦破今世不破一切法三者破一切法皆令無所有已上香象梵網疏云制謗法意由十義一業道尤重無過此故二燒滅善根悉無餘故三違背恩德𢙣中極故四破壞信心滅法眼故五於善行中若小若大悉不成故六墮於外道邪見故七為大邪斷善根故八作諸衆生𢙣知識故九斷三寶種由此見故十令自他成阿鼻業故是故制之已上正觀記下云經云誹謗即呰也誹平去二呼內懷邪見不與理合即名為謗誹謂口出𢙣言也已上宗鏡録九十三云如大般𠰥經中廣說謗法之罪謂此方墮阿鼻地獄此土劫壞罪猶未畢移置他方阿鼻地獄中他方復經劫壞罪亦未盡復移他方如是巡歷十方十方各經劫盡還生此土阿鼻地獄中千佛出世救之猶難若欲說其所受之身聞者當吐熱血而死已上注證道歌云法之罪非小過也毀般𠰥罪業皆落地獄亦非輕計地獄皆元間地獄即極重獄時數冬遠皆論劫數謗法報非一具如藏經所載或為九頭龜或患白疾等矣念佛鏡云准𮦀集經說一度謗念佛人千劫墮𭰖梨地獄已上毀法𢙣報出佛祖統紀五十五并西域記十一等明其現證問謗法與闡提其義云何同耶異答名義集二釋一闡提之文恐繁不引大槩與謗法同但要集記一引超悟抄云不信因果名一闡提不信大乘名謗方等已上鈔十八引優婆塞戒經尺有少異扇提撥無之上亦尚持𢙣戒云云是故少異一闡提事𣵀槃經十六名義集二弘决五同一尺籤一一乘要决下宗鏡四十八同八十五教下要記六同十一傳通記四鈔十八等六要鈔一云言闡提者𣵀槃經云一闡名信提名不具信不具故名一闡提已上具云一闡提今略云闡提彼玄義云謗法與無信無信是也言無信者雖聞佛法都無信謗以之謂之謗法猶重已上六要以是文可為異問今偈之中逆謗云生本願相違乎答此義如疏止門意問廽心皆往導師之意鸞師何故立謗法不生乎六要鈔三末云問鸞師之意全不可許謗法之機往生益乎如今文者不許之歟但如下卷莊嚴心業㓛德成就之解釋者許彼謗法尚得解脫彼釋許生攝受門意是約回心今釋不許止門意約未回心已上此文之中謂今文又言今釋者論注上卷回向門下謗法不生文也謂解釋言彼釋者注下云衆生以憍慢故誹謗正法毀呰賢聖捐尊長如是之人應受拔舌苦瘖啞苦言教不行苦無名聞苦如是等種種諸苦衆生聞阿陀如來至德名號法音聲如上種種口業繫縛皆得解脫入如來家畢竟得平等口業已上謗法得益本據者觀佛經云諸凡夫及四部弟子謗方等經犯四重禁偷僧物淫比丘尼破八戒齊作𢙣事種種邪見如是等人𠰥能至心一日一夜繫念在前觀佛如來一相好者諸𢙣罪障皆悉盡滅又云五逆罪及謗大乘如是諸人𠰥懺悔日夜六時身得輕微又云是諸比丘前世之時以𢙣心故謗佛正法但為父故稱南無佛生生常得聞諸佛名乃至今世值遇我出世諸障除故成阿羅漢已上餘觀稱名尚如是陀超世名號乎齊廽入者玄義云致使五乘齊入已上爰六要鈔五釋云就言齊入有𢝰別意者齊乘佛願之意不論機根不簡善𢙣唯依佛願得生義也別者有二所謂齊上齊下義也言齊下者謂淨土教本被凡夫仍以凡夫為其正機是故三乘皆同凡夫入彼報土言齊上者所謂報土所入之機本是十地菩等也凡夫雖非所入之限由佛力故同其上機齊得生也已上如衆等者如前所引性功德尺又行卷云言海者從久已來轉凡聖所修𮦀修𮦀善川水轉逆謗闡提恆沙無明海水成本願大悲智慧真實恆沙德大寶海水喻之如海也良知如經說言煩𢚰冰解成功德水已上願海者不宿二乘𮦀善中下尸骸何宿人天虛假邪僞善業𮦀毒𮦀心尸骸乎已上攝取心光常照護已能雖破無明暗貪愛瞋憎之雲霧常䨱真實信心天譬如日光䨱雲霧雲霧之下明無暗六要鈔云攝取以下三行六句是明陀光攝之益貪瞋鄣𮑇雖不見之大悲不倦攝護止得心不退必得往生論注上云問曰𠰥言㝵光如來光明量照十國土所障㝵者此間衆生何以不蒙光照光有所不照豈非有㝵乎答曰㝵屬衆生非光㝵也譬如日光周四天下而盲者不見非月光不周也已上元照陀經義疏云當知我輩處佛光中都不知覺佛光常攝略無厭猶如盲人居月輪下又如溷蟲樂在穢處撫膺自責實可悲痛已上三毒所䨱不見佛光義同盲人不見日光已上六要問攝取心光言依何文答觀念法門云但有專念阿陀佛衆生彼佛心光常照是人攝護不捨已上攝護不捨即攝取也謂攝攝護取是不捨經說此益云其有衆生遇此光者乃至善心生焉禮讚云蒙光觸者心不退已上德大寺唯蓮房依夢想告知攝取義如决疑鈔問心光何義論同智慧光佛心所起光明故名曰心光問色心二光共佛心所起何心光云佛心所起答六要鈔三末云言心光者此非光分身相心想其體各別只就義門宜得其意以佛慈悲攝受之心所照觸光名之心光是念佛行相應佛心其佛心者慈悲為躰是以經云佛心者大慈悲是以無緣慈攝諸衆生已上是故照觸稱名行人之大悲光得心稱耳已上六要有義云非是光躰有其二只是副佛意云心光佛意者護念攝護不捨故於光立攝取名也譬如月有懷兔之名亦如云送火迎火等云云問光躰無二非離色光外別有心光色光亦是可副佛意如何光躰無二以攝取故心光副佛意譬如執燈入暗燈光所照云有尋物問攝取心光何限念佛如攝取問攝取光明常光神通二之中何常光略記云常光一雖常非遍別緣遍照雖遍非常此佛光明即不如是經量劫遍照十𭤧已上悲𬜻經說念王願云願我未來世成阿耨菩提已常光照於量邊百千億那由他諸佛世界等已上但別緣機前不神通光如授記光凡念佛攝取義如傳通記已能等者無明者六要鈔尺本書云㝵光明破明暗慧日文云言無明者𠰥依天台此有通別言通惑者是界內惑三毒之中癡煩𢚰也言別惑者合貪嗔癡名為通惑塵沙無明此二種惑名為別惑已上見思之惑四教通斷故云通惑塵沙明菩獨斷故云別惑問今無明何乎六要鈔無分別尺定可通二依通惑義次句則云貪愛瞋憎知是無明癡煩𢚰也今破明暗者念佛行人謂其頓斷生死之功義當得智得功德和云信心智慧是則决了定得往生破癡暗義依別惑義信心發起時云𣵀槃畢竟真因始芽凡夫行人雖不知之他力德滅始明蜜無生理本破明暗貪愛等者憬興云惑業苦三能覆真空及智日月即同雲覆虛空日月故云生死雲已上與今意同問貪瞋不滅不可往生般舟云貪瞋是輪廽業又云貪瞋障受人天道三𢙣四趣內安身散善義云瞋嫌之心燒功德寶戝爾者如何般舟二文初業道所牽是誡門尺也勸門之曰謗法闡提廽心皆往次貪攝偷盜瞋攝殺生故云障受人天道明障世間義令知出世障又是誡門尺散善義文二河譬尺水火雖濕正有白道得至西岸然則貪瞋雖覆欣求心誠可得往生問貪愛同耶異𠰥言異者法界次第云貪染之心名之為愛已上言同者𣵀槃經云無明所盲不能出貪與愛已上爾者如何答圭峯圓覺云一貪非愛如人貪忙非是愛忙二愛非貪如人愛看相打相殺誰肯貪求三亦貪亦愛即名利戝色四非貪非愛即違情之境已上法界次第文今第三句心乘境境移心此時貪愛同時共起顯等四貪即此意也𣵀槃經文十二句意此時聊異順心云貪愛違心云瞋憎凡愛有多義俱舍第四云然愛有三一有染污二無染污已上今愛有染污𣵀槃經云善愛不善愛安樂集并万善同歸集出又云餓鬼愛法愛宗鏡三十一出要記七云十輪經鈔云於三寶中用七憎七愛法一順情者信違情者不信二順情者嘆違情者呰三順情者𣴎事違情者不𣴎事四順情者敬情者不敬五順情者供養情者不供養六順情者所有言說皆聽受情者所有言說不聽受七順情者守護願得常存情者不守護願欲斷却又云於三寶中七憎七愛成十𢙣輪已上百法抄云自躰愛者愛現我身惜棄捨也境界愛者有二種愛現在資具親屬等惜棄捨二任運緣當生所起愛心也矣又止觀六同四又籤二釋愛義繁故不出偈譬如等者煩𢚰雖覆攝取心光不捨行者以心不退憶念不絶是應合譬也獲信見敬大慶喜即撗超截五𢙣趣一切善𢙣凡夫人聞信如來弘誓願佛言廣大勝解者是人名芬陀利𬜻六要鈔云獲信以下三行六句是顯念佛真實行者信心勝利聞法能不忘見敬得大慶三十偈文當卷之初被引用之故不出尺聞法本意在發信心故云獲信已上六要平等覺經云聞是法而不忘便見敬得大慶則我之善親厚以是故發道意已上淨影雙卷經尺聞法能不忘之文云聞不忘者陀佛所聞法不忘言見敬者見陀佛心生重敬得大慶者明前聞法見佛敬得善利也乃至行順釋迦名我善友已上義寂云聞法能不忘者聞而能思故不忘也見敬得大慶者於思擇時見其𭰹趣而敬重得其滋味而大慶若能如此則與佛同志故云則我善親友已上淨影彼土義寂此土今偈文則此土故意同義寂即撗等者六要鈔云即撗等者必得超絶去等文意五𢙣趣者是五道也淨影師云今此對𢏏陀淨剎娑婆五道齊名𢙣趣地獄鬼畜純𢙣所向名為𢙣趣娑婆人天雜業所向亦名𢙣趣𠰥依此𭤧修習斷除先斷見惑離三途因滅三塗果㣪斷修惑離人天因絶人天果漸次斷除不名撗截𠰥得往生𢏏陀淨土娑婆五道一時頓捨故名撗截已上義寂師云就穢土下三為𢙣人天為善今對淨土五皆名𢙣一得往生五道頓去故云撗截已上又六要一云言撗截者頓速義也大經云聞法樂受行疾得清淨處已上又覺經云速疾超便可到安樂國之世界已上又十住毗婆娑論云𠰥人欲至不退轉地者應以敬心執持稱名號已上淨土論云能令速滿足功德大寶海已上是皆速疾得益義也已上六要問經說𢙣趣釋云四流因果相經舉果顯因釋舉因顯果問趣者何義尺氏要覽云毗婆娑論云所往義是諸有情所應往結生之處故名趣也毗曇論云趣到義謂彼善𢙣業因能令有情到其生處又道義故名六道已上問五道六道何異修羅一道攝鬼畜天故云五道俱舍云或鬼或天或復傍生故不別說已上形醜上似鬼飛行自在威德似天用不淨食如犬等故問智證尺云開為五道合即六道此義如何於修羅一道論開合義也謂以修羅攝鬼畜天是則開義修羅一道攝於三處以是義云開為五道修羅一立為六道時不攝三道故云合即六道一切善𢙣等者舉能歸機玄義云一切善𢙣凡夫得生者即本願十𭤧衆生如來弘誓願者顯所歸法玄義云言弘願者如大經說即十八願佛言等者廣大勝解是褒美言佛可也勝解光尺云是事如是非不如是散善義云𠰥稱佛意即可言如是如是𠰥不可佛意者即言汝等所說是義不如是不者即同記利益之語佛可者即隨順佛之正教已上唯識論五云云何勝解於决定境持為性不可引轉為業謂邪正等教理證力於所取境决印持由此異緣不能引轉故猶豫境勝解全無非决心亦無勝解已上俱舍論四云勝解者謂能於境印可此事如此非不如是起殊勝解已上是人等者是亦稱嘆行者言也經云𠰥念佛者當知此人是人中芬陀利𬜻已上疏云若能相續念佛者此人甚為有更無物可以𭤧之故引芬陀利為喻言分陀利者名人中好𬜻亦名希有華亦名人中上上華亦名人中妙好華此華相傳名蔡華是若念佛者即是人中好人人中妙好人人中上上人人中希有人人中最勝人也已上法聰記云芬陀利此云白蓮華華中最勝妙色顯衆色之本為世崇重𠰥念佛衆生為世所貴故舉此為喻已上六要鈔三末云分陀利者蓮中好華西天玩之如此櫻梅是故以之喻今行人憬興師云分陀利華即白蓮華水陸華中最為尊勝依大日經蓮華有五一鉢頭摩二優鉢羅各有二色謂赤與白三俱勿頭亦有二色謂赤與白四泥盧鉢羅此華極香從牛糞生五分㭟利迦相羕圎整可愛最下極白內色漸微黃此華極香言蔡華者是蓮華名依論語意蔡者龜也意龜所遊之華故即云龜其躰蓮華華中蓮勝蓮華之中此華殊勝冝哉此華經為題目佛亦為眼豈比凡種而佛世尊以念佛人譬此好華尤足為奇妙法蓮華雖有當躰譬喻二義共所行法今觀經說嘆能行人若約所行定亦應同能所雖殊恐顯陀妙法同躰之𭰹㫖歟又𣵀槃云是人中蓮華芬陀利華已上而彼文意譬佛說之淮之思之念佛行人即備如來㓛德義分此喻如彼染香人身有其香氣是則今此陀名號自彼法性無漏果德所流出之妙好香也唱之念之薰口薰心不知自有無量德㓛德香氣故潜備佛㓛德氣分是故信知陀五智㓛德稱念名號本覺心蓮漸生長開發諸法無生甚𭰹一分理也尤可貴之已上問正觀記云𣵀槃經云水中華分陀利華第一已上是以白色為第一大論云水中華青蓮華第一已上相如何答是有通別𢝰取蓮華是通分陀利是別稱玄義七云睿師序云未敷名屈摩羅將落名迦摩羅處中盛時名分陀利遠師云分陀利迦是蓮華開發時然體逐時還名隨色變故有三名也大經亦云人中蓮華分陀利華二名並題者應有通別之異今取蓮華是通分陀利是別稱道朗云鮮白色或翻為赤色或翻為最香如此皆是開盛之義舉分陀利則兼之已上爾者青未開色白開盛色並無相違又有意得寺青蓮華山白蓮華問蓮華有何德乎大月經疏五云昔琉璃王𡧱釋女時大迦於阿耨達池取此華褁八㓛德水灑之諸女身心得安樂命終生天已上玄義七云蓮華從緣生𨐫佛性從緣起蓮華能生梵王𨐫從緣生佛蓮華生必在於淤泥𨐫解起生死蓮華是瑞見者歡喜𨐫見者成佛蓮華從微之𨐫一禮一念皆得作佛蓮華必俱𨐫因果亦俱華必有蓮𨐫因必作佛蓮畢華𨐫引入蓮華世界蓮華是佛所踐𨐫衆聖託生已上具如玄義一及七并尺籤彼合法華今轉用以可合念佛也彌陀佛本願念佛邪見憍慢𢙣衆生信樂受持甚以難難中之難無過斯六要鈔云陀以下二行四句是明信受甚難欲令識知遇法要益言信樂者光記釋云信有二種一忍許相或名信可名異義同二欲樂相或名信樂或名信愛名異義同已上百法論疏云云何為信於實德能𭰹忍樂欲心淨為性對治不信樂善為業已上唯識論云忍謂勝解此即信因樂欲謂欲即是信果已上依此等文信有二義所謂忍許愛樂是也今信樂者即此二意言受持者義寂師云受者作心領納故持者得記不忘故已上難中等者經云若聞斯經信樂受持難中之難無過此難已上淨影師云約對前三明此經中修學最難餘義餘法處宜說開顯淨土教人往生獨此一經為是最難已上言前三者諸佛經道菩勝法聞法能行是皆為難對三今經第一難也問持此經人善𢙣二機更無所選何云邪見憍慢等耶念佛之機廣亘善𢙣置而不論雖然專以障重根鈍為正機故先約𢙣人非除善人已上六要私云邪見等者問經云憍慢㢢懈怠不云邪見㢢中愚癡即是邪見俱舍十六頌云邪見癡究竟疏云由上品癡成邪見故已上問稱名一行愚人猶易修何云受持難是非機教不相應難遇法難也彼如經云難信之法靈芝云念佛法門不簡愚智不擇豪賤不論久近不選善𢙣唯取决誓猛信臨終𢙣相十念往生此乃具縛凡愚屠沽下類剎那超越成佛之法可謂一切世間甚難信也已上此意也先所引六要鈔明信受等文意應知問邪見等者往生要集云觀佛經云若起邪念及貢高法當知此人是增上慢破滅佛法多使衆生起不善心亂和合僧顯異惑衆生是惡魔伴如是𢙣人雖復念佛失甘露味此人生處以貢高故身恆𤰞小生下賤家貧窮諸𮕱無量𢙣業以為嚴飾已上邪見憍慢矣天台梵網義記云上邪見者撥一切都無因果如闡提已上如是機何信佛願乎既云廽心皆往廽詫佛願豈不生乎又信樂者俱舍四云愛謂愛樂體即是信然愛有三一有染污二無染污有染謂貪如愛妻子等無染謂信如愛師長等此頌言愛者取第二愛也有信非愛謂緣苦集信忍許故有信可厭故非愛有愛非信謂諸染污愛由起貪是愛染污非信也有通信愛謂緣滅道信忍許故生信可欣故有愛有非信愛謂除前相已上此文之中作為四句今信樂是當第三句難中等者大經流通舉難勸信有𢝰別難今難中者是其別難則先所引若聞斯經等文是也然就此文六要鈔有一義先經𢝰別難者如來興世難值難見諸佛經道難得難聞菩勝法諸波羅蜜得聞亦難遇善知識聞法能行此亦為難是云𢝰難𠰥聞斯經信樂受持難中之難無過此難是云別難六要六舊本新末云舉難勸信之中又分為二自文之𭃡至亦為難是先約惣𠰥聞已下次別也𢝰之中依淨影意難值等者生當佛時名之為值目覩稱見此皆難也難得等者手得經卷名之為得耳聽曰聞亦可領誦目之為得耳餐稱聞此等皆難也菩等者菩勝下明其行法聞之甚難遇善知識能行亦難明修行難別之中難中等者對前三今所言者除見佛難明此經中修學最難餘義餘法處處宜說開顯淨土教人往生獨此一經為是最難已上意就此釋意私有所解私云前六要一義者則此料簡所謂初中至聞亦難廣一代正為之𢝰於其文中如來等者於佛在世其佛寶諸佛已下於其滅㣪是法寶菩等者是僧寶遇善等者是雖屬惣𭘧別意歟是則此文存淨教意其中今起行之𨕙𠰥聞已下別中之別謂安心得此信心難中之難也結此信行下說信順如法修行且依一流口傳宗㫖且就一分短慮領解聊以記之他不可與𫐠愚意耳已上六要度西天之論衆中夏月域之高僧顯大聖興世正意明如來本誓應機六要鈔云度以下二行四句𢝰明三朝高僧弘教利益本心顯大等者是顯釋尊教遣聖意明如等者是示陀濟度佛願已上私云度者西域記二云天竺之稱異議糾紛舊云身毒或曰賢豆今從正音宜云度度之人隨地稱國殊𭤧異俗遙舉揔名語其所美謂之度度者唐言月月有多名斯其一稱言諸群生輪回不息無明長夜莫有司晨其猶白日既隱宵燭斯繼雖有星光之照豈如朗月之明苟緣斯致因而月良以其土聖賢繼䡄導凡御物如月照臨由是義故謂之度已上嚴疏一云度月名具云特伽此云月邦以此大國形諸小國如星中月已上西天者問五天竺中西天乎答不爾今者𢝰指五天云西天也何者度西天言明論家住國龍樹南天天親北天故依𢝰義問何故𢝰名西天如何答有云問准西域記𨵻浮提中央大雪山也國為四分北曰胡西云波羅底支亦云波師南云天竺亦名月攴東云震旦然從東天竺鳩國之東北至震旦燕國西南隔十八千里山經流沙䓗嶺險難爾者可云西南國如何有人云䓗嶺相隔月攴震旦出行之人過胡國南邊繞䓗嶺而入南竺故出行初云西國也梵語云胡語此之謂也又有云雖非正西大都且云西國云云中夏者是震旦也有云三皇栖枝五帝建家夏禹王來始建帝都以大夏州是帝都始干今以京名於夏歟已上此義不爾六要鈔云言東夏者即是震旦東對天竺夏中國名夏宋韻云大也已上私云中國為夏夏大也謂明禮儀其行大故又云中原禮儀原故又云華夏又云中華今中夏者即此意也日域者又云扶桑又云豐苐原又云秋津嶋又云山迹又云馭盧嶋如日本記高僧者高歎智行僧云僧伽名義集云大論𥘿言衆多比丘一處和合是名僧伽𨐫如大樹叢林是名為林淨名疏云律名四人已上皆名衆律鈔曰此云和合衆和合有二義一理和謂同證擇滅故二事和別有六義戒和同修見和同解身和同住利和同均口和無諍意和同恱什師云欲令衆和要由六法一以慈心起身業二以慈心起口業三以慈心起意業四若得食時减鉢中飯供養上座一人下座一人五持戒清淨六漏盡智惠報恩經云衆僧者出三界之福田謂比丘具有戒躰戒為善之根是故世人歸信供養種福如沃壤之田能生嘉苗故號良福田大論云是僧四種一有羞僧持戒不破身口清淨能別好醜未得道二無羞僧破戒身口不淨無𢙣不作三啞羊僧雖不破戒根䤜無慧不別好醜不知輕重不知有罪無罪若有僧事二人共諍不能斷决默然無言如白羊人殺不能作聲四實僧𠰥學無學住四果中行四向道是名實僧已上名義集僧史略云要覽引之凡四人已上名僧今一人亦稱僧者蓋從衆名之也亦如萬有二千五百人為軍一人亦稱軍也已上又文句一盂蘭盆記下明僧義恐繁略之次顯大等者出世本懷正意也本誓者十八願也應機者機教相應意安樂集云時被機勸歸淨土者𠰥教赴時機易修易悟𠰥機教時卒難修難入是故正法念經云行者一心求道時常當觀察時𭤧便若不得時無𭤧便是名為失不名利何者如濕木以求火火不可得非時故𠰥折乾薪以覓水水不可得無智故已上釋迦如來楞伽山為衆告命南天笁龍樹大士出於世悉能摧破有無見宜說大乘無上法證歡喜地生安樂先明龍樹事次可示意龍樹大士釋論疏一云龍樹之名從三義立一云以此菩樹下生身龍宮成道故名龍樹二云龍為法身樹為生身龍與樹異名為龍樹三西有山山有大樹䕃五百龍彼樹王名龍樹常為諸龍演說妙法從彼受名故稱龍樹乃至或名龍勝或名龍猛已上應化録云付法藏經云人師之作南天竺國王甚邪見承事外道毀謗正法龍樹菩為化彼故即詣王所王問汝是何人言我是一切智人王勑集諸婆羅門與諸外道共與沙門廣共論議時諸外道聞是事已悉來雲集含怒懷嫉來競言辨於是龍樹升座其愚短者一言便屈小有慧極至再問詞理俱盡無量邪見外道皆悉降伏剃除鬚髮俱共出家如是展轉廣度衆生已上西域記十云龍猛菩善間藥術壽年數百志貌不𮕱引正王既得妙藥壽亦數百王有稚子謂其曰如我何時得嗣王位曰以今觀之未有期也父王壽已數百子孫老終者蓋亦多斯皆龍猛福力所加藥術所致菩寂滅王必徂落菩智弘慈悲𭰹厚汝宜往彼試從乞頭王子承命來至伽藍菩見王子謂曰何降趾僧坊對曰我有所求人頭為用菩曰是身如響是身如泡流轉四生往來六趣宿契弘誓不違物欲以乾苐自刎其頸若利劒斷害身首異處王子見已驚奔而去已上略出弘决一云樹學廣通天下無欲謗佛經而自作法表我無師龍攝入宮一夏但誦七佛經目知佛法妙因而出家降伏國王制諸外道外道現通化為華池㘴蓮華上龍樹為象蓮華撲外道已上佛祖統紀五云十三祖龍樹尊者南天竺國梵志之裔龍樹與契友三人議往術家學隱身法四人既得其藥翳身遊行相與入王㣪宮數月美人懷妊王問智臣用其計果四人足迹乃令勇士揮釰空中斬三人首近王七尺刀所不至龍樹斂身依王不能加害始悟欲為若本即自誓曰若免斯難當詣沙門受出家法得出宮便入山至一佛已上略出出世時代者大術經統紀並云自佛滅七百年生或八百年出現住壽三百歲云云大士者集解上云大士者大非小也士事也運心廣大能建佛事故云大士亦云上士瑜伽論云無自利利他行者名下士有自利無利他名中士具自他行名上士大論以菩名大士亦開士普賢觀以聲聞菩名大士金光明以佛為大士已上集解文句記二云大士者大論稱菩為大士亦曰開士士謂士夫凡人之通稱以大開簡別故曰大等如世云仁士志士等亦以仁等簡之今人中發大心者名大開是發之異名已上釋氏要覽上云經音疏云開達也明也解也士則士夫也經中多呼菩為開士前𥘿符堅賜沙門有德解者號開士已上次解意者六要鈔云龍樹中釋迦已下三行六句是明釋尊未來記說楞伽經云我乘內證智忘覺非境界如來滅世㣪誰持為我說未來當有人於南天國中有大德比丘名龍樹菩能破有見為人說我乘大乘上法住𬂟歡喜地往生安樂國已上此經文意真言行人謂祕教真宗學者為被念佛內證智者陀五智忘覺等者聲聞菩不測如來智慧海也我乘大乘上法者念佛三昧龍樹論中多陀稽首禮拜故指真門自云我乘今言大乘上法者即是念佛佛以名號說為大利又言所舉之名雖亘諸佛或云阿陀佛本願如是或云𠰥人念我稱名自歸或云稱名一心念亦得不退轉專𢏏陀依之於彼陀者委自餘佛菩之蓋是諸教所多在陀故也已上六要釋迦者具云釋迦牟尼名義集云能仁寂默寂默故不住生死能仁故不住𣵀槃悲智兼運立此嘉稱發軫云本起經翻釋迦為能仁本行經譯牟𡰱為寂默能仁是姓寂默是字姓從慈悲利物字取智惠理以利物故不住𣵀槃以理故不住生死已上長水云寂者現相無相默者示說無說此則即真之應也能仁是姓者長阿含云昔有輪王姓甘蔗氏聽次妃之譖𢷤四太子至雪山北自立城居以德歸人不數年間鬱為強國父王悔憶遣使往召四子辭過不還父王三歎我子釋迦因此命氏寂默是字者本行經云又諸釋種立性憍慢多言及見太子悉皆默然王云冝字牟尼稱淨土經名釋迦寂靜又釋迦牟尼度沃焦如舊華嚴名字品及十住婆沙所列大海有石其名曰焦流沃之至石皆竭所以大海水不增長衆生流轉猶如焦石五欲沃之而無猒足唯佛能度故此為名已上宗鏡二十四云釋迦牟尼者釋迦此云能仁牟尼此云寂默能仁者即心性無邊含容一切寂默者即心體本寂動靜不干故號釋迦牟尼已上楞伽山者西域記十一云僧伽羅國東南隅有䮮迦山巖谷幽峻神鬼遊舍昔佛於此說䮮迦經已上名義集云楞伽正言䮮迦佛住南海濵入楞伽國摩羅耶山而說此經梵語楞伽此云不可往唯神通人𭤧能到也已上二文國名相違僧伽羅大國楞伽國其中小國歟南天竺者五天中一南天竺橋羅國龍樹出生云云有無見者偏空偏有䉼常二見法界次第云邪心觀理名之為見若於假實二理情迷而倒想邪求隨見偏理妄執為實通名為見已上有無二見是為根本𠰥論枝末六十二見宗鏡三十七云華嚴疏云生之無生真性湛然無生之生業果宛然是知若即念存有念即是常見離生求無生即是䉼見同三十四明二見義以繁略之證道歌云棄有著空病亦然還如避溺而投火弘决五云如大經十八耆婆為闍王作外道𨐫中云見二小兒相牽鬪諍捉頭髮安尺云二小兒者斷常有互相是非如捉頭髮已上大乘上法者念佛三昧前所言如六要鈔也問大乘者其義如何答釋氏要覽云梵云摩訶衍此云大乘大者簡小之稱乘者運載為義十二門論龍樹菩問云何名摩訶衍答於二乘為上故諸佛最大是乘能至故諸佛大人乘是乘故能盡諸法邊底故名大乘菩地持經云有七種大名大乘一法大謂𭤧廣藏最上大故二心大謂發阿耨菩提心故三解大謂解菩𭤧等藏故四淨心大謂過行解地故五衆具大謂福德衆具故六時大謂三阿僧祇劫故七得大謂得上菩提故已上要覽行卷云大乘無有二乘三乘二乘三乘者入於一乘一乘者即第一義乘唯是誓願一佛乘也已上玄義八云中邊分別論云乘有五一乘本謂真如佛性二乘行謂福慧三乘攝謂慈悲四乘障謂煩𢚰是煩𢚰障行解等是智障五乘果謂佛果也唯識論云乘是出載義由真如佛性出福慧等行由此行出佛果由佛果載出衆生攝大乘論乘有三一乘因謂真如佛性二乘緣謂萬行三乘果謂佛果也已上宗鏡十一云大乘者所言大者即衆生心性能包能遍至小無內無一塵而能入至大無外無一法而不含所言乘者以運載為義能運行人直至婆若海已上問大乘與一乘同耶異答宗要引法華義疏云經云二乘皆入大乘大乘者即是佛乘是故三乘即是一乘已上又前行卷文與今同問二門一乘別如何聖道自力機情悟解能入一乘因分可說練金一乘次上所引玄義宗鏡是其文也淨土他力佛智所建所入一乘果分不可說變金不思議一乘前行卷文即其義也小經義疏云一乘極唱終歸咸指於樂邦已上法華云聞是經典如說修行於此命終即往安樂世界阿㫆陀佛大菩衆圍繞住處生蓮華中寶座之上已上是所入一乘之證也歡喜地者唯識論九云一極喜地初獲聖性具證二空能益自他生大喜故已上首經八云是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地已上釋要鈔六云地者可遊履義又出生義智為能履能發理為所履所發也已上安樂者極樂也經云有三塗若難之名但有自然快樂之音是故其國名曰安樂已上安安住義樂即𣵀槃安住大樂故云安樂云云顯未難行陸路苦信樂易行水道樂六要鈔云顯示以下一行二句判示難易二道得失其文源出十住婆沙已上其文者論注云謹案龍樹菩十住毗婆沙云菩求阿毗跋致有二種道一者難行道二者易行道難行道者謂於五濁之世於佛時求阿毗致為難此難乃有多途粗言五三以示義意一者外道相云即言義不待命潜顯信心開發時分入正㝎聚已上唯能常稱如來號應報大悲弘誓恩六要鈔云唯能以下一行二句𢝰結也遇易行法出離在心勸應報謝他力佛恩已上於中唯能者稱名一行以正業故問五正行共可為報謝獨舉稱名有何意乎答五正行皆可為報謝置而不論口業稱名是易行而正定之業故唯舉正攝助可知常稱者一心專念陀名號文意也
