body:
  text: 本願名號正定業至心信樂願為因成等覺證大𣵀槃心至滅度願成就第一句者稱名正業是即行也第二句者真實正因是即信也三四句者往生果照前依信行得𣵀槃果本願等者六要云本願名號之一句者十七願意已上問十七願者咨為躰何以名號云十七願意咨能所則名號即是十七願躰故云十七願意此願因願成就如來會文入陀等並在行卷披文可見行卷云諸佛稱名之願淨土真實之行選擇本願之行六要二本云諸佛稱名願者是第十七願也是則說為往生行之名號願故當卷出之凡於四十八願之中此願至要𠰥無此願名號之德何聞十方聞而信行此願之力𠰥無此願超世願意諸佛何證依證立信又此願恩也淨土真實行者往生行中佛本願故正以念佛為其生因故云真實是名也餘非本願故非真實選擇本願行者其意又同念佛正是選擇本願餘非選擇本願之行故以念佛云真實行云選擇行已上行卷云謹按往相廽向有大行有大信大行者則稱㝵光如來名斯行即是攝諸善法六要云攝諸善法者玄義云量壽者是法覺者是人人法並彰故名阿陀佛已上法所覺法覺能覺人其所覺法乃是八万四千法門因行果德法不備攝諸善法之義應知具諸德本極速圎滿六要云具諸德本者大經上供養一切佛具足衆德本已上饒王德順𣱵得之要决云諸佛願行成此果名但能念號具包衆德已上真如一實㓛德寶海六要云真如等者唯識論云真謂真實顯非虛妄如謂如常表變易已上起信論云所謂心性不生不滅一切諸法唯依妄念而有別𠰥離心念即一切境𤰪之相是故一切法從本已來離言說相離名字相離心緣相畢竟平等有變移不可破壞唯是一心故名真如已上此真如理雖離言說名字之相今此名即為真如法性正躰之義𭓩然淨土論說依報相云彼量壽佛國土莊嚴弟一義諦妙境界相已上論注上解本論真實㓛德相文云有二種㓛德一者從有漏心生不順法性所謂凡夫人天諸善人天果報𠰥因𠰥果皆顛倒皆是虛僞是故名不實㓛德二者從菩智惠清淨業起莊嚴佛事依法性入清淨相是法不顛倒不虛僞名為真實㓛德已上又同下釋往生義云彼淨土是阿陀如來清淨本願生之生非如三有虛妄生也何以言之夫法性清淨畢竟生言生者是得生者之情耳已上又嘆名之㓛德云聞彼阿陀如來至極生清淨寶珠名投之濁心念之中罪心淨即得往生已上真如法性弟一義諦𣵀槃生皆是一法之異名也㓛德寶海者今嘆名㓛德甚𭰹殊勝稱寶廣大喻海論云能令速滿足㓛德大寶海已上注云使我成佛時值遇我者速滿足上大寶已上智光疏云佛身所有不共㓛德數過塵沙不可測量故喻如海已上故名大行然斯行者出於大悲願六要云問大悲之言攝衆生義於攝法身何云大悲解有二義一云雖攝法身專是大悲所以然者何於佛意求其名聞依咨願有佛證誠依佛證誠衆生歸信故願佛併為利益故云大悲一云義𡧘引影已云此亦多從願相而說𠰥委細論一一具足已上大師又同義𡧘師意諸願亘三無所簡歟攝法身者玄義云一一願言𠰥我得佛十方衆生稱我名願生我國下至十念𠰥不生者不取正覺今既成佛即是酬因之身也已上攝淨土者禮云四十八願莊嚴起超諸佛剎最為精已上攝衆生者散善義四十八願攝受衆生已上法事讚云四十八願殷勤喚衆佛願力往西方已已上𠰥依此義四十八願一一皆為大悲之誓願耳已上即是名諸佛稱揚之願六要云稱玉篇云齒證切遂也齒𨹧切也今用義又云揚與切廣云音揚飛舉也明也已上復名諸佛稱名之願六要云言稱名者此非稱念今稱揚彼名義也已上復名諸佛咨嗟之願六要云咨嗟者憬𫤭云咨者也嗟者嘆也已上廣云咨即夷切也謀也玉篇云子祗切謀也也廣云子耶切咨也嘆也痛惜也已上亦可名往相廽向之願亦可名選擇稱名之願也已上行卷今本願名號者十七願我名是也正定業者法藏菩於往生行選定念佛故云定也空師云往生之業念佛為本又云夫速欲離生死二種勝法中且閣聖道門選入淨土門欲入淨土門正𮦀二行中且拋諸𮦀行選應歸正行欲修於正行正助二業中猶傍於助業選應專正定正定之業者即是稱佛名稱名必得生依佛本願故已上往生之業念佛即是正中之正謂離生死二種勝法對儒教及以外道教云之正行十因云出離正道此時𮦀行一得正名正𮦀分別時𮦀行失正名五種之正行二度得正名正助分別時前三㣪一還為助失正名篇四稱名獨得正名依之稱名三得正名故正定業唯是念佛六要鈔云於正行中上分正助以其稱名為正定業嘆順佛願故正行德是最要已上疏云一心專念陀名號乃至是名正定之業順彼佛願故已上行卷云釋云專心者即一心形二心也云專念者即一行形二行也今勒付屬之一念即是一聲一聲即是一念一念即是一行一行即是正行正行即是正業正業即是正念正念即是念佛念佛則是南無阿陀佛也已上又云稱名能破衆生一切明能滿衆生一切志願稱名則是最勝真妙正業正業則是念佛念佛則是南無阿陀佛南無阿陀佛即是正念也可知已上至心信樂願為因者六要云至心信樂之一句者十八願意已上至心信樂者舉一二心攝弟三心至心者疏云至者真誠者實也已上問至無真訓如何答字訓非一博覽何疑天台疏云至之言專誠之言實也已上信卷云至者即是真也實也誠也心者即是種也實也已上本願至心觀經至誠心也即是真實心也但觀經三心定散諸機所發三心云之自力本願三信利他信心云之他力𠰥自力歸入他力為報土因是當流意觀經真實分為二種疏云又真實有二種一者自利真實二者利他真實言自利真實者復有二種一者真實心中制捨自他諸𢙣及穢國等行住㘴卧想同一切菩制捨諸𢙣我亦如是也二者真實心中勤修自他凡聖等善已上問標舉二種無利他牒尺答雖有異義依當流意次上所云凡所施為趣求之文是即利他真實又次下所云不善三業必須真實心中捨又𠰥起善三業者必須真實心中作不簡內外明暗皆須真實故名至誠心之文是即利他真實也六要三本云問標有二種不尺利他真實云何學者雖存種種之義且依當流一義意者上來所言所施真實趣求真實今所標之利他真實故別不解今所言之自利真實是明常真實之相是則機有上中下差𠰥其上機上安心上有此所為如虎戴角但此行儀難通諸機縱不如此契上利他真實之相有歸佛心亦得往生煩𢚰𮚆害下機專為正機故也已上凡所施為趣求之文有文點讀六要云凡所施者是如來施佛是能施為趣求者是行者佛道趣求是則對佛衆生所施是以如來施與之行即為衆生趣求之行能所雖異俱是如來利他行故謂之真實言亦皆者上因位行即今所施上云佛行今云所施能施佛行所施行躰共是真實故云亦也已上又疏欲明一切衆生身口意業所修解行必須真實心中作不得外現賢善精進之相內懷虛假已上是有文點六要云心中作者非行者作佛所作是則凡心非真實故依歸佛心真實之德為其佛德得往生益就其所歸云真實心依主釋也不得等者誡門尺也此句文點自現還得當流學者定存知歟今此尺意誡𮦀行也所以然者凡夫之心更無賢善精進之義只是愚𢙣懈怠機也而人不顧自心愚𢙣隨緣起行𠰥欲求修賢善精進之諸行者𢙣性心故煩𢚰𮚆害必是不免虛假𮦀毒內懷虛假是其義也然者不現賢善等相識知自心三毒𢙣性捨自力行歸他力行可得真實清淨業也以勸此心為今尺要已上凡三心釋得當流意自行化他可置胸襟六要三本云於此三心可存二意一者是為定散諸機所發起故先被行者明其信相故明初心勸門之時先其機勸可解行真實之義誡門之時同其機誡侵貪嗔可離虛假內外相應謂之真實然而未分自力他力下之二心准之應知二者三心皆是如來廽向成就之利益也更非凡夫自力之心凡心更真實之義偏歸他力以其佛德證得往生是故於機不論信相此義邊大經觀經三信三心本是一意今至誠心勸誡二門讀其文點宜令領解可在口傳又至其文粗可解耳二義之中初義常義㣪義今師相傳之義也已上今本願三信得此等意可領解也次信樂者信者忍許樂者愛樂愛是信㓛緣苦集信信而非愛緣滅道信信而必是緣淨土故云信樂俱舍云信忍樂欲心淨為性對治不信樂善為業已上論云愛樂佛法味已上大師云不貪淨土無生解脫障已上愛有二種染污愛愛妻子等無染污愛愛師長等今愛樂者無染污愛信卷云言信樂者信者即是真也實也誠也又云樂者即是欲也願也愛也恱也歡也喜也賀也慶也已上疏云言𭰹心者𭰹信之心也已上其𭰹信者有七𭰹信第一第二𭰹信如次信機與法又是如次自利利他愚鈔云第一𭰹信决定𭰹信自身即是自利信心也第二𭰹心决定𭰹信乘彼願力即是利他信海也已上此時就機言云自利就行言之即云利他信卷云次言信樂者則是如來滿足大悲圎融無㝵信心海是故疑盡無有間𮦀故名信樂已上故本願三信謂之他力是當流意問發起信心即是真知內薰為因宿善為緣其內薰者起信論云以有真如法故薰習無明以薰習因緣力故則令忘心猒生死苦樂求𣵀槃已上弘决四云自非內熏何能生悟故知生悟力在真如已上宗鏡四十八云本覺能熏無明起其淨用已上又云由此本覺內熏不覺令成猒求反流順真已上六要一云言群萠者是衆生名衆生心中有佛性故蒙法潤類生佛道芽已上然者如何他力信者就行躰所言能行機如載問難所行法三信即是本願三信謂之他力更非凡夫行本陀誓願前所引六要文於機不論信相等矣同二末引興尺云佛所行外衆生行如來廽向成就義也已上問所立有本據乎有其證可俟往還回向之下凡𭰹心尺其文廣多今唯當流一義大途耳欲生我國者廽向發願心也當流之意行者廽向是非真實一切凡聖一切時中貪愛心常能污善心嗔憎心常能燒法戝急作急修如𬉹頭燃衆名𮦀毒虛假之行以此行善欲生報土此是不可依之當流意𭰹信佛願其德自然欣求心起此時讓㓛於本所求全佛回向故自行者名不廽向今以此義應知觀經疏云三者廽向發願心言廽向發願心者過去及以今生身口意業所修世出世善根及隨喜他一切凡聖身口意業所修世出世善根以此自他所修善根悉皆真實𭰹信心中廽向願生彼國故名廽向發願心也又廽向發願生者必須决定真實心中廽向願作得生想此心𭰹信由若金剛乃至又言廽向者生彼國已還起大悲廽入生死教化衆生亦名廽向也三心既具行不成願行既成若不生者有是處也又此三心亦通攝定善之義應知已上此文廽向有三初一是自力次一往相是他力㣪一還相是則利他於中第二廽向有文點也三心既具等者六要三本云三心已下是惣結文此有二意一云三心廣亘万善諸行義也依之言之𠰥具三心諸行皆成選擇集云惣而言之通諸行法即其意也一云今此三心是念佛一往雖有通諸行邊據實論之自力諸行作業難成輒不可云願行既成又得往生偏是他力𫝹佛之利益也𠰥諸行即不可云𠰥不生者故今所言具三心者即成正業必得往益之宗㫖也同次句云別而言之在念佛行是其義也問二義之中以何為正依當流意㣪義為本又此等者𠰥依廣通諸行義者顯不限散亦通定善凡於三心有其二意初義是定散諸機自力各別發心之義㣪義是如來利他他力成就佛願利益三心大𮈣只示一端已上凡大經三信觀經三心本是雖一定散諸機各別所發謂之自力是觀經意不論機分偏信佛願謂之他力是大經意當流門人可得此意問本願三信論判一心今家又云稱我名字其意如何信卷云問如來本願已發至心信樂欲生誓何以故論主言一心也愚䤜衆生解了為令易陀如來雖發三心𣵀槃真因唯以信心是故論主合三為一歟乃至今按三心字訓真實心而虛假𮦀正直心而邪僞𮦀真知疑盡無閒𮦀故是名信樂信樂即是一心也一心即是真實信心是故論主建言一心也應知已上是故信卷尺三心義尺義混引三心一心開合異耳次稱我名字者六要二本云問十八願以至心等三信為要何除至心信樂之句今加稱我名字句耶此句願文無之云何此有𭰹意今所言稱我名字則示本經至心信樂欲生之意所以然者至心等者稱佛名號得往生益是佛本願如此信知是名至心信樂欲生故發此心即是稱我名號義為顯此意除彼加此其義可知已上次成等覺等二句者十一願意也本願云設我得佛國中人天不住定聚必至滅度者不取正覺已上如來會云𠰥我成佛國中有情𠰥不决定成等正覺證大𣵀槃者不取菩提已上今偈文者如來會語㔟也六要第四云次如來會文言决定者正定聚也成等覺者是顯必至滅度之意大乘滅度文灼然正信偈中云成等覺證大𣵀槃此文意也已上證卷云然煩𢚰成就凡夫生死罪濁群萠獲往相廽向心行即時入大乘正定聚之數住正定聚故必至滅度已上六要鈔云即時等者問當願之意得不退位往生㣪彼土得故而如今者現生歟其意如何答此有隱顯傍正等意𠰥據顯正生㣪益𠰥依隱傍現生益依之或云即得往生住不退轉或云皆悉到彼國自致不退轉各有料簡是故十住毗婆沙論𠰥云即入必定𠰥云欲於此身皆即時是現生意依此等義有此釋也已上故當流意涅槃局淨土定聚通此土六要云第十入正定聚益者第十一願所說益也本是雖說處不退位現生之中且得其益是則如來攝取故龍樹尊十住婆娑判云即時入必定已上今意念佛行人現潜住定聚當必證涅槃偏十一願恩也此意云成等等六要第四云問當願大意云何因位所見諸土之中或有雖佛道修行退入邪聚或有不退速得菩提法藏憐愍彼退墮類為令彼類住正定聚終證涅槃之妙理故發此願也問定聚滅度是二益歟又一益歟答是二益也言定聚者是當不退言滅度者是指涅槃問定聚滅度何為願躰諸師之意多以不退為其願躰所謂寂云今住定聚法位師云願住定聚玄一云位定聚願靜照真源共名住必定聚之願但御廟智光二德並云住正定聚必至菩提之願是舉兩益如此名者難定以何為所願之躰𠰥初益可為不退𠰥究竟可為滅度今此集意就其終益被立名歟問言滅度者大小二乘所證之理共得此名今指何耶答大乘滅度文理共明言其文者次下所引如來會文其說分明又大阿𢏏陀經說云令得佛道云大涅槃云取菩提云得佛道言其理者陀教文大乘真實終窮極說了義教也極樂畢竟成佛道路即是大乘善根界也豈得小乘灰斷滅度當知其證偏在大乘問如所立者往生之㣪所得之益淨土德也然者所言現生即時不退之義相違如何答豈不前言於不退益有其隱顯傍正之意處料簡其意皆同又滅度益可為生㣪究竟之益不可混亂問生㣪益論不退者其位如何常途所談非三不退是處不退故要集判云處不退又群疑論云初往生時即名不退者此處不退已上但如下引本論意者可云初益是行不退㣪益念不退所言未證淨心菩初地已上上地菩是指八地已上故也集主之意立真實證其位𭰹高叶此義歟問不住等者不之言者是指定聚其義難云被滅度耶不言流至必至滅度初住定聚終成佛故次如來會文言决定者正定聚也成等覺者是顯必至滅度之意大乘滅度此文灼然正信偈中云成等覺證大涅槃此文意也乃至問三聚之相其位如何三定聚義諸說不同𠰥依小乘俱舍論云正邪不定聚聖造無間餘已上本頌頌疏釋云上句標下句釋謂諸聖人名正性定聚造五無間者名邪定聚餘即無間外餘凡夫也已上𠰥依大乘如釋摩訶衍論說者有其三種一者十信前名邪定聚不信業果報等故三賢十聖名正定聚不退位故十信名不定聚或進或退未决定故二者十信前并十信名邪定大覺果名正定三賢十聖名不定三者十信前名邪定十聖名正定十信三賢名不定已上隨而諸師又有異解且憬興師破諸師解自義云今即餘教所三乘皆是穢土有此三乘故𠰥生淨土不問凡聖定向涅槃定趣善行定生善道定行六度定得解脫故唯有正定聚而無餘二也已上如此釋者不定判位只嘆彼土不退之德叶處不退之義趣歟縱令雖得三不退等是又佛力即處不退之勝德故無所違歟已上六要又定聚義於小乘中毗曇成論其意異也毗曇意者如前俱舍成論意者流轉邪聚三賢及燸頂二位不定聚忍法以上正定聚也云云淨影師意其異彼師觀經疏云𠰥依毗曇外凡常沒名為邪定五停心觀別念處燸頂二心名為不定此等有退故名不定忍心以上堅固不退名為正定𠰥依成實外凡常沒名為邪定聞思二惠行有退轉說為不定五停心觀名為聞惠別念處為思惠燸頂以去名為修惠現見法空𣱵不退轉故名正定大乘法中善趣已前名為邪定善趣位中數進數退名不定習種已去位分不退說為正定已上又大論八十四云須菩提問𠰥無法無衆生云何有三聚衆生佛我𮗚衆生一聚不可得云何有三但為欲破顛倒故分別有三能破顛倒者名正定必不能破顛倒者是邪定得因緣能破不得則不能破是名不定已上雖有此等釋義今正定聚是處不退論其位者當流之意立真實證初地已來八地已上其位𭰹高又潜現蒙其益之義如前所明然者還文言等覺涅槃名義者等覺者四教義云等覺位即是等覺性𠰥菩名等覺佛𠰥望佛地名為金剛心菩亦名無垢地菩也已上瓔珞經疏云無垢地中行過十地解與佛同故名等覺性已上問依別教意無明品𢾗斷十二品名妙覺也斷十一品有惑餘殘名之等覺何云無垢四教義云別惑正習俱盡無明餘習𠰥微煙雖有如無故云無垢云云集解下云等覺位亦名無垢地過十地解入百千三昧照一相無相寂滅無為干妙覺猶有一等比下名覺故名等覺更有一品無明塵垢雖有如無故名無垢所修𮗚智純一堅利喻𠰥金剛名金剛心有一生在未全之名為一生過此之後即補果佛妙覺之處名為補處更有妙覺上位可登名有上士已上頓悟要門云即色即空名為等覺二性空故名為妙覺為隨事方便假立二名本體是一無二無別已上宗鏡七十八云如瓔珞經云妙覺方稱寂照等覺照寂又覺有三義一覺察如睡夢覺亦如人覺賊賊無能為妄即賊也二覺照即照理事也亦如蓮開照見自心一真法界恆沙性德如其勝義覺諸法故三妙覺即上二覺離覺所覺故為妙耳已上問於等覺立不立義如何四教義十云問曰別教經論何故有處明法雲之後更有金剛等覺自在經論止明十地行滿便成佛果南北法師諍此義答曰更立等覺未足為礙所以然者華嚴經明法雲十地㓛德智慧用此比於佛如爪上土方於大地若爾雖說一品無明而實不可說品何以得知後心菩無㓛用道其疾甚風一日之間能破無量品無明障惑何况瓔珞經明等覺地於百千萬劫入重玄門倒修凡夫事是故開法雲地更立金剛心等覺佛於理無失若知一品有無量品無明因法雲地無礙之智即盡復何須開出等覺地也已上有云云別教意等覺立不立經論異義也釋云等覺一位或有或無存沒不定矣或籤三云仁王經中不立等覺矣或華嚴經中初無十信後無等覺矣如何可得意耶義云此名別義通日不立當別教心立約束也其故名別義通時附通教通教意界內習氣易盡故不立之是即通教意七地斷正使習氣八地九地出假時自被斷故附此邊不立也當別教意立之事別教意元品無明難斷故立等覺位也此位入重玄門倒取凡事依化他㓛終斷之妙覺朗然位叶談故立之也云云諸鈔出八之拔次大涅槃者大簡異小乘涅槃不生不滅經云涅言不生槃言不滅不生不滅名大涅槃又云善男子有大樂故名大涅槃涅槃無樂以四樂故名大涅槃何等為四一者斷諸樂故不斷樂者則名為苦𠰥有苦者不名大樂以斷樂故則無有苦無苦無樂乃名大樂涅槃之性無苦無樂是故涅槃名為大樂以是義故名大涅槃復次善男子樂有二種一者凡夫二者諸佛凡夫之樂無常敗壞是故無樂諸佛常樂無有變易故名大樂乃至二者大寂靜故名為大樂涅槃之性是大寂靜何以故遠離一切憒閙法故以大寂故名大涅槃三者一切智故名為大樂非一切智不名大樂諸佛如來一切智故名為大樂以大樂故名大涅槃四者身不壞故名為大樂身𠰥可壞則不名樂如來之身金剛無壞非煩𢚰身無常之身故名大樂以大樂故名大涅槃已上又言不可稱量不可思議故得名為大般涅槃以純淨故名大涅槃云何純淨淨有四種何等為四一者二十五有名為不淨能𣱵斷故得名為淨淨即涅槃二者業清淨故凡夫業不清淨故無涅槃諸佛如來業清淨故故名大淨以大淨故名大涅槃三者身清淨故身𠰥無常則名不淨如來身常故名大淨以大淨故名大涅槃四者心清淨故心𠰥有漏名曰不淨佛心無漏故名大淨以大淨故名大涅槃已上具如證卷名義集云摩訶般涅槃那此云大滅度大即法身滅即解脫度即般𠰥楞伽云我所說者妄想識滅名為涅槃涅槃論云𥘿言無為亦名滅度無為者取其虛無寂寞妙絶於有為滅度者言其大患𣱵滅超度四流法華金剛皆云滅度奘三藏為圎寂賢首云德無不備稱圎障無不盡稱寂智論云槃名為趣涅名為出𣱵出諸趣故名涅槃二教論云涅槃者常恆清凉無復生死心不可以智知形不可以像測莫知其所以名強謂之寂其為至也亦以極哉縱其雙林息照而靈智常存躰示闍維而法身恆在然涅槃法若辨其義應分有餘無餘之殊當揀少分究竟之異言有餘無餘者光明玄云若三界煩𢚰盡證有餘涅槃焚身灰智入餘涅槃言少分者勝鬘經云知有餘苦斷有餘集證有餘滅修有餘道是名得少分涅槃得少分涅槃者名向涅槃界究竟涅槃者大法鼓經云乃至得一切種㓛德一切種智大乘涅槃然㣪究竟已上名義集百法抄云問何名四涅槃耶答一本來自性清淨涅槃謂一切法真實性本自所具真如理也雖有䨱障而本清淨一切有情平等共有名本來自性清淨涅槃思路絶名言道斷唯真聖者自內所證二有餘依涅槃謂斷盡煩𢚰障所顯真理也有餘依者餘者異熟苦依身也雖斷盡煩𢚰顯理依身猶不滅故名有餘謂於惑業苦三𮦀染有漏苦依身煩𢚰果也若斷盡煩𢚰顯理之時須則煩𢚰所感依身可滅而雖斷盡煩𢚰苦依未滅故名有餘涅槃三無餘依涅槃謂是亦斷盡煩𢚰所顯真理也無餘依者餘依者若小乘意現苦依身也是一切有漏苦果所依故也若大乘意者是第八識也第八識是有漏異熟果主若果法所依故也但大乘不小乘義但論根本云第八識仍滅彼故名無餘也謂感生煩𢚰皆斷故所感苦果亦同滅現苦依身𣱵滅故餘有為法既無所依餘心智等一切有為法自然皆滅唯寂滅真理名無餘涅槃也四無住所涅槃謂斷所知障所顯真如也依證此理故大悲般𠰥常所補翼不住生死不住涅槃故名無住所涅槃問何故斷所知障如是耶答所知障是智障若斷所知障得智之時於生死涅槃俱無欣猒也謂二乘人不得𭰹智故不了生死涅槃無差別故𭰹發猒苦欣滅心求離生死住涅槃菩專求智惠斷智障故得生死涅槃無差別𭰹智於二無欣猒不住生死不住涅槃唯常大智大悲所補翼故名無住所涅槃也問於四涅槃佛具幾耶答一切有情若凡若聖皆有初一一切凡夫及二乘有學未證㣪三涅槃二乘無學有初三乃至如來四種皆具問如來何有有餘依涅槃耶如來苦集二諦皆斷盡若有有餘涅槃者猶可有苦諦耶答有二義一如來雖無實果而示現苦諦依身故名有餘二雖無惑業所感苦依而有無漏法所依五薀具色身等是名有餘也問若爾者佛有無餘涅槃者不具色身等耶答佛色身等有無西方論師諍也雖然護法正義意佛有無漏清淨色身也問若爾者何名無餘耶無餘者離惑業所感色身義也非無無漏依身也問無餘者名身智灰滅如來身智俱具何名無餘耶答離分假變易二種生無諸苦果故雖有身智名無餘涅槃定性二乘所入無餘涅槃是身智灰滅無餘也已上百法抄大藏一覽九云增一阿含經云佛告比丘有二涅槃有餘涅槃界無餘涅槃界於是滅五下分結不還此世是謂有餘涅槃界盡有漏成無漏意解脫智解脫而自遊戲生死已盡梵行已立所作已辨不復受有如實知之是謂無餘涅槃界已上今偈所言涅槃者大乘無餘甚𭰹涅槃念佛行人所感淨土𭰹妙果也極樂涅槃城念佛涅槃德念佛行人所感其理尤極成也六要三末云陀名號與涅槃理其名雖異其性是同此義文義共分明也先言文者大經下云其有菩生疑惑者為失大利是故應當明信諸佛無上智慧已上又云當知此人為得大利則是具足無上㓛德已上或云智惠或云㓛德其言雖殊共是名號是指陀嘆云無上而諸教中稱無上者涅槃一法謂智論意大乘法中大般涅槃經以為無上又瑜伽云復次云何有上法謂除涅槃餘一切法當知涅槃是上法已上彼此上可知一法次言義者上所出之大經文中言智惠者三德之中且舉般𠰥𠰥舉一德三德具足此是三德不離故也上㓛德即是名號名號即是三德祕藏然其名號全是陀陀即是涅槃妙理故事云𢏏陀妙果號云上涅槃已上是就正報立涅槃名又云極樂為涅槃界是依報論涅槃義又云畢命直入涅槃城已上是所入城名曰涅槃般舟云念佛即是涅槃門已上此云涅槃能入門依正能所唯是𢏏陀圎滿上涅槃㓛德又阿闍世五逆重罪定雖可入阿鼻獄中來此經會滅罪解脫療此重病醍醐妙藥今此念佛亦滅此病依之先德以此念佛同醍醐是一法故以有如此甚𭰹義也已上六要如來所以興出世唯說𢏏陀本願海五濁𢙣時群生海應信如來如實言六要鈔云如來以下二行四句是示如來出世本懷𭄿應信受如來實語已上同一云問大事因緣文在法華今經更本懷之言何成其義論其出世本懷之義略有二意一約教㩲實三乘是權一乘是實故以一乘說為本懷是法華大悲問諸教皆以慈悲為本慈悲本懷何限𢏏陀答先華嚴意緣大機言佛本意在大說一法界淨理法華鹿薗證果緣二乘而說佛智見爾者諸經不緣重苦𢏏陀正緣重苦衆生發六八願大悲本懷在𢏏陀乎問𢏏陀緣重苦意如何答第一願誓無三𢙣趣則發苦與樂大悲云一切善𢙣凡夫得生故緣重苦大悲也問釋迦大悲本懷者其意如何答如來以無盡大悲矝哀三界所以出興於世光闡道教者施念佛大悲盡限盡大悲也六要鈔云盡大悲者淨影云佛悲殊勝不能盡上名盡悲已上義寂云言盡者猶上也更餘悲䨱盡上故有本作盡義亦已上憬興同之玄一師意以盡為勝已上六要問施於念佛大悲云盡盡其意如何答經道滅盡我以慈悲哀愍特此經止住百歲者諸經教法流布間慈悲也念佛經道滅盡㣪施慈悲盡大悲問既云止住百歲何云限答對經道盡縱雖十歲可云限况百歲乎又施於万機慈悲五乘齊入即是限大悲問淨教大悲愚䤜機上大悲廣不可施万機答云諸有衆生云為一切世間說此難信之法施万機明問淨教大悲本懷超過諸教其意如何答玄義云諸佛大悲於苦者心偏愍念常沒衆生已上救苦者教有淨教故諸教超過經云視諸衆生猶如一子或云一切衆生受異苦悉是如來一人苦或云荷負群生為之重擔又云興大悲愍衆生已上或云十方如來憐念衆生如憶子已上問所言視諸等文則是餘經救重苦證也如何答唯是憐愍非必救濟又傳通記有五番問答云云問法華直唯以一大事因緣故出現於世已上淨教直文如何答玄義出文顯證出十句文理者七衆溺水釋迦微笑諸佛舒舌其文理也問未去前難法華直云一大事因緣出現答以云大事文為出世本懷稱經云我觀如是利益安樂大事因緣說誠諦語已上亦般𠰥如是甚𭰹般𠰥波羅蜜多以大事故出現於世已上問上來六要鈔就云機利䤜立大悲本懷義𠰥云教權實之時本懷在法華可云淨教乎答此時亦可立本懷謂教權實者法華是以一乘故云本懷淨教又一乘既云真實之利云究竟一桑元照云耳聞經名則入一乘已上又云准知一代𢏏陀教觀皆是圎頓一佛乘法更餘途已上况是法華機情悟解一乘念佛佛意難思一乘混不可同類不可等問爾者何六要鈔不釋此義答本意故謂法華以會三歸一立權實義依之今云法華意也念佛本是以救下機為本意故引根性利者之文是本意𠰥依一乘念佛猶是出世本懷問一乘時則可云本懷大悲時不可云本懷如何答大悲本意亦言本懷有何過失諸佛出世依大悲故故云諸佛大悲於苦者等經云釋迦牟𡰱佛能於娑婆國土五濁𢙣世為諸衆生說此難信之法已上略記云然勸信受為成願生是佛本懷不可輕爾已上宗鏡八十二云清涼記云如來出現義亦名緣起亦名性起若八相覽緣出現故名緣起謂由衆生業感如來大悲而出現故八相成道從法性故名性起今以從緣無性緣起即名性起已上五濁𢙣時等者五濁即𢙣時也小經云劫見𢚰衆生命俱舍云壽劫𢚰見有情俱舍意者壽命𮕱故為濁世故云壽劫小經意者壽命𮕱减依劫末故故云劫等楞嚴同小經劫濁者序分義云言劫濁者然劫非是實濁當减時諸𢙣加增也已上注十疑云一劫濁劫名時分謂四濁聚在其時劫减時促故名為濁已上首經疏云梵云劫波此云時分法華論說日月歲年惣名為劫乃至成住壞空不離時分已上三極少中剎那極少積終為劫剎那即是時極少也問五濁起相如何答俱舍十二云頌曰劫初如色天後漸增貪味由墯貯賊起為防雇守田疏云劫初時人皆如色界諸根無缺形色端嚴身𭘧光明騰空自在飲食喜樂長壽久住有如是類地味漸生其味甘美其香鬱馥時有一人禀性耽味香取食餘人隨學竸取食之爾時方名初受假食資假食故身漸堅重光明隱沒黑暗便生日月衆星從茲出現由漸耽味地味便隱從斯復有地皮餅生竸耽食之地餅復隱爾時復有林蕂出現竸耽食故林蕂復隱爾時有非耕種香稻自生衆共取之以充所食此食故殘穢在身為欲蠲除便生二道因斯遂復有男女根生由二根殊形相亦異宿習力故便相瞻視因此遂生非理作意乃至廣說如此諸𢙣加增名劫濁也宗鏡四十二云劫濁四濁增劇聚在此時已上文句四云劫濁無別體劫是長時剎那是短時但四濁立此假名已上小經鈔云劫濁者一大劫中成住壞空二十小劫轆轤增减人壽增至八萬歲時增之極也乃百年减一减至二萬即入劫濁無別體者由下四濁當此劫中因以得名此之劫分衆濁交凑昏亂駁𮦀故云濁也已上又文句云如劫初光音天墮地地使有欲如忉利天入澀園園生鬪心是名劫濁相已上疏云如劫初等者更出四濁在劫濁時亦是有濁之由乃至廣說問五濁何時起答法華記云准悲華經八万至三万亦未有濁至二万歲為五濁始已上法事云五濁時興盛明頑硬似高峯劫濁時移身漸小已上見濁者序分義云言見濁者自身衆𢙣惣變為善他上非見不為善已上法事云見濁藂林如𣗥刺已上文句四云見濁者無人謂有人有道謂無道十六知見六十二等猶如羅又似稠林纏縛屈曲不能得出是見濁相已上小經疏云見濁者五利使為體開之則六十二等諸見熾盛即其相也已上五利者對五䤜也使者法界次第云使以驅伇為義能驅伇行者身心流轉三界故通受使名已上五利使者一身見亦云我見謂於五薀執我我所法界次第云𠰥於名色隂入界中妄計為身名為身見已上止觀六云我見為諸見本已上我見者外道計胸中有奇特我物生諸法其我者佛法所談五薀也身者五薀躰也我者五薀和合衆生住宅等是我之所屬謂之我所假和合法而非實躰然外道顛倒推求生我見是云身見名我我所見二邊見法界次第云執邊之心名為邊見已上名義集云二邊見隨身計斷常已上三邪見法界次第云邪心取理故名邪見若明不了四諦因果邪心推獲謂此理因斷滅出世間善根乃至世間善作闡提行是為邪見已上撥無因果顛倒推度起諸邪心故名邪見也四見取見名義集云見取執劣以為勝已上法界次第云於非真勝法中謬見涅槃生心而取故曰見取若行道之時雖入種觀門而真明未發明不了便謬計所得為真為勝生心取著皆名見取已上俱舍十九云我我所斷常撥無劣謂勝已上疏云劣謂勝者於劣謂勝名為見取見謂身見邊見邪見執此三見以為勝名為見取見之取故是依主釋也除三見外執有漏以為勝者亦名見取理實應立見等取名略去等言但名見取已上五戒禁取見法界次第云於非戒中謬以為戒取以進行故曰我取若取雞狗牛戒乃至九十五種外道所行之戒取以為真戒皆名戒取已上名義集云戒取於非因計因已上頌云非因道妄謂已上疏云非因謂因非道謂道名戒禁取戒謂佛法中五戒等也禁謂外道拘牛等禁也執此禁戒以為因道名戒禁取戒禁之取依主釋也已上此五利名曰見濁也煩𢚰濁者煩𢚰者法界次第云煩以喧煩為義𢚰以逼亂為義能喧之法逼亂行者心神致使真明不得開發故名煩𢚰也已上止𮗚八云煩𢚰是昏煩之法𢚰亂心神又與心作煩令心得𢚰即是見思利䤜已上弘决云中有二解初合字釋者三毒是能煩心神是所煩次分字解煩為能煩𢚰為所𢚰當知通名通於見思已上又止𮗚云明煩𢚰起之因緣者因緣有三一習因種子二業力擊作三魔所扇動習者無量劫來煩𢚰重積種子成就薰習相續如駃水流順之不覺其疾槩之則知奔猛行人任煩𢚰流㳂生死海都不覺知若修道品泝諸有流煩𢚰嵬起已上弘决云集因為因薰習相續為緣意業為因身口𢙣行為緣魔行為因十軍攝擒為緣有此三故今修道品此三復發又名為緣順流曰㳂不修觀故順生死流逆流曰泝嵬謂崔嵬高起㒵也已上俱舍十云此中說煩𢚰如種復如龍如草根樹莖及如糠褁米已上頌疏云煩𢚰如種者如從種子芽莖等生從煩𢚰生煩𢚰業等事煩𢚰如龍者如龍鎮池水恆不竭煩𢚰鎮業感果窮煩𢚰如草根者如草根未拔苗剪剪還生未拔煩𢚰根趣滅滅還起如樹莖者如樹莖頻生枝華果從諸煩𢚰數起惑業事及如糠𮖐米者如糠𮖐米能生芽等煩𢚰𮖐業能感餘生已上法事云𢚰濁遍滿過塵數愛憎違順若嶽山已上序分義云言煩𢚰濁者當今劫末衆生𢙣性難親隨對六根貪嗔竸起已上文句四云煩𢚰濁者貪海納流未曾飽足瞋虺吸毒燒諸世間𪪧暗頑嚚過於漆墨慢高下視陵忽無度疑網無信不可告實是為煩𢚰濁相已上長水云六識分別三世遍緣憶過去境識現在塵誦習未來諸有境界能分別體從前見濁覺知所起所分別相即是六塵所現影像故云性發容現容即相也離塵離覺無相無性互相交織擾亂相熏名煩𢚰濁已上注十疑云煩𢚰濁謂有貪嗔癡慢疑五䤜使故名為濁已上五䤜使者對前利使此五是常凡夫起故名䤜一貪二嗔此二尺下三癡者名義集云慕何此云癡阿含正行經佛㘴思念人癡故有生死何等為癡本從癡中來今生為人復癡心不解自不開不知死當所趣向見佛不問見經不讀見沙門不承事不信道德見父不敬不念世間若不知泥犁中栲治劇是名癡故有生死不止生死如呼吸間膬音脆不過於人命然此貪嗔癡名為三毒中隂經云三毒之重者癡病是其原已上略出禮云我慢放逸由癡生法界次第云迷惑不了心名為明以迷心緣境隨有所起則念𣱵失而不知慚愧皆是癡也又云迷惑之心名之為癡𠰥迷一切事理之法明不了迷惑妄取起諸邪行即是癡毒亦名明已上或云一切惑障以愚癡為前導於理事諸法迷暗不悟故一切惑障生起也此煩𢚰名明也於明有二種一相應明二不共明也相應者貪等餘本惑並生與彼相應明名相應明也次不共明者於此有二種一恆行不共明第七識相應明也謂雖與貪等餘惑俱一切凡夫心恆行間斷不共餘六識相應明故名不𠔏明也非不餘惑俱義二獨行不𠔏明謂非貪等餘本惑俱唯獨起與心相應故名不𠔏明對相應明名不𠔏也為顯非如恆行不𠔏義立獨行之名獨行即不𠔏之義故名獨行不𠔏也矣文句五云癡使有獨起有相應起守宮百足等兀然獨頭無明狖狸鼷鼠等相應也已上前義依此文四慢者俱舍四云慢對他心舉憍由染自法已上疏云慢對他心舉者慢謂對他心自舉性稱量自他德類𭅒別心自舉恃陵蔑於他故名為慢憍由染自法者自法謂自身色力等法也謂憍染著自法為先令心傲逸無所顧性已上法界次第云自恃輕他之心曰慢𠰥恃種姓富貴有德才能輕蔑於他即是慢也已上或云恃己於他高舉為性能障不慢生苦為業矣俱十九云慢七者一慢二過慢三慢過慢四我慢五增上慢六早慢七邪慢令心高舉惣立慢名行轉不同故分七種於他劣謂己勝於他等謂己等雖然稱境以心高舉說名為慢於他等謂己勝於他勝謂己等名為過慢過前慢故於他勝謂己勝名慢過慢慢他過故執我我所令心高舉名為我慢恃我起故未得謂得名增上慢於多分勝謂己少劣名為早慢於無德中謂己有德名為邪慢成就𢙣行名為德恃𢙣高舉名為邪慢也已上又有九慢又文殊問經明八憍義至文可見五疑者法界次第云迷心求理猶豫不决曰疑已上又云癡心求理猶豫不决名之為疑若修道㝎等法明暗䤜不別真僞因生猶豫心决斷皆謂疑也已上止𮗚四云疑有三種一疑自二疑師三疑法一疑自者謂我身底下必非道器是故疑身二疑師者此人身口不稱我懷何必能有𭰹禪好慧師而事之將不誤我三疑法者所受之法何必中理三疑猶豫常在懷抱禪定不發設發𣱵失此是疑之相也已上弘决云言猶豫者是不决之惣名猶者爾雅云如麂善登木尸子言五尺大犬曰猶文云壟右謂犬子為猶亦𤣓屬言此犬子或隨人行時前後不定故名𤡸豫已上三教指歸注云說文曰隴西謂犬子為猶吾以為人將犬行好豫在人前待人不得又來迎𠋫如此往還至于終日斯乃猶豫之所以為未定也爾雅曰猶如麂善登木豫獸名也既聞人聲乃豫緣木如是上下故稱猶豫已上止𮗚四云若心信法法則染心猶豫狐疑事同覆器已上弘决云狐疑者狐是獸一名野干多疑善聽時人云狐疑蓋因此也此獸為鬼所乘時人以之為精媚有云黃河氷㣪欲度河時委聽水聲聲絶方度覆器者信無故如器覆已上疑惑不輕散善義云𠰥起疑謗者縱使千佛繞身由可救也又云行者雖覩靈儀疑心恐不生已上文類云此回覆疑更復徑歷矌劫已上衆生濁者序分義云言衆生濁者劫𠰥初成衆生善劫𠰥末時衆生十𢙣𢏏盛也已上文句四云衆生濁者攬於色心立一宰主如黐膠無物不著浪流六道處處受生如貧如痤名長名富是為衆生濁相已上長水云衆生執愛但欲住業性遷流每常運動一去一住一動一互相交織衆法生名衆生濁已上命濁者序分義云言命濁者由前見𢚰二濁多行殺𡧱兹恩養既行斷命之苦因欲受長年之果者何由可得也已上法事云命濁中夭剎那間依正二報同時滅背正歸邪撗起已上注十疑云命濁謂連持色心為命命短名為濁已上文句四云命濁者朝生暮殞晝出夕沒波轉煙回眴息不住是命濁相已上小經疏云命濁者以色心連持為體催年减壽即其相已上群生海者衆生邊義諸有衆生義也應等者如來會應信我教如實言或說誠實言矣舌相至髮際等是實言又如樹提伽出於火中是實語又涅槃經三十五說有如來七種語皆是實語非虛妄語故云如實疏中云正教正義正智等又云由佛語真實决了義故佛是實知實解實見實證非是疑惑心中語故意也
